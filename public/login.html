<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Login | NeverEver</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black flex items-center justify-center h-screen">
    <div class="bg-slate-900 p-10 rounded-[40px] w-80 text-white">
        <h2 class="text-2xl font-black italic uppercase mb-6 text-emerald-400">Login</h2>
        <input type="text" id="user" placeholder="Username" class="w-full bg-black p-4 rounded-xl mb-4 outline-none">
        <input type="password" id="pass" placeholder="Password" class="w-full bg-black p-4 rounded-xl mb-6 outline-none">
        <button onclick="handleAuth()" class="w-full bg-white text-black font-black py-4 rounded-xl text-[10px] uppercase">Login</button>
    </div>
    <script>
       async function handleAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            if(res.ok) {
                const data = await res.json();
                localStorage.setItem('neverUser', JSON.stringify(data.user));
                window.location.href = '/'; 
            } else { alert("Login failed!"); }
        }
    </script>
</body>
</html>
