<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Account | NeverEver</title><script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #000; color: white; font-family: Helvetica; }</style>
</head>
<body class="flex items-center justify-center h-screen p-6">
    <div class="w-full max-w-sm bg-slate-900 p-10 rounded-[40px] border border-white/5">
        <h2 class="text-2xl font-black italic uppercase mb-8 text-emerald-400">Login</h2>
        <div class="space-y-4">
            <input type="text" id="user" placeholder="Username" class="w-full bg-black p-4 rounded-2xl outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-black p-4 rounded-2xl outline-none">
            <button onclick="handleAuth()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px]">Login</button>
        </div>
    </div>
    <script>
       async function handleAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            if(res.ok) {
                const data = await res.json();
                localStorage.setItem('neverUser', JSON.stringify(data.user));
                window.location.href = '/'; 
            } else { alert("Login failed!"); }
        }
    </script>
</body>
</html>
