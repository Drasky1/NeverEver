<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeverEver Shop</title>
    </head>
<body class="bg-black text-slate-200">

    <div class="max-w-md mx-auto p-6 bg-slate-900 rounded-2xl border border-slate-700">
        <h2 class="text-xl font-bold mb-4">Request a Preorder</h2>
        
        <input type="text" id="itemName" placeholder="Item Name (e.g. Flare Jeans)" class="w-full mb-3 p-3 bg-slate-800 rounded-lg">
        <input type="text" id="custName" placeholder="Your Name" class="w-full mb-3 p-3 bg-slate-800 rounded-lg">
        <input type="text" id="custContact" placeholder="Telegram @username or Phone" class="w-full mb-3 p-3 bg-slate-800 rounded-lg">

        <div class="mb-4">
            <button type="button" id="upload_widget" class="w-full bg-slate-800 border border-dashed border-slate-600 p-4 rounded-xl hover:border-emerald-500 transition">
                📸 Upload/Snap Item Photo
            </button>
            <input type="hidden" id="customer_image_url">
            <div id="upload_preview" class="mt-2 hidden flex justify-center">
                <img src="" id="preview_img" class="h-32 w-32 object-cover rounded-lg border-2 border-emerald-500">
            </div>
        </div>

        <button onclick="submitRequest()" class="w-full bg-emerald-500 p-4 rounded-xl font-bold text-black">Submit Request</button>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script>
        // 1. Cloudinary Setup
        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'dawhhgjsd', // Your Cloud Name
            uploadPreset: 'dawhhgjsd' 
        }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                document.getElementById('customer_image_url').value = result.info.secure_url;
                document.getElementById('preview_img').src = result.info.secure_url;
                document.getElementById('upload_preview').classList.remove('hidden');
            }
        });

        document.getElementById("upload_widget").addEventListener("click", function(){
            myWidget.open();
        }, false);

        // 2. Submit to Database
        async function submitRequest() {
            const data = {
                name: document.getElementById('itemName').value,
                customerName: document.getElementById('custName').value,
                customerPhone: document.getElementById('custContact').value,
                productImage: document.getElementById('customer_image_url').value,
                grade: 'Pending', // Sets status so it triggers Telegram
                price: 0 // You'll update this after checking Taobao
            };

            const response = await fetch('/add-student', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("Request sent! We will contact you with a price quote soon.");
                location.reload();
            }
        }
    </script>
</body>
</html>
