<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
        .neon-text { color: #4ade80; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans text-slate-200">

    <nav class="bg-black border-b border-emerald-500/30 p-4 sticky top-0 z-50 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic neon-text">NEVER<span class="text-white">EVER</span></h1>
            <div class="flex gap-6 text-right">
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Total Orders</p>
                    <p id="totalOrderCount" class="text-xl font-mono font-bold text-emerald-400">0</p>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Total Income</p>
                    <p id="totalIncome" class="text-xl font-mono font-bold text-blue-400">0 MMK</p>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Sold Profit</p>
                    <p id="totalProfit" class="text-xl font-mono font-bold text-white">0 MMK</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 pt-8 pb-20">
        <div class="mb-8 space-y-4">
            <input type="text" id="searchInput" onkeyup="filterEntries()" placeholder="🔍 Search product, customer, or phone..." 
                class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 outline-none focus:border-emerald-500 text-white shadow-2xl transition-all">
            
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="setStatusFilter('all', event)" class="filter-btn bg-emerald-500 text-black px-4 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">All</button>
                <button onclick="setStatusFilter('Pending', event)" class="filter-btn bg-slate-800 text-slate-400 px-4 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">Pending</button>
                <button onclick="setStatusFilter('Preorder', event)" class="filter-btn bg-slate-800 text-slate-400 px-4 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">Preorder</button>
                <button onclick="setStatusFilter('Instock', event)" class="filter-btn bg-slate-800 text-slate-400 px-4 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">Instock</button>
                <button onclick="setStatusFilter('Soldout', event)" class="filter-btn bg-slate-800 text-slate-400 px-4 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">Soldout</button>
            </div>
        </div>

        <div id="inventoryList" class="bg-slate-900/40 rounded-2xl border border-slate-800 p-6 mb-12 backdrop-blur-sm shadow-xl min-h-[100px]">
        </div>

        <div class="bg-black rounded-2xl border border-slate-700 p-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
            <h2 class="text-lg font-bold text-white mb-8 uppercase tracking-widest">Master Entry Form</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Product Info</label>
                        <input type="text" id="itemName" placeholder="e.g. Flare Jeans" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none focus:border-emerald-500 text-white">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Status</label>
                            <select id="status" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none text-white cursor-pointer focus:border-emerald-500">
                                <option value="Pending">🕒 Pending</option>
                                <option value="Preorder">📦 Preorder</option>
                                <option value="Instock">✅ Instock</option>
                                <option value="Soldout">❌ Soldout</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Cost (THB)</label>
                            <input type="number" id="priceTHB" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none text-white focus:border-emerald-500">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Image URL</label>
                        <input type="text" id="productImg" placeholder="https://..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none focus:border-emerald-500 text-white text-xs">
                    </div>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Customer Details</label>
                        <input type="text" id="custName" placeholder="Name" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none text-white mb-3 focus:border-emerald-500">
                        <input type="text" id="custPhone" placeholder="Phone" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none text-white focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Admin Note / Reply</label>
                        <textarea id="adminNote" placeholder="Reply to customer here..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none text-white h-[85px] focus:border-emerald-500"></textarea>
                    </div>
                </div>
            </div>

            <button onclick="addEntry()" class="w-full mt-10 bg-emerald-500 hover:bg-emerald-400 text-black font-black py-4 rounded-xl transition-all transform active:scale-95 uppercase tracking-widest shadow-[0_0_20px_rgba(74,222,128,0.2)]">
                Update Ledger
            </button>
        </div>
    </main>

    <script>
    const ADMIN_PASSWORD = "NeverEver2026"; 
    const RATE = 130;
    let allData = [];
    let currentFilter = 'all';

    function checkAuth() {
        const savedAuth = localStorage.getItem('neverever_auth');
        if (savedAuth !== ADMIN_PASSWORD) {
            const entry = prompt("Enter Admin Password:");
            if (entry === ADMIN_PASSWORD) {
                localStorage.setItem('neverever_auth', entry);
            } else {
                alert("Access Denied");
                document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:50px;'>Unauthorized</h1>";
            }
        }
    }
    checkAuth();

    async function loadEntries() {
        try {
            const response = await fetch('/students');
            allData = await response.json();
            renderList(allData);
        } catch (e) { console.error("Load failed:", e); }
    }

    function renderList(data) {
        const listDiv = document.getElementById('inventoryList');
        const profitDisplay = document.getElementById('totalProfit');
        const incomeDisplay = document.getElementById('totalIncome');
        const orderCountDisplay = document.getElementById('totalOrderCount');
        
        listDiv.innerHTML = ''; 
        let totalProfitMMK = 0;
        let totalIncomeMMK = 0;

        let filtered = Array.isArray(data) ? data : [];
        if (currentFilter !== 'all') filtered = filtered.filter(item => item.grade === currentFilter);

        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        if (searchTerm) {
            filtered = filtered.filter(item => 
                (item.name && item.name.toLowerCase().includes(searchTerm)) ||
                (item.customerName && item.customerName.toLowerCase().includes(searchTerm))
            );
        }

        orderCountDisplay.innerText = filtered.length;

        filtered.forEach(item => {
            const thb = Number(item.price) || 0;
            const mmkPrice = Math.round((thb * 1.25) * RATE);
            const mmkProfit = Math.round((thb * 0.25) * RATE);

            totalIncomeMMK += mmkPrice;
            if (item.grade === 'Soldout') totalProfitMMK += mmkProfit;

            let style = item.grade === 'Pending' ? "border-blue-500/50 text-blue-400 bg-blue-500/10" :
                        item.grade === 'Preorder' ? "border-yellow-500/50 text-yellow-500 bg-yellow-500/10" : 
                        item.grade === 'Instock' ? "border-emerald-500/50 text-emerald-500 bg-emerald-500/10" : 
                        "border-red-500/50 text-red-500 bg-red-500/10";

            const imgHtml = item.productImage ? 
                `<img src="${item.productImage}" class="w-14 h-14 rounded-lg object-cover border border-slate-700">` :
                `<div class="w-14 h-14 bg-slate-800 rounded-lg flex items-center justify-center text-[8px] text-slate-600">NO IMG</div>`;

            listDiv.innerHTML += `
                <div class="py-6 flex justify-between items-center group border-b border-slate-800">
                    <div class="flex gap-4 items-center">
                        <button onclick="deleteEntry('${item._id}')" class="text-slate-700 hover:text-red-500 transition-colors">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                        ${imgHtml}
                        <div>
                            <p class="font-bold text-white text-lg group-hover:neon-text transition-colors">${item.name || 'Unnamed'}</p>
                            <span class="${style} text-[9px] px-2 py-0.5 rounded border uppercase font-black mb-1 inline-block">${item.grade}</span>
                            <p class="text-slate-500 text-[10px]">${item.customerName || 'Stock'} | ${item.adminNote ? 'Replied' : 'No Reply'}</p>
                        </div>
                    </div>
                    <div class="text-right font-mono">
                        <p class="text-white font-bold text-lg">${thb.toLocaleString()} ฿</p>
                        <p class="text-emerald-400 text-xs font-bold">${mmkPrice.toLocaleString()} MMK</p>
                    </div>
                </div>
            `;
        });

        profitDisplay.innerText = totalProfitMMK.toLocaleString() + " MMK";
        incomeDisplay.innerText = totalIncomeMMK.toLocaleString() + " MMK";
    }

    async function addEntry() {
        const data = {
            name: document.getElementById('itemName').value,
            grade: document.getElementById('status').value,
            price: Number(document.getElementById('priceTHB').value),
            productImage: document.getElementById('productImg').value,
            customerName: document.getElementById('custName').value,
            customerPhone: document.getElementById('custPhone').value,
            adminNote: document.getElementById('adminNote').value
        };

        if (!data.name || !data.price) return alert("Name and Price required!");

        const res = await fetch('/add-student', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
            await loadEntries();
        }
    }

    async function deleteEntry(id) {
        if (confirm("Delete this?")) {
            await fetch(\`/delete-student/\${id}\`, { method: 'DELETE' });
            loadEntries();
        }
    }

    function setStatusFilter(status, event) {
        currentFilter = status;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('bg-emerald-500', 'text-black');
            btn.classList.add('bg-slate-800', 'text-slate-400');
        });
        event.target.classList.add('bg-emerald-500', 'text-black');
        renderList(allData);
    }

    function filterEntries() { renderList(allData); }
    loadEntries();
    </script>
</body>
</html>
