<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
        .neon-text { color: #4ade80; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans text-slate-200">

    <nav class="bg-black border-b border-emerald-500/30 p-4 sticky top-0 z-50 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic neon-text">NEVER<span class="text-white">EVER</span></h1>
            <div class="flex gap-6 text-right">
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Total Orders</p>
                    <p id="totalOrderCount" class="text-xl font-mono font-bold text-emerald-400">0</p>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Total Income</p>
                    <p id="totalIncome" class="text-xl font-mono font-bold text-blue-400">0 MMK</p>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Sold Profit</p>
                    <p id="totalProfit" class="text-xl font-mono font-bold text-white">0 MMK</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 pt-8 pb-20">
        <div class="mb-8 space-y-4">
            <input type="text" id="searchInput" onkeyup="filterEntries()" placeholder="🔍 Search product, customer, or phone..." 
                class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 outline-none focus:border-emerald-500 text-white shadow-2xl transition-all">
            
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="setStatusFilter('all')" class="filter-btn bg-emerald-500 text-black px-4 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">All</button>
                <button onclick="setStatusFilter('Preorder')" class="filter-btn bg-slate-800 text-slate-400 px-4 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">Preorder</button>
                <button onclick="setStatusFilter('Instock')" class="filter-btn bg-slate-800 text-slate-400 px-4 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">Instock</button>
                <button onclick="setStatusFilter('Soldout')" class="filter-btn bg-slate-800 text-slate-400 px-4 py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest transition-all">Soldout</button>
            </div>
        </div>

        <div id="inventoryList" class="bg-slate-900/40 rounded-2xl border border-slate-800 p-6 mb-12 backdrop-blur-sm shadow-xl">
            </div>

        <div class="bg-black rounded-2xl border border-slate-700 p-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
            <h2 class="text-lg font-bold text-white mb-8 uppercase tracking-widest">New Order Entry</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Product Info</label>
                        <input type="text" id="itemName" placeholder="e.g. Flare Jeans" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none focus:border-emerald-500 text-white">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Status</label>
                            <select id="status" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none text-white cursor-pointer focus:border-emerald-500">
                                <option value="Preorder">📦 Preorder</option>
                                <option value="Instock">✅ Instock</option>
                                <option value="Soldout">❌ Soldout</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Cost (THB)</label>
                            <input type="number" id="priceTHB" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none text-white focus:border-emerald-500">
                        </div>
                    </div>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Customer Name</label>
                        <input type="text" id="custName" placeholder="Client Name" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none text-white focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Phone Number</label>
                        <input type="text" id="custPhone" placeholder="+95..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none text-white focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Address</label>
                        <textarea id="custAddr" placeholder="Delivery Details" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none text-white h-[45px] focus:border-emerald-500"></textarea>
                    </div>
                </div>
            </div>

            <button onclick="addEntry()" class="w-full mt-10 bg-emerald-500 hover:bg-emerald-400 text-black font-black py-4 rounded-xl transition-all transform active:scale-95 uppercase tracking-widest shadow-[0_0_20px_rgba(74,222,128,0.2)]">
                Confirm To Ledger
            </button>
        </div>
    </main>

    <script>
        const ADMIN_PASSWORD = "NeverEver2026"; 
        function checkAuth() {
            const savedAuth = localStorage.getItem('neverever_auth');
            if (savedAuth !== ADMIN_PASSWORD) {
                const entry = prompt("Enter Admin Password:");
                if (entry === ADMIN_PASSWORD) {
                    localStorage.setItem('neverever_auth', entry);
                } else {
                    alert("Access Denied");
                    document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:50px;'>Unauthorized</h1>";
                }
            }
        }
        checkAuth();

        const RATE = 130;
        let allData = [];
        let currentFilter = 'all';

        async function loadEntries() {
            try {
                const response = await fetch('/students');
                allData = await response.json();
                renderList(allData);
            } catch (e) { console.error(e); }
        }

        function renderList(data) {
            const listDiv = document.getElementById('inventoryList');
            const profitDisplay = document.getElementById('totalProfit');
            const incomeDisplay = document.getElementById('totalIncome'); // NEW
            const orderCountDisplay = document.getElementById('totalOrderCount');
            
            listDiv.innerHTML = ''; 
            let totalProfitMMK = 0;
            let totalIncomeMMK = 0; // NEW

            let filtered = data;
