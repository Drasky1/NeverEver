<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Order | NeverEver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md text-center">
        <h1 class="text-3xl font-black italic mb-10 text-emerald-400">NEVER<span class="text-white">EVER</span></h1>
        <div class="glass p-8 rounded-3xl mb-8">
            <input type="text" id="trackInput" placeholder="@username" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-emerald-500 text-center mb-4">
            <button onclick="trackOrder()" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-emerald-400 transition uppercase tracking-widest text-sm">Check Status</button>
        </div>
        <div id="resultArea" class="space-y-4"></div>
    </div>

    <script>
        async function trackOrder() {
            const input = document.getElementById('trackInput').value.trim().toLowerCase();
            const res = await fetch('/students');
            const data = await res.json();
            const results = data.filter(item => item.customerPhone?.toLowerCase().includes(input.replace('@','')));
            
            const area = document.getElementById('resultArea');
            area.innerHTML = results.length ? results.map(item => `
                <div class="glass p-6 rounded-2xl text-left border-l-4 border-emerald-500">
                    <h3 class="font-bold text-lg">${item.name}</h3>
                    <p class="text-emerald-400 text-xs font-bold uppercase tracking-widest mb-2">${item.grade}</p>
                    <p class="text-xs text-slate-400 italic">"${item.adminNote || 'Processing your request...'}"</p>
                </div>
            `).join('') : '<p class="text-red-400">No orders found.</p>';
        }
    </script>
</body>
</html>
