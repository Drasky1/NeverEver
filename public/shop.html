<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver Store</title><script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <nav class="p-6 border-b border-white/5 sticky top-0 bg-black/90 backdrop-blur-md z-50 flex justify-between items-center">
        <h1 class="text-xl font-black italic text-emerald-400">NEVER<span class="text-white">EVER</span></h1>
        <div class="flex gap-4 items-center">
            <a href="/track" class="text-[10px] font-bold uppercase border border-white/10 px-4 py-2 rounded-full">Orders</a>
            <button onclick="toggleCart()" class="bg-white text-black p-2 rounded-full px-4 text-[10px] font-black uppercase">Cart (<span id="count">0</span>)</button>
        </div>
    </nav>

    <div class="p-6 max-w-6xl mx-auto">
        <div class="mb-10 space-y-6">
            <input type="text" id="search" oninput="renderShop()" placeholder="Search products..." class="w-full bg-slate-900 p-4 rounded-2xl border border-white/5 outline-none focus:border-emerald-500">
            
            <div class="flex gap-3 overflow-x-auto hide-scroll">
                <button onclick="setCat('All')" class="cat-btn bg-white text-black px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap">All Items</button>
                <button onclick="setCat('Clothing')" class="cat-btn bg-slate-900 px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap">Clothing</button>
                <button onclick="setCat('Accessories')" class="cat-btn bg-slate-900 px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap">Accessories</button>
            </div>
        </div>

        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </div>

    <div id="cartBox" class="fixed inset-0 bg-black/95 z-[100] hidden p-6">
        <div class="max-w-md mx-auto py-10">
            <h2 class="text-2xl font-black mb-10 uppercase italic">Your Cart</h2>
            <div id="cartItems" class="space-y-4 mb-10"></div>
            <div id="checkout" class="space-y-4 hidden">
                <p id="total" class="text-2xl font-black text-emerald-400"></p>
                <input type="text" id="addr" placeholder="Address" class="w-full bg-slate-900 p-4 rounded-xl">
                <input type="text" id="ph" placeholder="Phone" class="w-full bg-slate-900 p-4 rounded-xl">
                <button id="upSS" class="w-full border-2 border-dashed border-emerald-500/20 py-6 rounded-xl text-[10px] font-bold">📸 UPLOAD PAYMENT SCREENSHOT</button>
                <input type="hidden" id="ss">
                <button onclick="pay()" class="w-full bg-emerald-500 text-black py-4 rounded-xl font-black uppercase tracking-widest">Confirm Order</button>
            </div>
            <button onclick="toggleCart()" class="mt-10 text-slate-500 uppercase text-[10px] font-bold">← Close</button>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        let items = [], cart = [], cat = 'All';
        const user = JSON.parse(localStorage.getItem('neverUser'));
        const RATE = 130;

        async function init() {
            const res = await fetch('/items');
            items = await res.json();
            renderShop();
        }

        function setCat(c) { 
            cat = c; 
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.className = b.innerText.includes(c) ? 'cat-btn bg-white text-black px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap' : 'cat-btn bg-slate-900 px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap';
            });
            renderShop(); 
        }

        function renderShop() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = items.filter(i => i.grade === 'Instock' && (cat === 'All' || i.category === cat) && i.name.toLowerCase().includes(query));
            document.getElementById('shop-grid').innerHTML = filtered.map(i => `
                <div class="bg-slate-900/50 p-3 rounded-[30px] border border-white/5">
                    <img src="${i.productImage}" class="w-full aspect-square object-cover rounded-[20px] mb-4">
                    <p class="text-[9px] font-bold text-slate-500 uppercase px-2">${i.category}</p>
                    <h3 class="font-bold text-sm px-2 truncate">${i.name}</h3>
                    <p class="text-emerald-400 font-black px-2 mb-4">${Math.round(i.price*1.25*RATE).toLocaleString()} MMK</p>
                    <button onclick="addToCart('${i.name}',${i.price*1.25*RATE})" class="w-full bg-white text-black py-3 rounded-2xl text-[10px] font-black uppercase">Add to Cart</button>
                </div>
            `).join('');
        }

        function addToCart(n, p) { cart.push({n, p}); document.getElementById('count').innerText = cart.length; updateCartUI(); }
        
        function updateCartUI() {
            const sum = cart.reduce((s, i) => s + i.p, 0);
            document.getElementById('cartItems').innerHTML = cart.map((i, idx) => `<div class="flex justify-between bg-white/5 p-4 rounded-xl text-xs"><span>${i.n}</span><button onclick="cart.splice(${idx},1);updateCartUI()">✕</button></div>`).join('');
            document.getElementById('total').innerText = `Total: ${sum.toLocaleString()} MMK`;
            if(cart.length > 0 && user) {
                document.getElementById('checkout').classList.remove('hidden');
                document.getElementById('addr').value = user.address;
                document.getElementById('ph').value = user.phone;
            }
        }

        function toggleCart() { document.getElementById('cartBox').classList.toggle('hidden'); }

        cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (e, r) => { 
            if (r.event === "success") { document.getElementById('ss').value = r.info.secure_url; document.getElementById('upSS').innerText = "✅ UPLOADED"; }
        }).init().addEventListener("click", function(){ this.open() }, false);

        async function pay() {
            const data = { userId: user.id, username: user.username, items: cart, totalMMK: cart.reduce((s,i)=>s+i.p,0), address: document.getElementById('addr').value, phone: document.getElementById('ph').value, paymentScreenshot: document.getElementById('ss').value };
            await fetch('/submit-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("Order Success!"); location.reload();
        }

        init();
    </script>
</body>
</html>
