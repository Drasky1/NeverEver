<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVEREVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fff; font-family: Helvetica, sans-serif; text-transform: uppercase; }
        .yeezy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #eee; border-top: 1px solid #eee; }
        @media (min-width: 768px) { .yeezy-grid { grid-template-columns: repeat(4, 1fr); } }
        .modal { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; overflow-y: auto; }
        .btn-black { background: #000; color: #fff; padding: 20px; font-size: 10px; font-weight: 900; width: 100%; letter-spacing: 0.2em; }
        .size-chip { border: 1px solid #eee; padding: 12px; font-size: 10px; font-weight: 900; text-align: center; cursor: pointer; }
        .size-chip.active { background: #000; color: #fff; border-color: #000; }
        #cartSide { transform: translateX(100%); transition: 0.4s; position: fixed; top:0; right:0; height:100%; width:100%; max-width:400px; background:#fff; z-index:2000; padding:40px; }
        #cartSide.show { transform: translateX(0); }
    </style>
</head>
<body>

<nav class="p-6 flex justify-between items-center sticky top-0 bg-white/90 z-50 border-b">
    <button onclick="openOrders()" class="text-[10px] font-black">Tracking</button>
    <img src="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776343746/NEVEREVER_LOGO_boeayw.jpg" class="h-8 grayscale">
    <div class="flex gap-4">
        <button id="authBtn" onclick="openAuth()" class="text-[10px] font-black">Login</button>
        <button onclick="toggleCart(true)" class="text-[10px] font-black">Cart (<span id="cartCount">0</span>)</button>
    </div>
</nav>

<main class="yeezy-grid" id="main-grid"></main>

<div id="authModal" class="modal flex items-center justify-center">
    <div class="max-w-xs w-full p-10 space-y-4">
        <h2 id="authTitle" class="text-center font-black text-[10px] mb-6">Login</h2>
        <input type="text" id="authUser" placeholder="Username" class="border-b w-full py-4 text-[10px] font-black outline-none">
        <input type="password" id="authPass" placeholder="Password" class="border-b w-full py-4 text-[10px] font-black outline-none">
        <button onclick="handleAuth()" class="btn-black">Continue</button>
        <p onclick="toggleMode()" id="modeText" class="text-center text-[8px] font-black opacity-40 cursor-pointer pt-4">Need an account? Sign up</p>
        <button onclick="document.getElementById('authModal').style.display='none'" class="w-full text-[8px] mt-4">Close</button>
    </div>
</div>

<div id="ordersModal" class="modal">
    <div class="p-6 border-b flex justify-between items-center"><button onclick="document.getElementById('ordersModal').style.display='none'" class="text-[10px] font-black">← Back</button><span class="text-[10px] font-black">My Tracking</span><div class="w-10"></div></div>
    <div id="my-orders-list" class="p-10 max-w-xl mx-auto space-y-6"></div>
</div>

<div id="productModal" class="modal">
    <div class="p-6 border-b flex justify-between"><button onclick="document.getElementById('productModal').style.display='none'" class="text-[10px] font-black">← Back</button><span class="text-[10px] font-black italic">NEVEREVER</span></div>
    <div class="grid grid-cols-1 md:grid-cols-2">
        <div id="pGallery" class="flex flex-col gap-1"></div>
        <div class="p-10 md:p-20 space-y-10">
            <div><h1 id="pName" class="text-2xl font-black italic"></h1><p id="pPrice" class="text-lg font-bold mt-2"></p></div>
            <div><p class="text-[9px] font-black opacity-30 mb-4">Select Size</p><div id="sizeGrid" class="grid grid-cols-4 gap-2"></div></div>
            <button onclick="addToCart()" class="btn-black">Add To Cart</button>
        </div>
    </div>
</div>

<div id="cartSide">
    <div class="flex justify-between items-center mb-10"><h2 class="text-xl font-black italic">Cart</h2><button onclick="toggleCart(false)" class="text-[10px] font-black opacity-30">Close</button></div>
    <div id="cartItems" class="space-y-4"></div>
    <div id="checkoutForm" class="mt-10 pt-10 border-t space-y-4 hidden">
        <input type="text" id="orderAddr" placeholder="Delivery Address" class="w-full border-b py-3 text-[10px] font-black"><button id="uploadSS" class="w-full border p-4 text-[9px] font-black">📸 Upload Receipt</button>
        <input type="hidden" id="paymentImg"><button onclick="checkout()" class="btn-black">Place Order</button>
    </div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script>
    let allItems = [], cart = {}, user = JSON.parse(localStorage.getItem('neverUser')), currentItem = null, selectedSize = null, isLoginMode = true;

    async function init() {
        const res = await fetch('/items');
        allItems = await res.json();
        renderGrid(allItems);
        if(user) document.getElementById('authBtn').innerText = user.username;
    }

    function renderGrid(data) {
        document.getElementById('main-grid').innerHTML = data.map(i => `
            <div class="product-card" onclick="openProduct('${i._id}')">
                <img src="${i.images[0]}" class="w-full aspect-[3/4] object-cover mb-4">
                <p class="text-[10px] font-black text-center">${i.name}<br><span class="opacity-30">${i.price.toLocaleString()} MMK</span></p>
            </div>`).join('');
    }

    function openProduct(id) {
        currentItem = allItems.find(i => i._id === id);
        selectedSize = null;
        document.getElementById('pName').innerText = currentItem.name;
        document.getElementById('pPrice').innerText = `${currentItem.price.toLocaleString()} MMK`;
        document.getElementById('pGallery').innerHTML = currentItem.images.map(img => `<img src="${img}">`).join('');
        document.getElementById('sizeGrid').innerHTML = currentItem.availableSizes.map(s => `<div class="size-chip" onclick="selSize(this, '${s}')">${s}</div>`).join('');
        document.getElementById('productModal').style.display = 'block';
    }

    function selSize(el, s) { document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); selectedSize = s; }
    function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
    function toggleMode() { isLoginMode = !isLoginMode; document.getElementById('authTitle').innerText = isLoginMode ? "Login" : "Sign Up"; document.getElementById('modeText').innerText = isLoginMode ? "Need an account? Sign up" : "Have an account? Login"; }
    function toggleCart(s) { document.getElementById('cartSide').classList.toggle('show', s); updateCart(); }

    async function handleAuth() {
        const username = document.getElementById('authUser').value, password = document.getElementById('authPass').value;
        const res = await fetch(isLoginMode ? '/auth/login' : '/auth/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username, password})});
        const d = await res.json();
        if(res.ok) { localStorage.setItem('neverUser', JSON.stringify(d.user)); location.reload(); } else alert("Failed");
    }

    function updateCart() {
        const keys = Object.keys(cart);
        document.getElementById('cartCount').innerText = keys.length;
        document.getElementById('cartItems').innerHTML = keys.map(k => `<div class="flex justify-between text-[10px] font-black"><span>${k} x${cart[k]}</span><button onclick="delete cart['${k}'];updateCart()">Remove</button></div>`).join('');
        document.getElementById('checkoutForm').classList.toggle('hidden', keys.length === 0);
    }

    function addToCart() {
        if(!selectedSize) return alert("Select size");
        const key = `${currentItem.name} (${selectedSize})`;
        cart[key] = (cart[key] || 0) + 1;
        toggleCart(true);
    }

    var widget = cloudinary.createUploadWidget({ cloudName:'dawhhgjsd', uploadPreset:'dawhhgjsd' }, (e,r) => { if(r.event==="success") { document.getElementById('paymentImg').value = r.info.secure_url; document.getElementById('uploadSS').innerText = "✅ Attached"; }});
    document.getElementById("uploadSS").onclick = () => widget.open();

    async function checkout() {
        if(!user) return openAuth();
        const data = { userId:user.id, username:user.username, items:Object.keys(cart), address:document.getElementById('orderAddr').value, paymentScreenshot:document.getElementById('paymentImg').value, totalMMK: 10000 };
        await fetch('/submit-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
        alert("Ordered!"); location.reload();
    }

    async function openOrders() {
        if(!user) return openAuth();
        const orders = await (await fetch(`/my-orders/${user.id}`)).json();
        document.getElementById('ordersModal').style.display = 'block';
        document.getElementById('my-orders-list').innerHTML = orders.map(o => `
            <div class="border p-6 space-y-4 bg-gray-50">
                <div class="flex justify-between items-center text-[10px] font-black"><span>Order #${o._id.slice(-5)}</span><span class="bg-black text-white px-2 py-1 rounded-full text-[8px]">${o.status}</span></div>
                <p class="text-[11px] font-black">Estimated: <span class="text-green-600">${o.estArrival || 'Verification'}</span></p>
                <div class="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden"><div class="bg-black h-full" style="width: ${o.status=='Pending'?'20%':o.status=='Shipped'?'70%':'100%'}"></div></div>
            </div>`).join('') || '<p class="text-center opacity-20">No orders</p>';
    }

    init();
</script>
</body>
</html>
