<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVEREVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f4f4f4; color: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; text-transform: uppercase; -webkit-font-smoothing: antialiased; }
        .yeezy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; }
        @media (min-width: 768px) { .yeezy-grid { grid-template-columns: repeat(4, 1fr); } }
        
        /* Ultra minimal inputs and buttons */
        input { border: none; border-bottom: 1px solid #000; border-radius: 0; padding: 10px 0; width: 100%; outline: none; background: transparent; font-size: 11px; margin-bottom: 15px;}
        button { background: transparent; color: #000; text-transform: uppercase; border: none; outline: none; cursor: pointer; }
        
        .btn-fill { background: #000; color: #fff; padding: 15px; width: 100%; font-size: 11px; letter-spacing: 1px; }
        .btn-fill:hover { background: #333; }

        .size-chip, .color-chip { padding: 10px; font-size: 11px; text-align: center; cursor: pointer; color: #aaa; }
        .size-chip:hover, .color-chip:hover { color: #000; }
        .size-chip.active, .color-chip.active { color: #000; font-weight: bold; text-decoration: underline; }

        /* Slide Out Panels (Cart, Auth, Tracking) */
        .side-panel { transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: fixed; top: 0; right: 0; height: 100vh; width: 100%; max-width: 450px; background: #fff; z-index: 2000; padding: 40px; overflow-y: auto; }
        .side-panel.show { transform: translateX(0); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 1500; }
        .overlay.show { display: block; }
        /* Product Detail Full Screen */
        #productView { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; overflow-y: auto; padding-top: 60px;}
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; z-index: 10; opacity: 0.7; border: 1px solid #ccc; font-weight: bold; font-family: monospace; }
        .slide-btn:hover { opacity: 1; }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<nav class="fixed top-0 left-0 w-full px-4 py-4 flex justify-between items-center bg-white/90 backdrop-blur-sm z-50 text-[9px] md:text-[11px] font-bold tracking-widest">
    <div class="flex gap-3 md:gap-6 z-10">
        <button onclick="filter('Instock')" class="hover:underline">INSTOCK</button>
        <button onclick="filter('Preorder')" class="hover:underline text-gray-400">PREORDER</button>
        <button onclick="filter('Sold Out')" class="hover:underline text-gray-400 hidden sm:inline-block">SOLD OUT</button>
    </div>
    <div class="h-8 md:h-10 flex items-center justify-center absolute left-1/2 -translate-x-1/2">
        <img src="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776423940/szt6butb9fnufnwybq6v.jpg" class="h-full object-contain" alt="NEVEREVER">
    </div>
    <div class="flex gap-3 md:gap-6 z-10">
        <button id="authBtn" onclick="openPanel('authPanel')" class="hover:underline uppercase">LOGIN</button>
        <button onclick="openOrders()" class="hover:underline hidden shadow-sm" id="trackBtn">ORDERS</button>
        <button onclick="openPanel('cartPanel')" class="hover:underline">CART (<span id="cartCount">0</span>)</button>
    </div>
</nav>

<main class="yeezy-grid pt-[60px]" id="main-grid"></main>

<div id="productView">
    <button onclick="document.getElementById('productView').style.display='none'" class="fixed top-6 left-6 z-50 text-[11px] font-bold hover:underline">BACK</button>
    <div class="max-w-4xl mx-auto flex flex-col items-center pb-20">
        <div class="w-full max-w-md mx-auto mb-10 overflow-hidden relative group">
            <button onclick="document.getElementById('pGallery').scrollBy({left: -300, behavior: 'smooth'})" class="slide-btn flex left-2">&lt;</button>
            <button onclick="document.getElementById('pGallery').scrollBy({left: 300, behavior: 'smooth'})" class="slide-btn flex right-2">&gt;</button>
            <div id="pGallery" class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar"></div>
        </div>
        <div class="w-full max-w-md px-6 text-center space-y-6">
            <h1 id="pName" class="text-xl"></h1>
            <p id="pPrice" class="text-[12px] text-gray-500"></p>
            <p id="pDesc" class="text-[11px] text-gray-400 lowercase leading-relaxed"></p>
            
            <div id="sizeGrid" class="flex justify-center gap-4 mt-8"></div>
            <div id="colorGrid" class="flex justify-center gap-4 mt-4"></div>
            <button onclick="addToCart()" class="btn-fill mt-8">ADD TO CART</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<div id="cartPanel" class="side-panel">
    <div class="flex justify-between items-center mb-10 text-[11px] font-bold"><h2 class="text-lg">CART</h2><button onclick="closeAllPanels()" class="hover:underline">CLOSE</button></div>
    <div id="cartItems" class="space-y-6 mb-10"></div>
    
    <div id="checkoutForm" class="hidden space-y-4">
        <div class="flex justify-between text-[11px] font-bold border-t border-black pt-4 mb-8"><span>TOTAL</span><span id="cartTotal"></span></div>
        <div class="text-[10px] text-gray-500 space-y-1 mb-8">
            <p>TRANSFER EXACT AMOUNT TO:</p>
            <p class="text-black">K-PAY / WAVE: 09450151480 (Pyay Moe)</p>
        </div>
        <input type="text" id="orderName" placeholder="YOUR FULL NAME">
        <input type="text" id="orderTg" placeholder="TELEGRAM USERNAME">
        <input type="text" id="orderPhone" placeholder="PHONE NUMBER">
        <input type="text" id="orderAddr" placeholder="DELIVERY ADDRESS">
        <button id="uploadSS" class="w-full border border-gray-300 p-4 text-[11px] mb-4 hover:border-black transition-colors">UPLOAD PAYMENT RECEIPT</button>
        <input type="hidden" id="paymentImg">
        <button onclick="checkout()" class="btn-fill">PLACE ORDER</button>
    </div>
</div>

<div id="authPanel" class="side-panel">
    <div class="flex justify-between items-center mb-10 text-[11px] font-bold"><h2 id="authTitle" class="text-lg">LOGIN</h2><button onclick="closeAllPanels()" class="hover:underline">CLOSE</button></div>
    <input type="text" id="authUser" placeholder="USERNAME">
    <input type="password" id="authPass" placeholder="PASSWORD">
    <button onclick="handleAuth()" class="btn-fill mt-4">CONTINUE</button>
    <button onclick="toggleMode()" id="modeText" class="w-full text-center text-[10px] text-gray-400 mt-6 hover:text-black">NEED AN ACCOUNT? SIGN UP</button>
    
    <div class="mt-8 flex justify-center w-full">
        <div id="g_id_onload"
             data-client_id="866705523346-4dnad433fs6ckk7lieark8a764h8ulp8.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleAuth"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="center"></div>
    </div>
</div>

<div id="ordersPanel" class="side-panel">
    <div class="flex justify-between items-center mb-10 text-[11px] font-bold"><h2 class="text-lg">ORDERS</h2><button onclick="closeAllPanels()" class="hover:underline">CLOSE</button></div>
    <div id="my-orders-list" class="space-y-8"></div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script>
    let allItems = [], cart = {}, user = JSON.parse(localStorage.getItem('neverUser')), currentItem = null, selectedSize = null, selectedColor = null, isLoginMode = true;

    async function init() {
        const res = await fetch('/api/items');
        allItems = await res.json();
        filter('Instock');
        if(user) {
            document.getElementById('authBtn').innerHTML = 'PROFILE';
            document.getElementById('trackBtn').classList.remove('hidden');
        }
    }

    function filter(cat) {
        const filtered = allItems.filter(i => cat === 'All' ? true : i.category === cat);
        document.getElementById('main-grid').innerHTML = filtered.map(i => `
            <div class="cursor-pointer group flex flex-col h-full relative" onclick="openProduct('${i._id}')">
                ${i.category === 'Sold Out' ? `<div class="absolute top-4 left-4 bg-blue-700 text-white text-[9px] font-bold py-1 px-4 z-10">SOLD OUT</div>` : ''}
                <div class="p-3 sm:p-8 w-full flex-grow flex flex-col justify-end">
                    <div class="w-full overflow-hidden bg-[#f4f4f4] relative" style="padding-bottom: 100%;">
                        <img src="${i.images[0]}" class="absolute inset-0 w-full h-full object-contain p-2 group-hover:scale-105 transition-transform duration-500">
                    </div>
                </div>
                <div class="flex flex-col flex-grow justify-between text-center px-2 pb-6 mt-4">
                    <div class="flex flex-col justify-start">
                        <p class="text-[10px] font-mono tracking-widest uppercase mb-2 leading-relaxed">${i.name}</p>
                    </div>
                    <p class="text-[10px] font-mono tracking-widest text-[#555] mt-auto">${i.price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})} MMK</p>
                </div>
            </div>`).join('') || '<p class="text-[11px] text-gray-400 p-8">NO PRODUCTS FOUND.</p>';
    }

    function openProduct(id) {
        currentItem = allItems.find(i => i._id === id);
        selectedSize = null;
        document.getElementById('pName').innerText = currentItem.name;
        document.getElementById('pPrice').innerText = `${currentItem.price.toLocaleString()} MMK`;
        document.getElementById('pDesc').innerText = currentItem.description || "NO DESCRIPTION AVAILABLE.";
        document.getElementById('pGallery').innerHTML = currentItem.images.map(img => `
            <div class="w-full flex-none snap-center relative" style="padding-bottom: 125%;">
                <img src="${img}" class="absolute inset-0 w-full h-full object-contain p-2 bg-[#f4f4f4]">
            </div>
        `).join('');
        document.getElementById('sizeGrid').innerHTML = (currentItem.availableSizes || []).map(s => `<div class="size-chip" onclick="selSize(this, '${s}')">${s}</div>`).join('');
        document.getElementById('colorGrid').innerHTML = (currentItem.availableColors || []).map(c => `<div class="color-chip" onclick="selColor(this, '${c}')">${c}</div>`).join('');
        selectedColor = null;
        
        document.getElementById('productView').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function selSize(el, s) { document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); selectedSize = s; }
    function selColor(el, c) { document.querySelectorAll('.color-chip').forEach(e => e.classList.remove('active')); el.classList.add('active'); selectedColor = c; }
    
    function openPanel(id) { 
        document.getElementById('overlay').classList.add('show');
        document.getElementById(id).classList.add('show');
        if(id === 'cartPanel') updateCart();
    }
    
    function closeAllPanels() {
        document.getElementById('overlay').classList.remove('show');
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('show'));
    }

    function toggleMode() { 
        isLoginMode = !isLoginMode; 
        document.getElementById('authTitle').innerText = isLoginMode ? "LOGIN" : "REGISTER"; 
        document.getElementById('modeText').innerText = isLoginMode ? "NEED AN ACCOUNT? SIGN UP" : "HAVE AN ACCOUNT? LOGIN"; 
    }

    async function handleAuth() {
        const u = document.getElementById('authUser').value, p = document.getElementById('authPass').value;
        const endpoint = isLoginMode ? '/auth/login' : '/auth/signup';
        const res = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
        const d = await res.json();
        if(res.ok) { 
            localStorage.setItem('neverUser', JSON.stringify(d.user)); 
            location.reload(); 
        } else alert(d.error || "Authentication Failed");
    }

    async function handleGoogleAuth(response) {
        const res = await fetch('/auth/google', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token: response.credential})});
        const d = await res.json();
        if(res.ok) { 
            localStorage.setItem('neverUser', JSON.stringify(d.user)); 
            location.reload(); 
        } else alert(d.error || "Google Sign-In Failed");
    }

    function addToCart() {
        if((currentItem.availableSizes || []).length && !selectedSize) return alert("PLEASE SELECT A SIZE");
        if((currentItem.availableColors || []).length && !selectedColor) return alert("PLEASE SELECT A COLOR");
        const key = `${currentItem._id}-${selectedSize || 'NOSZ'}-${selectedColor || 'NOC'}`;
        if(cart[key]) cart[key].qty += 1;
        else cart[key] = { item: currentItem, size: selectedSize, color: selectedColor, qty: 1, image: currentItem.images[0] };
        
        document.getElementById('productView').style.display = 'none';
        openPanel('cartPanel');
    }

    function updateCart() {
        const keys = Object.keys(cart);
        let totalMMK = 0, totalItems = 0;
        
        document.getElementById('cartItems').innerHTML = keys.map(k => {
            const c = cart[k];
            totalMMK += c.item.price * c.qty;
            totalItems += c.qty;
            return `
            <div class="flex justify-between items-start text-[11px] mb-4">
                <div class="flex gap-4">
                    <img src="${c.image || c.item.images[0]}" class="w-16 h-20 object-cover">
                    <div><p>${c.item.name}</p><p class="text-gray-400">SIZE: ${c.size || 'N/A'}</p><p class="text-gray-400">COLOR: ${c.color || 'N/A'}</p><p class="text-gray-400">QTY: ${c.qty}</p></div>
                </div>
                <div class="text-right">
                    <p>${(c.item.price * c.qty).toLocaleString()} MMK</p>
                    <button onclick="delete cart['${k}'];updateCart()" class="text-gray-400 mt-2 hover:text-black">REMOVE</button>
                </div>
            </div>`;
        }).join('') || '<p class="text-[11px] text-gray-400">YOUR CART IS EMPTY.</p>';
        
        document.getElementById('cartCount').innerText = totalItems;
        document.getElementById('cartTotal').innerText = `${totalMMK.toLocaleString()} MMK`;
        document.getElementById('checkoutForm').style.display = keys.length ? 'block' : 'none';
    }

    var widget = cloudinary.createUploadWidget({ cloudName:'dawhhgjsd', uploadPreset:'dawhhgjsd' }, (e,r) => { 
        if(r.event==="success") { 
            document.getElementById('paymentImg').value = r.info.secure_url; 
            document.getElementById('uploadSS').innerText = "RECEIPT ATTACHED ✓"; 
            document.getElementById('uploadSS').style.borderColor = "#000";
        }
    });
    document.getElementById("uploadSS").onclick = () => widget.open();

    async function checkout() {
        if(!user) {
            alert("YOU MUST BE SIGNED IN TO PLACE AN ORDER");
            return openPanel('authPanel');
        }
        if(!document.getElementById('paymentImg').value) return alert("PLEASE UPLOAD RECEIPT");
        if(!document.getElementById('orderName').value || !document.getElementById('orderTg').value) return alert("FULL NAME AND TELEGRAM REQUIRED");
        if(!document.getElementById('orderPhone').value || !document.getElementById('orderAddr').value) return alert("ADDRESS AND PHONE REQUIRED");
        
        let total = 0;
        const formattedItems = Object.values(cart).map(c => {
            total += c.item.price * c.qty;
            return { name: c.item.name, size: c.size, color: c.color, qty: c.qty, price: c.item.price, image: c.image || c.item.images[0] };
        });

        const data = { 
            userId: user.id, username: user.username, 
            customerName: document.getElementById('orderName').value,
            telegram: document.getElementById('orderTg').value,
            phone: document.getElementById('orderPhone').value,
            address: document.getElementById('orderAddr').value, 
            items: formattedItems, paymentScreenshot: document.getElementById('paymentImg').value, totalMMK: total 
        };
        
        await fetch('/api/submit-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
        alert("ORDER PLACED"); 
        location.reload();
    }

    async function openOrders() {
        if(!user) return;
        const orders = await (await fetch(`/api/my-orders/${user.id}`)).json();
        openPanel('ordersPanel');
        document.getElementById('my-orders-list').innerHTML = orders.map(o => `
            <div class="text-[11px] pb-6 border-b border-gray-200">
                <div class="flex justify-between mb-4"><span class="font-bold">#${o._id.slice(-6)}</span><span class="${o.status === 'Pending' ? 'text-gray-400' : 'text-black'}">${o.status}</span></div>
                <div class="space-y-4 mb-4">
                    ${o.items.map(i => {
                        const dbMatch = allItems.find(it => it.name === i.name);
                        const imgSrc = i.image || (dbMatch ? dbMatch.images[0] : '');
                        return `
                        <div class="flex items-center gap-4">
                            ${imgSrc ? `<img src="${imgSrc}" class="w-12 h-12 object-cover bg-gray-50 border border-gray-100">` : ''}
                            <div>
                                <p>${i.name}</p>
                                <p class="text-gray-500">${i.qty}x SIZE ${i.size || 'N/A'} | COLOR ${i.color || 'N/A'}</p>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
                <p>TOTAL: ${o.totalMMK.toLocaleString()} MMK</p>
                ${o.estArrival ? `<p class="mt-2 text-gray-500">EST: ${o.estArrival}</p>` : ''}
            </div>`).join('') || '<p class="text-[11px] text-gray-400">NO ORDERS FOUND.</p>';
    }
    
    init();
</script>
</body>
</html>
