<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVEREVER</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776407597/izsqh19ttd1purqiscmx.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fff; color: #000; font-family: Helvetica, sans-serif; text-transform: uppercase; overflow-x: hidden; }
        .yeezy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #000; border-top: 1px solid #000; }
        .product-card { background: #fff; cursor: pointer; position: relative; }
        
        /* FIX: Image aspect ratio & stretching */
        .product-card img { width: 100%; aspect-ratio: 3/4; object-fit: contain; background: #f4f4f4; }
        #pGallery img { width: 100%; height: auto; object-fit: contain; background: #f4f4f4; }
        
        .modal { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; overflow-y: auto; }
        
        /* SIZE BOXES - AS PER YOUR REFERENCE */
        .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .size-box { 
            border: 2px solid #000; 
            padding: 15px 0; 
            text-align: center; 
            font-size: 11px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .size-box.active { background: #000; color: #fff; }
        .size-box.out { opacity: 0.2; pointer-events: none; text-decoration: line-through; }

        .btn-black { background: #000; color: #fff; padding: 20px; font-size: 11px; font-weight: 900; width: 100%; margin-top: 30px; }
    </style>
</head>
<body>

<nav class="p-6 flex justify-between items-center sticky top-0 bg-white z-50 border-b border-black">
    <div class="flex gap-6">
        <button onclick="filter('Instock')" class="text-[10px] font-black tracking-widest">INSTOCK</button>
        <button onclick="filter('Preorder')" class="text-[10px] font-black tracking-widest opacity-40">PREORDER</button>
    </div>
    <div class="flex gap-6">
        <button onclick="location.href='track.html'" class="text-[10px] font-black underline">TRACK</button>
        <button onclick="toggleCart(true)" class="text-[10px] font-black">BAG (<span id="cartCount">0</span>)</button>
    </div>
</nav>

<div id="main-grid" class="yeezy-grid"></div>

<div id="productModal" class="modal">
    <div class="p-6 border-b border-black flex justify-between sticky top-0 bg-white z-10">
        <button onclick="closeModal('productModal')" class="font-black text-[10px]">← CLOSE</button>
        <span class="text-[10px] font-black italic">PRODUCT DETAIL</span>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2">
        <div id="pGallery" class="flex flex-col gap-1 bg-[#f4f4f4]"></div>
        <div class="p-10 md:p-20 space-y-8">
            <div>
                <h1 id="pName" class="text-4xl font-black italic leading-tight"></h1>
                <p id="pPrice" class="text-xl font-bold mt-2"></p>
            </div>
            
            <div id="stockNotice"></div>

            <div>
                <p class="text-[10px] font-black opacity-40 mb-4">SELECT SIZE</p>
                <div id="sizeGrid" class="size-grid"></div>
            </div>

            <button id="addBtn" onclick="addToCart()" class="btn-black">ADD TO BAG</button>
            <p class="text-[9px] opacity-40 font-bold leading-relaxed">Tax included. Shipping calculated at checkout. All sales are final.</p>
        </div>
    </div>
</div>

<script>
    let allItems = [], cart = [], selectedSize = null, currentItem = null;

    async function init() {
        try {
            const res = await fetch('/items');
            allItems = await res.json();
            filter('Instock');
        } catch (e) {
            console.error("Failed to load items");
        }
    }

    function filter(cat) {
        const filtered = allItems.filter(i => i.category === cat);
        document.getElementById('main-grid').innerHTML = filtered.map(i => `
            <div class="product-card" onclick="openProduct('${i._id}')">
                <img src="${i.images[0]}">
                ${i.stock <= 0 || i.isSoldOut ? '<div class="absolute inset-0 bg-white/60 flex items-center justify-center font-black italic text-xs">SOLD OUT</div>' : ''}
                <div class="p-4 flex justify-between items-start">
                    <div>
                        <p class="text-[10px] font-black">${i.name}</p>
                        <p class="text-[10px] opacity-40">${i.price.toLocaleString()} MMK</p>
                    </div>
                </div>
            </div>`).join('');
    }

    function openProduct(id) {
        currentItem = allItems.find(i => i._id === id);
        selectedSize = null;
        
        document.getElementById('pName').innerText = currentItem.name;
        document.getElementById('pPrice').innerText = currentItem.price.toLocaleString() + ' MMK';
        document.getElementById('pGallery').innerHTML = currentItem.images.map(img => `<img src="${img}">`).join('');
        
        // Show stock count if low
        const stockInfo = document.getElementById('stockNotice');
        if(currentItem.stock <= 5 && currentItem.stock > 0) {
            stockInfo.innerHTML = `<p class="text-[10px] font-black text-orange-600">ONLY ${currentItem.stock} LEFT IN STOCK</p>`;
        } else {
            stockInfo.innerHTML = '';
        }

        // Render Size Boxes
        const sizes = currentItem.availableSizes || [];
        document.getElementById('sizeGrid').innerHTML = sizes.map(s => `
            <div class="size-box ${currentItem.stock <= 0 ? 'out' : ''}" onclick="setS(this, '${s}')">${s}</div>
        `).join('');

        document.getElementById('addBtn').disabled = currentItem.stock <= 0;
        document.getElementById('addBtn').innerText = currentItem.stock <= 0 ? 'SOLD OUT' : 'ADD TO BAG';
        
        document.getElementById('productModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function setS(el, s) {
        document.querySelectorAll('.size-box').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedSize = s;
    }

    function addToCart() {
        if(!selectedSize) return alert("PLEASE SELECT A SIZE");
        cart.push({...currentItem, size: selectedSize});
        document.getElementById('cartCount').innerText = cart.length;
        closeModal('productModal');
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    init();
</script>
</body>
</html>
