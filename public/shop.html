<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver | Shop</title>
    <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776343746/NEVEREVER_LOGO_boeayw.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f2f2f2; color: #000; font-family: 'Helvetica', 'Arial', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Grid Borders */
        #shop-grid { gap: 1px; background-color: #e0e0e0; border: 1px solid #e0e0e0; }
        .shop-item { background: #f2f2f2; padding: 40px 20px; transition: all 0.3s ease; position: relative; }
        .shop-item:hover { background: #fff; }

        /* Minimalist Navigation */
        .filter-btn { color: #888; transition: color 0.2s; font-size: 11px; letter-spacing: 0.1em; }
        .filter-btn.active { color: #000; text-decoration: underline; text-underline-offset: 4px; }

        /* Sold Logic */
        .sold-out img { filter: grayscale(1); opacity: 0.3; }
        .sold-text { position: absolute; top: 20px; right: 20px; font-size: 9px; font-weight: 900; letter-spacing: 2px; color: #ff0000; }

        /* Cart Side Panel */
        #cartModal { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #cartModal.show { transform: translateX(0); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-8 grid grid-cols-3 items-center sticky top-0 bg-[#f2f2f2]/90 backdrop-blur-md z-50 border-b border-black/5">
        <div class="flex gap-4">
            <a href="/track" class="text-[10px] font-black uppercase tracking-[0.2em]">Track</a>
        </div>
        
        <div class="flex justify-center">
            <a href="/">
                <img src="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776343746/NEVEREVER_LOGO_boeayw.jpg" 
                     alt="NeverEver" class="h-10 md:h-14 w-auto grayscale contrast-125">
            </a>
        </div>

        <div class="flex justify-end gap-6 items-center">
            <div id="userGreet" class="text-[10px] font-bold uppercase hidden md:block"></div>
            <button onclick="toggleCart()" class="text-[10px] font-black uppercase tracking-[0.2em]">Cart (<span id="cartCount">0</span>)</button>
        </div>
    </nav>

    <div class="flex justify-center gap-10 p-6 border-b border-black/5">
        <button onclick="setFilter('All')" class="filter-btn active uppercase font-bold">All</button>
        <button onclick="setFilter('Clothing')" class="filter-btn uppercase font-bold">Clothing</button>
        <button onclick="setFilter('Accessories')" class="filter-btn uppercase font-bold">Accessories</button>
    </div>

    <main class="max-w-7xl mx-auto border-x border-black/5">
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-4">
            </div>
    </main>

    <div id="cartOverlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[90] hidden" onclick="toggleCart()"></div>
    <div id="cartModal" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[100] p-10 shadow-2xl overflow-y-auto">
        <div class="flex justify-between items-center mb-16">
            <h2 class="text-xl font-black italic uppercase">Your Cart</h2>
            <button onclick="toggleCart()" class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Close</button>
        </div>

        <div id="cartItems" class="space-y-8 mb-16"></div>

        <div id="checkoutForm" class="hidden">
            <div class="flex justify-between border-t border-black pt-6 mb-10">
                <span class="text-[10px] font-black uppercase">Subtotal</span>
                <span id="cartTotal" class="font-bold"></span>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="orderAddr" placeholder="SHIPPING ADDRESS" class="w-full border-b border-black/10 py-4 text-[11px] font-bold outline-none focus:border-black transition-colors uppercase">
                <input type="text" id="orderPh" placeholder="PHONE NUMBER" class="w-full border-b border-black/10 py-4 text-[11px] font-bold outline-none focus:border-black transition-colors uppercase">
                
                <div class="pt-6">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-4">Transfer to: KPay/WavePay 09xxxxxxxxx</p>
                    <button id="uploadSS" class="w-full border border-black py-4 text-[10px] font-black uppercase tracking-widest hover:bg-black hover:text-white transition-all">📸 Upload Receipt</button>
                </div>
                
                <input type="hidden" id="paymentImg">
                <button onclick="submitOrder()" class="w-full bg-black text-white font-black py-6 text-[10px] uppercase tracking-[0.3em] mt-8 hover:bg-emerald-600 transition-colors">Place Order</button>
            </div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        let allItems = [];
        let currentCategory = 'All';
        let cart = [];
        const user = JSON.parse(localStorage.getItem('neverUser'));

        // Navbar Logic
        if(user) {
            document.getElementById('userGreet').innerHTML = `${user.username} <button onclick="logout()" class="ml-2 text-slate-400">Logout</button>`;
        } else {
            document.getElementById('userGreet').innerHTML = `<a href="/login" class="hover:underline">Login</a>`;
        }
        function logout() { localStorage.removeItem('neverUser'); location.reload(); }

        async function loadShop() {
            const res = await fetch('/items');
            allItems = await res.json();
            renderGrid();
        }

        function setFilter(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.includes(cat.toUpperCase()));
            });
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('shop-grid');
            const filtered = allItems.filter(i => (currentCategory === 'All' || i.category === currentCategory) && i.grade !== 'Pending').reverse();
            
            grid.innerHTML = filtered.map(i => {
                const isSold = i.grade === 'Soldout';
                return `
                <div class="shop-item group cursor-pointer ${isSold ? 'sold-out' : ''}" onclick="${isSold ? '' : `addToCart('${i.name}', ${i.price}, '${i.productImage}')`}">
                    ${isSold ? '<span class="sold-text text-red-500">SOLD OUT</span>' : ''}
                    <img src="${i.productImage}" class="w-full aspect-square object-contain mb-8 mix-blend-multiply group-hover:scale-105 transition-transform duration-700">
                    <div class="text-center">
                        <h3 class="text-[10px] font-black uppercase tracking-widest mb-1">${i.name}</h3>
                        <p class="text-[10px] text-slate-500 font-bold">${i.price.toLocaleString()} MMK</p>
                    </div>
                </div>`;
            }).join('');
        }

        function addToCart(name, price, img) {
            cart.push({name, price, img});
            updateCartUI();
            toggleCart(true); // Open cart automatically
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const total = cart.reduce((s,i)=>s+i.price, 0);
            document.getElementById('cartTotal').innerText = `${total.toLocaleString()} MMK`;
            
            document.getElementById('cartItems').innerHTML = cart.map((i,idx)=>`
                <div class="flex gap-6 items-center">
                    <img src="${i.img}" class="w-16 h-16 object-contain bg-slate-50">
                    <div class="flex-1">
                        <p class="text-[10px] font-black uppercase">${i.name}</p>
                        <p class="text-[10px] text-slate-400">${i.price.toLocaleString()} MMK</p>
                    </div>
                    <button onclick="cart.splice(${idx},1);updateCartUI()" class="text-[10px] font-bold">✕</button>
                </div>`).join('');

            if(cart.length > 0 && user) {
                document.getElementById('checkoutForm').classList.remove('hidden');
                document.getElementById('orderAddr').value = user.address;
                document.getElementById('orderPh').value = user.phone;
            } else {
                document.getElementById('checkoutForm').classList.add('hidden');
            }
        }

        function toggleCart(forceOpen = false) {
            const modal = document.getElementById('cartModal');
            const overlay = document.getElementById('cartOverlay');
            if(forceOpen) { modal.classList.add('show'); overlay.classList.remove('hidden'); }
            else { modal.classList.toggle('show'); overlay.classList.toggle('hidden'); }
        }

        var ssWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (e, r) => { 
            if(r.event==="success") { 
                document.getElementById('paymentImg').value = r.info.secure_url; 
                document.getElementById('uploadSS').innerText = "✅ RECEIPT UPLOADED";
                document.getElementById('uploadSS').classList.add('bg-black', 'text-white');
            }
        });
        document.getElementById("uploadSS").addEventListener("click", () => ssWidget.open());

        async function submitOrder() {
            const ss = document.getElementById('paymentImg').value; 
            if(!ss) return alert("Please upload screenshot!");
            
            const tempRef = Math.random().toString(36).substr(2, 6).toUpperCase();
            await fetch('/submit-order', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ userId: user.id, username: user.username, items: cart, totalMMK: cart.reduce((s,i)=>s+i.price,0), address: document.getElementById('orderAddr').value, phone: document.getElementById('orderPh').value, paymentScreenshot: ss })
            });
            alert(`ORDER SENT! REF: #${tempRef}`); location.reload();
        }

        loadShop();
    </script>
</body>
</html>
