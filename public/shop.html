<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver — Online Fashion Shop Myanmar</title>
    <meta name="description" content="Shop trendy fashion and accessories at NeverEver — Myanmar's online store with K-PAY & Wave payment. Fast delivery across Myanmar.">
    <meta property="og:title" content="NeverEver — Online Fashion Shop Myanmar">
    <meta property="og:description" content="Shop trendy fashion and accessories at NeverEver. Pay with K-PAY & Wave. Fast delivery across Myanmar.">
    <meta property="og:image" content="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776423940/szt6butb9fnufnwybq6v.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black: #000;
            --white: #fff;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --red: #c41e1e;
            --red-soft: #e63946;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Space Mono', 'SF Mono', 'Courier New', monospace;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--gray-50);
            color: var(--black);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* ── Typography ─────────────────────────────────── */
        .uppercase { text-transform: uppercase; }
        .tracking { letter-spacing: 0.12em; }
        .tracking-tight { letter-spacing: -0.02em; }
        .font-mono { font-family: var(--font-mono); }
        .text-xs { font-size: 10px; line-height: 1.4; }
        .text-sm { font-size: 11px; line-height: 1.5; }
        .text-base { font-size: 13px; line-height: 1.6; }
        .text-lg { font-size: 16px; }
        .text-xl { font-size: 20px; }

        /* ── Product Grid ───────────────────────────────── */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: var(--gray-200);
        }
        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 1200px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .product-card {
            background: var(--white);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .product-card .card-img-wrap {
            position: relative;
            padding-bottom: 120%;
            overflow: hidden;
            background: var(--gray-50);
        }
        .product-card .card-img-wrap img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 16px;
            transition: transform 0.6s var(--transition), opacity 0.4s ease;
        }
        .product-card:hover .card-img-wrap img {
            transform: scale(1.06);
        }
        .product-card .card-info {
            padding: 16px 12px 20px;
            text-align: center;
        }
        .product-card .card-name {
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 6px;
            line-height: 1.5;
            font-weight: 700;
        }
        .product-card .card-price {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--gray-500);
            letter-spacing: 0.1em;
        }
        .product-card .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--black);
            color: var(--white);
            font-size: 9px;
            font-weight: 700;
            padding: 4px 10px;
            letter-spacing: 0.1em;
            z-index: 5;
            text-transform: uppercase;
        }
        .product-card .badge.preorder {
            background: var(--gray-700);
        }
        .product-card .badge.instock {
            background: var(--black);
        }

        /* Lazy image fade-in */
        .lazy-img {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .lazy-img.loaded {
            opacity: 1;
        }

        /* ── Skeleton Loading ───────────────────────────── */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0;
        }
        .skeleton-card {
            background: var(--white);
        }
        .skeleton-card .skel-img {
            padding-bottom: 120%;
            background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-card .skel-text {
            padding: 16px 12px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .skeleton-card .skel-line {
            height: 10px;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        /* ── Nav ────────────────────────────────────────── */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .nav-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px;
            padding: 0 16px;
        }
        .nav-logo {
            height: 28px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .nav-filters {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 16px;
            height: 36px;
            border-top: 1px solid rgba(0,0,0,0.04);
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .nav-filters::-webkit-scrollbar { display: none; }

        .nav-link {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--black);
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 2px;
            position: relative;
            transition: color 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .nav-link:hover { color: var(--gray-500); }
        .nav-link.muted { color: var(--gray-400); }
        .nav-link.muted:hover { color: var(--black); }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 1.5px;
            background: var(--black);
        }

        .nav-group { display: flex; gap: 10px; z-index: 10; align-items: center; }

        /* Desktop: single row */
        @media (min-width: 768px) {
            .nav { flex-direction: row; align-items: center; height: 64px; padding: 0 40px; }
            .nav-top { height: auto; padding: 0; flex: 1; }
            .nav-logo { height: 36px; }
            .nav-filters {
                position: absolute;
                left: 0;
                padding: 0 40px;
                border-top: none;
                height: 64px;
                gap: 24px;
            }
            .nav-link { font-size: 11px; padding: 8px 4px; }
            .nav-group { gap: 20px; }
        }

        /* Spacer to push content below fixed nav */
        .nav-spacer {
            height: 88px; /* 52px top + 36px filters */
        }
        @media (min-width: 768px) {
            .nav-spacer { height: 64px; }
        }

        /* ── Search Bar ─────────────────────────────────── */
        .search-bar {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 20px;
        }
        .search-input {
            width: 100%;
            border: none;
            outline: none;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.08em;
            padding: 12px 0;
            background: transparent;
            text-transform: uppercase;
        }
        .search-input::placeholder { color: var(--gray-400); }

        /* ── Side Panels ────────────────────────────────── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 500;
            opacity: 0;
            transition: opacity 0.3s var(--transition);
        }
        .overlay.show {
            display: block;
            opacity: 1;
        }

        .side-panel {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            height: 100dvh;
            width: 100%;
            max-width: 460px;
            background: var(--white);
            z-index: 600;
            padding: 40px 28px;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.4s var(--transition);
        }
        .side-panel.show { transform: translateX(0); }
        @media (min-width: 768px) {
            .side-panel { padding: 48px 40px; }
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .panel-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .panel-close {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray-500);
            transition: color 0.2s;
            padding: 8px;
        }
        .panel-close:hover { color: var(--black); }

        /* ── Product View (Full Screen) ─────────────────── */
        #productView {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--white);
            z-index: 400;
            overflow-y: auto;
            padding-top: 64px;
        }
        #productView.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pv-gallery {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .pv-gallery::-webkit-scrollbar { display: none; }
        .pv-gallery-item {
            flex: none;
            width: 100%;
            position: relative;
            padding-bottom: 125%;
            scroll-snap-align: center;
        }
        .pv-gallery-item img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 16px;
            background: var(--gray-50);
        }
        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 700;
        }
        .pv-gallery-wrap:hover .slide-btn { opacity: 0.8; }
        .slide-btn:hover { opacity: 1 !important; background: var(--white); }

        /* Gallery Pagination Dots */
        .pv-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            padding-bottom: 8px;
        }
        .pv-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gray-300);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            padding: 0;
        }
        .pv-dot.active {
            background: var(--black);
            transform: scale(1.2);
        }

        @media (max-width: 767px) {
            .slide-btn { display: none !important; }
        }
        @media (min-width: 768px) {
            .pv-dots { display: none; }
        }

        .pv-info {
            text-align: center;
            padding: 24px 24px 60px;
            max-width: 500px;
            margin: 0 auto;
            animation: slideUp 0.4s ease 0.1s both;
        }
        .pv-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .pv-price {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--gray-500);
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }
        .pv-desc {
            font-size: 12px;
            color: var(--gray-500);
            line-height: 1.8;
            text-transform: none;
            max-width: 380px;
            margin: 0 auto 24px;
        }

        /* Size / Color Chips */
        .chip-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .chip {
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--gray-400);
            border: 1px solid transparent;
            transition: all 0.2s;
            background: none;
        }
        .chip:hover { color: var(--black); }
        .chip.active {
            color: var(--black);
            border-color: var(--black);
        }

        /* ── Buttons ────────────────────────────────────── */
        .btn-primary {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--black);
            color: var(--white);
            border: none;
            font-family: var(--font-sans);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-primary:hover { background: var(--gray-800); }
        .btn-primary:active { transform: scale(0.985); }
        .btn-primary.disabled { 
            background: var(--gray-300); 
            cursor: not-allowed; 
        }

        .btn-outline {
            display: block;
            width: 100%;
            padding: 16px;
            background: transparent;
            color: var(--black);
            border: 1px solid var(--gray-200);
            font-family: var(--font-sans);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-outline:hover { border-color: var(--black); }
        
        .load-more-container {
            padding: 40px 24px 60px;
            display: flex;
            justify-content: center;
            background: var(--gray-50);
        }
        #loadMoreBtn {
            max-width: 240px;
        }

        /* ── Inputs ─────────────────────────────────────── */
        .input {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--gray-200);
            padding: 12px 0;
            font-family: var(--font-sans);
            font-size: 11px;
            letter-spacing: 0.04em;
            outline: none;
            background: transparent;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            text-transform: uppercase;
        }
        .input:focus { border-bottom-color: var(--black); }
        .input::placeholder { color: var(--gray-400); text-transform: uppercase; }

        /* ── Cart Items ─────────────────────────────────── */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gray-100);
        }
        .cart-item-left { display: flex; gap: 16px; }
        .cart-item-img {
            width: 64px;
            height: 80px;
            object-fit: cover;
            background: var(--gray-50);
        }
        .cart-item-name {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .cart-item-meta {
            font-size: 10px;
            color: var(--gray-500);
            line-height: 1.6;
            text-transform: uppercase;
        }
        .cart-item-price {
            font-family: var(--font-mono);
            font-size: 11px;
            text-align: right;
        }
        .cart-item-remove {
            font-size: 10px;
            color: var(--gray-400);
            cursor: pointer;
            background: none;
            border: none;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }
        .cart-item-remove:hover { color: var(--red); }

        /* ── Toast Notification System ──────────────────── */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--black);
            color: var(--white);
            padding: 14px 20px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            pointer-events: auto;
            transform: translateX(120%);
            opacity: 0;
            transition: transform 0.4s var(--transition), opacity 0.4s;
            max-width: 340px;
            line-height: 1.5;
        }
        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }
        .toast.toast-error {
            background: var(--black);
            border-left: 3px solid var(--red);
        }
        .toast.toast-success {
            background: var(--black);
            border-left: 3px solid #22c55e;
        }

        /* ── Order Card ─────────────────────────────────── */
        .order-card {
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gray-100);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .order-id {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .order-status {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 10px;
        }
        .order-status.pending { color: var(--gray-400); }
        .order-status.shipped { color: var(--black); background: var(--gray-100); }
        .order-status.delivered { color: #22c55e; }

        .order-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .order-item img {
            width: 48px;
            height: 48px;
            object-fit: cover;
            background: var(--gray-50);
            border: 1px solid var(--gray-100);
        }
        .order-item-name {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .order-item-meta {
            font-size: 10px;
            color: var(--gray-500);
            text-transform: uppercase;
        }
        .order-total {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            margin-top: 12px;
            text-transform: uppercase;
        }
        .order-est {
            font-size: 10px;
            color: var(--gray-500);
            margin-top: 6px;
            text-transform: uppercase;
        }

        /* ── Footer ─────────────────────────────────────── */
        .footer {
            border-top: 1px solid var(--gray-200);
            padding: 48px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        @media (min-width: 768px) {
            .footer {
                flex-direction: row;
                justify-content: space-between;
                padding: 56px 48px;
            }
        }
        .footer-brand {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .footer-sub {
            font-size: 10px;
            color: var(--gray-400);
            letter-spacing: 0.1em;
            margin-top: 4px;
            text-transform: uppercase;
        }
        .footer-links {
            display: flex;
            gap: 24px;
        }
        .footer-link {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray-500);
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-link:hover { color: var(--black); }

        /* ── Auth Panel ─────────────────────────────────── */
        .auth-divider {
            font-size: 10px;
            color: var(--gray-400);
            text-align: center;
            margin: 24px 0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ── Content copy (FAQs/Policy) ─────────────────── */
        .content-copy {
            text-transform: none;
            white-space: pre-line;
            font-size: 12px;
            line-height: 2;
            color: var(--gray-600);
        }

        /* ── Utility ────────────────────────────────────── */
        .hidden { display: none !important; }
        .mb-0 { margin-bottom: 0; }
        .mt-4 { margin-top: 16px; }
        .mt-6 { margin-top: 24px; }
        .mt-8 { margin-top: 32px; }
        .mb-4 { margin-bottom: 16px; }
        .space-y-4 > * + * { margin-top: 16px; }
        .space-y-6 > * + * { margin-top: 24px; }

        /* ── Scrollbar ──────────────────────────────────── */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); }
        ::-webkit-scrollbar-thumb:hover { background: var(--gray-500); }

        /* ── Payment Info ───────────────────────────────── */
        .payment-info {
            background: var(--gray-50);
            padding: 16px;
            margin-bottom: 20px;
            font-size: 10px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            line-height: 1.8;
            color: var(--gray-600);
        }
        .payment-info strong {
            display: block;
            color: var(--black);
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- ═══════════════════ TOAST CONTAINER ═══════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- NAV -->
<nav class="nav">
    <div class="nav-top">
        <div class="nav-group"></div>
        <img src="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776423940/szt6butb9fnufnwybq6v.jpg" class="nav-logo" alt="NeverEver">
        <div class="nav-group">
            <button id="authBtn" onclick="openPanel('authPanel')" class="nav-link">LOGIN</button>
            <button onclick="openOrders()" class="nav-link hidden" id="trackBtn">ORDERS</button>
            <button onclick="openPanel('cartPanel')" class="nav-link">CART (<span id="cartCount">0</span>)</button>

    </div>
    <div class="nav-filters">
        <button onclick="filter('Instock')" class="nav-link active" id="navInstock">INSTOCK</button>
        <button onclick="filter('Preorder')" class="nav-link muted" id="navPreorder">PREORDER</button>
        <button onclick="filter('Sold Out')" class="nav-link muted" id="navSoldout">SOLD OUT</button>
    </div>
</nav>
<div class="nav-spacer"></div>

<!-- SEARCH -->
<div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="SEARCH PRODUCTS..." oninput="applyFilters()">
</div>

<!-- PRODUCT GRID -->
<main class="product-grid" id="main-grid"></main>
<div class="load-more-container" id="loadMoreContainer">
    <button id="loadMoreBtn" onclick="loadMore()" class="btn-primary">LOAD MORE</button>
</div>

<!-- ═══════════════════ FOOTER ════════════════════════════ -->
<footer class="footer">
    <div style="text-align:center;">
        <p class="footer-brand">NEVEREVER</p>
        <p class="footer-sub">ONLINE SHOP / MYANMAR</p>
    </div>
    <div class="footer-links">
        <button onclick="openInfoPanel('faqs')" class="footer-link">FAQS</button>
        <button onclick="openInfoPanel('policy')" class="footer-link">POLICY</button>
        <a href="https://t.me/tfuwnthuh" target="_blank" rel="noopener" class="footer-link">CONTACT</a>
    </div>
</footer>

<!-- ═══════════════════ PRODUCT VIEW (FULL SCREEN) ═══════ -->
<div id="productView">
    <button onclick="closeProductView()" style="position:fixed;top:20px;left:20px;z-index:450;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);padding:10px 16px;border:1px solid var(--gray-200);cursor:pointer;">← BACK</button>
    <div style="max-width:500px;margin:0 auto;padding-bottom:40px;">
        <div class="pv-gallery-wrap" style="position:relative;overflow:hidden;">
            <button onclick="document.getElementById('pGallery').scrollBy({left:-300,behavior:'smooth'})" class="slide-btn" style="left:12px;">‹</button>
            <button onclick="document.getElementById('pGallery').scrollBy({left:300,behavior:'smooth'})" class="slide-btn" style="right:12px;">›</button>
            <div id="pGallery" class="pv-gallery"></div>
            <div id="pDots" class="pv-dots"></div>
        </div>
        <div class="pv-info">
            <h1 id="pName" class="pv-name"></h1>
            <p id="pPrice" class="pv-price"></p>
            <p id="pDesc" class="pv-desc"></p>
            <div id="sizeGrid" class="chip-row mt-6"></div>
            <div id="colorGrid" class="chip-row mt-4"></div>
            <button onclick="addToCart()" class="btn-primary mt-8">ADD TO CART</button>
        </div>
    </div>
</div>

<!-- ═══════════════════ OVERLAY ═══════════════════════════ -->
<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<!-- ═══════════════════ CART PANEL ════════════════════════ -->
<div id="cartPanel" class="side-panel">
    <div class="panel-header"><h2 class="panel-title">CART</h2><button class="panel-close" onclick="closeAllPanels()">CLOSE</button></div>
    <div id="cartItems"></div>
    <div id="checkoutForm" class="hidden">
        <div style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:0.05em;border-top:1px solid var(--black);padding-top:16px;margin-bottom:24px;text-transform:uppercase;"><span>TOTAL</span><span id="cartTotal"></span></div>
        <div class="payment-info">
            <span>TRANSFER EXACT AMOUNT TO:</span>
            <strong>K-PAY / WAVE: 09450151840 (PYAY MOE)</strong>
        </div>
        <input type="text" class="input" id="orderName" placeholder="YOUR FULL NAME">
        <input type="text" class="input" id="orderTg" placeholder="TELEGRAM USERNAME">
        <input type="text" class="input" id="orderPhone" placeholder="PHONE NUMBER">
        <input type="text" class="input" id="orderAddr" placeholder="DELIVERY ADDRESS">
        <button id="uploadSS" class="btn-outline mb-4">UPLOAD PAYMENT RECEIPT</button>
        <input type="hidden" id="paymentImg">
        <button onclick="checkout()" class="btn-primary">PLACE ORDER</button>
    </div>
</div>

<!-- ═══════════════════ AUTH PANEL ════════════════════════ -->
<div id="authPanel" class="side-panel">
    <div class="panel-header"><h2 id="authTitle" class="panel-title">LOGIN</h2><button class="panel-close" onclick="closeAllPanels()">CLOSE</button></div>
    <div id="authLoggedOutState">
        <input type="text" class="input" id="authUser" placeholder="USERNAME">
        <input type="password" class="input" id="authPass" placeholder="PASSWORD">
        <button onclick="handleAuth()" class="btn-primary mt-4">CONTINUE</button>
        <button onclick="toggleMode()" id="modeText" class="auth-divider" style="width:100%;cursor:pointer;background:none;border:none;">NEED AN ACCOUNT? SIGN UP</button>
    </div>
    <div id="authLoggedInState" class="hidden space-y-4">
        <p style="font-size:10px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.05em;">Signed in as <span id="authUsername" style="font-weight:600;color:var(--black);"></span></p>
        <input type="password" class="input" id="oldPass" placeholder="CURRENT PASSWORD">
        <input type="password" class="input" id="newPass" placeholder="NEW PASSWORD">
        <button onclick="changePassword()" class="btn-primary mt-4">UPDATE PASSWORD</button>
        <button onclick="signOut()" class="btn-outline mt-4">SIGN OUT</button>
        <p style="font-size:10px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.05em;margin-top:16px;">IF YOU FORGOT YOUR PASSWORD, CONTACT SUPPORT @TFUWNTHUH</p>
    </div>
</div>

<!-- ═══════════════════ ORDERS PANEL ═════════════════════ -->
<div id="ordersPanel" class="side-panel">
    <div class="panel-header"><h2 class="panel-title">ORDERS</h2><button class="panel-close" onclick="closeAllPanels()">CLOSE</button></div>
    <div id="orders-user-info" style="font-size:10px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:16px;"></div>
    <div id="my-orders-list"></div>
</div>

<!-- ═══════════════════ INFO PANEL (FAQs/Policy) ═════════ -->
<div id="infoPanel" class="side-panel">
    <div class="panel-header"><h2 id="infoTitle" class="panel-title">INFO</h2><button class="panel-close" onclick="closeAllPanels()">CLOSE</button></div>
    <div id="infoContent" class="content-copy"></div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script>
    // ═══════════════════════════════════════════════════════
    // ►  STATE
    // ═══════════════════════════════════════════════════════
    let allItems = [], cart = {}, user = null, currentItem = null;
    let selectedSize = null, selectedColor = null;
    let isLoginMode = true, pendingAction = null;
    let currentFilter = 'Instock';
    let visibleCount = 12; 

    const defaultSiteContent = {
        faqs: 'FAQS WILL BE UPDATED SOON.\n\nFOR ORDER QUESTIONS, CONTACT SUPPORT @TFUWNTHUH.',
        policy: 'STORE POLICY WILL BE UPDATED SOON.\n\nPLEASE CONFIRM SIZE, COLOR, AND DELIVERY DETAILS BEFORE PLACING AN ORDER.'
    };
    let siteContent = { ...defaultSiteContent };

    // Restore session
    const storedUser = localStorage.getItem('neverUser');
    try {
        user = storedUser ? JSON.parse(storedUser) : null;
    } catch (e) {
        localStorage.removeItem('neverUser');
        localStorage.removeItem('neverToken');
        user = null;
    }

    // ═══════════════════════════════════════════════════════
    // ►  TOAST SYSTEM
    // ═══════════════════════════════════════════════════════
    function toast(msg, type = 'info', duration = 3500) {
        const container = document.getElementById('toastContainer');
        const el = document.createElement('div');
        el.className = `toast ${type === 'error' ? 'toast-error' : type === 'success' ? 'toast-success' : ''}`;
        el.textContent = msg;
        container.appendChild(el);
        requestAnimationFrame(() => {
            requestAnimationFrame(() => el.classList.add('show'));
        });
        setTimeout(() => {
            el.classList.remove('show');
            setTimeout(() => el.remove(), 400);
        }, duration);
    }

    // ═══════════════════════════════════════════════════════
    // ►  INIT
    // ═══════════════════════════════════════════════════════
    async function init() {
        loadSiteContent();
        renderSkeletons();

        try {
            const res = await fetch('/api/items');
            if (!res.ok) throw new Error('Unable to load items');
            allItems = await res.json();
            filter('Instock');
        } catch (err) {
            console.error(err);
            document.getElementById('main-grid').innerHTML = '<p style="padding:40px;font-size:12px;color:var(--red);text-align:center;grid-column:1/-1;">UNABLE TO LOAD PRODUCTS. PLEASE REFRESH.</p>';
            return;
        }

        const token = localStorage.getItem('neverToken');
        if (token) {
            try {
                const profileRes = await fetch('/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
                if (profileRes.ok) {
                    const profile = await profileRes.json();
                    user = profile.user;
                    localStorage.setItem('neverUser', JSON.stringify(user));
                } else {
                    localStorage.removeItem('neverToken');
                    localStorage.removeItem('neverUser');
                    user = null;
                }
            } catch (e) {
                console.warn('Auth restore failed', e);
            }
        }

        updateAuthUI();
        renderAuthPanel();
    }

    function updateAuthUI() {
        if (user && localStorage.getItem('neverToken')) {
            document.getElementById('authBtn').innerHTML = 'PROFILE';
            document.getElementById('trackBtn').classList.remove('hidden');
        } else {
            document.getElementById('authBtn').innerHTML = 'LOGIN';
            document.getElementById('trackBtn').classList.add('hidden');
        }
    }

    // ═══════════════════════════════════════════════════════
    // ►  SKELETONS
    // ═══════════════════════════════════════════════════════
    function renderSkeletons() {
        const grid = document.getElementById('main-grid');
        let html = '';
        for (let i = 0; i < 8; i++) {
            html += `<div class="skeleton-card">
                <div class="skel-img"></div>
                <div class="skel-text">
                    <div class="skel-line" style="width:70%;"></div>
                    <div class="skel-line" style="width:40%;"></div>
                </div>
            </div>`;
        }
        grid.innerHTML = html;
    }

    // ═══════════════════════════════════════════════════════
    // ►  SITE CONTENT
    // ═══════════════════════════════════════════════════════
    async function loadSiteContent() {
        try {
            const res = await fetch('/api/site-content');
            if (!res.ok) throw new Error('Unable to load site content');
            siteContent = { ...defaultSiteContent, ...(await res.json()) };
        } catch (err) {
            console.warn('Site content load failed', err);
        }
    }

    function openInfoPanel(type) {
        const title = type === 'policy' ? 'POLICY' : 'FAQS';
        const content = (siteContent[type] || defaultSiteContent[type] || '').trim();
        document.getElementById('infoTitle').innerText = title;
        document.getElementById('infoContent').textContent = content || defaultSiteContent[type];
        openPanel('infoPanel');
    }

    // ═══════════════════════════════════════════════════════
    // ►  FILTERING & SEARCH
    // ═══════════════════════════════════════════════════════
    function filter(cat) {
        currentFilter = cat;
        // Update nav active states
        document.getElementById('navInstock').classList.toggle('active', cat === 'Instock');
        document.getElementById('navInstock').classList.toggle('muted', cat !== 'Instock');
        document.getElementById('navPreorder').classList.toggle('active', cat === 'Preorder');
        document.getElementById('navPreorder').classList.toggle('muted', cat !== 'Preorder');
        document.getElementById('navSoldout').classList.toggle('active', cat === 'Sold Out');
        document.getElementById('navSoldout').classList.toggle('muted', cat !== 'Sold Out');
        applyFilters();
    }

    function getBatchSize() {
        // Return 6 items for mobile (2 cols * 3 rows), 9 for tablet (3 cols * 3 rows), 12 for desktop (4 cols * 3 rows)
        const width = window.innerWidth;
        if (width < 768) return 6;
        if (width < 1200) return 9;
        return 12;
    }

    function applyFilters(resetCount = true) {
        if (resetCount) visibleCount = getBatchSize(); // Reset to 3 rows based on device
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const filtered = allItems.filter(i => {
            const matchCat = currentFilter === 'All' ? true : i.category === currentFilter;
            const matchSearch = !query || i.name.toLowerCase().includes(query);
            return matchCat && matchSearch;
        });
        renderProducts(filtered);
    }

    function loadMore() {
        visibleCount += getBatchSize(); // Add 3 more rows based on device
        applyFilters(false); // Re-render with NEW count, don't reset
    }

    function renderProducts(items) {
        const grid = document.getElementById('main-grid');
        const loadMoreContainer = document.getElementById('loadMoreContainer');

        if (items.length === 0) {
            grid.innerHTML = '<p style="padding:40px;font-size:11px;color:var(--gray-400);text-align:center;grid-column:1/-1;text-transform:uppercase;letter-spacing:0.1em;">NO PRODUCTS FOUND.</p>';
            loadMoreContainer.classList.add('hidden');
            return;
        }

        const visibleItems = items.slice(0, visibleCount);
        loadMoreContainer.classList.toggle('hidden', items.length <= visibleCount);

        grid.innerHTML = visibleItems.map(i => {
            let badge = '';
            if (i.category === 'Sold Out') badge = '<div class="badge">SOLD OUT</div>';
            else if (i.category === 'Preorder') badge = '<div class="badge preorder">PREORDER</div>';
            else if (i.category === 'Instock') badge = '<div class="badge instock">INSTOCK</div>';
            return `<div class="product-card" onclick="openProduct('${i._id}')">
                ${badge}
                <div class="card-img-wrap">
                    <img src="${i.images[0]}" alt="${i.name}" loading="lazy" class="lazy-img" onload="this.classList.add('loaded')">
                </div>
                <div class="card-info">
                    <p class="card-name">${i.name}</p>
                    <p class="card-price">${i.price.toLocaleString('en-US', {minimumFractionDigits: 0})} MMK</p>
                </div>
            </div>`;
        }).join('');
    }

    // ═══════════════════════════════════════════════════════
    // ►  PRODUCT VIEW
    // ═══════════════════════════════════════════════════════
    function openProduct(id) {
        currentItem = allItems.find(i => i._id === id);
        selectedSize = null;
        selectedColor = null;

        document.getElementById('pName').innerText = currentItem.name;
        document.getElementById('pPrice').innerText = `${currentItem.price.toLocaleString()} MMK`;
        document.getElementById('pDesc').innerText = currentItem.description || '';

        const gallery = document.getElementById('pGallery');
        gallery.innerHTML = currentItem.images.map(img => `
            <div class="pv-gallery-item">
                <img src="${img}" alt="${currentItem.name}" loading="lazy">
            </div>`).join('');
        gallery.scrollLeft = 0;

        // Generate dots
        const dotsContainer = document.getElementById('pDots');
        dotsContainer.innerHTML = currentItem.images.map((_, i) => 
            `<button class="pv-dot ${i === 0 ? 'active' : ''}" onclick="scrollToImage(${i})"></button>`
        ).join('');

        document.getElementById('sizeGrid').innerHTML = (currentItem.availableSizes || []).map(s =>
            `<button class="chip" onclick="selSize(this,'${s}')">${s}</button>`
        ).join('');

        document.getElementById('colorGrid').innerHTML = (currentItem.availableColors || []).map(c =>
            `<button class="chip" onclick="selColor(this,'${c}')">${c}</button>`
        ).join('');

        const pv = document.getElementById('productView');
        pv.style.display = 'block';
        requestAnimationFrame(() => pv.classList.add('show'));
        window.scrollTo(0, 0);
    }

    function scrollToImage(index) {
        const gallery = document.getElementById('pGallery');
        const width = gallery.offsetWidth;
        gallery.scrollTo({ left: width * index, behavior: 'smooth' });
    }

    // Handle dot activation on scroll
    document.getElementById('pGallery').addEventListener('scroll', function() {
        const index = Math.round(this.scrollLeft / this.offsetWidth);
        document.querySelectorAll('.pv-dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === index);
        });
    });

    function closeProductView() {
        const pv = document.getElementById('productView');
        pv.classList.remove('show');
        setTimeout(() => pv.style.display = 'none', 300);
    }

    function selSize(el, s) {
        document.querySelectorAll('#sizeGrid .chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedSize = s;
    }
    function selColor(el, c) {
        document.querySelectorAll('#colorGrid .chip').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        selectedColor = c;
    }

    // ═══════════════════════════════════════════════════════
    // ►  PANELS
    // ═══════════════════════════════════════════════════════
    function openPanel(id) {
        if (id === 'authPanel') renderAuthPanel();
        document.getElementById('overlay').classList.add('show');
        document.getElementById(id).classList.add('show');
        if (id === 'cartPanel') updateCart();
    }

    function closeAllPanels() {
        document.getElementById('overlay').classList.remove('show');
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('show'));
    }

    // ═══════════════════════════════════════════════════════
    // ►  AUTH
    // ═══════════════════════════════════════════════════════
    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? 'LOGIN' : 'REGISTER';
        document.getElementById('modeText').innerText = isLoginMode ? 'NEED AN ACCOUNT? SIGN UP' : 'HAVE AN ACCOUNT? LOGIN';
    }

    function renderAuthPanel() {
        const loggedOut = document.getElementById('authLoggedOutState');
        const loggedIn = document.getElementById('authLoggedInState');
        if (user) {
            loggedOut.classList.add('hidden');
            loggedIn.classList.remove('hidden');
            document.getElementById('authTitle').innerText = 'PROFILE';
            document.getElementById('authUsername').innerText = user.username;
            document.getElementById('modeText').classList.add('hidden');
        } else {
            loggedOut.classList.remove('hidden');
            loggedIn.classList.add('hidden');
            document.getElementById('authTitle').innerText = isLoginMode ? 'LOGIN' : 'REGISTER';
            document.getElementById('modeText').classList.remove('hidden');
        }
    }

    async function handleAuth() {
        const u = document.getElementById('authUser').value, p = document.getElementById('authPass').value;
        if (!u || !p) return toast('PLEASE FILL IN ALL FIELDS', 'error');
        const endpoint = isLoginMode ? '/auth/login' : '/auth/signup';
        try {
            const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
            const d = await res.json();
            if (res.ok) {
                localStorage.setItem('neverToken', d.token);
                localStorage.setItem('neverUser', JSON.stringify(d.user));
                user = d.user;
                updateAuthUI();
                renderAuthPanel();
                toast(isLoginMode ? 'WELCOME BACK' : 'ACCOUNT CREATED', 'success');
                if (pendingAction === 'orders') {
                    pendingAction = null;
                    closeAllPanels();
                    openOrders();
                    return;
                }
                closeAllPanels();
            } else {
                toast(d.error || 'AUTHENTICATION FAILED', 'error');
            }
        } catch (err) {
            toast('NETWORK ERROR. TRY AGAIN.', 'error');
        }
    }

    async function signOut() {
        localStorage.removeItem('neverToken');
        localStorage.removeItem('neverUser');
        user = null;
        updateAuthUI();
        renderAuthPanel();
        closeAllPanels();
        toast('SIGNED OUT', 'success');
    }

    async function changePassword() {
        const oldPass = document.getElementById('oldPass').value;
        const newPass = document.getElementById('newPass').value;
        if (!oldPass || !newPass) return toast('FILL BOTH CURRENT AND NEW PASSWORD', 'error');
        const token = localStorage.getItem('neverToken');
        try {
            const res = await fetch('/auth/change-password', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ oldPassword: oldPass, newPassword: newPass }) });
            const d = await res.json();
            if (res.ok) {
                toast('PASSWORD UPDATED', 'success');
                document.getElementById('oldPass').value = '';
                document.getElementById('newPass').value = '';
            } else {
                toast(d.error || (d.errors ? d.errors.map(e => e.msg).join(', ') : 'UNABLE TO UPDATE PASSWORD'), 'error');
            }
        } catch (err) {
            toast('NETWORK ERROR', 'error');
        }
    }

    // ═══════════════════════════════════════════════════════
    // ►  CART
    // ═══════════════════════════════════════════════════════
    function addToCart() {
        if (!currentItem) return;
        if ((currentItem.availableSizes || []).length && !selectedSize) return toast('PLEASE SELECT A SIZE', 'error');
        if ((currentItem.availableColors || []).length && !selectedColor) return toast('PLEASE SELECT A COLOR', 'error');
        const key = `${currentItem._id}-${selectedSize || 'NOSZ'}-${selectedColor || 'NOC'}`;
        if (cart[key]) cart[key].qty += 1;
        else cart[key] = { item: currentItem, size: selectedSize, color: selectedColor, qty: 1, image: currentItem.images[0] };

        closeProductView();
        toast(`${currentItem.name} ADDED TO CART`, 'success');
        openPanel('cartPanel');
    }

    function updateCart() {
        const keys = Object.keys(cart);
        let totalMMK = 0, totalItems = 0;

        document.getElementById('cartItems').innerHTML = keys.map(k => {
            const c = cart[k];
            totalMMK += c.item.price * c.qty;
            totalItems += c.qty;
            return `<div class="cart-item">
                <div class="cart-item-left">
                    <img src="${c.image || c.item.images[0]}" class="cart-item-img" alt="${c.item.name}" loading="lazy">
                    <div>
                        <p class="cart-item-name">${c.item.name}</p>
                        <p class="cart-item-meta">SIZE: ${c.size || 'N/A'}</p>
                        <p class="cart-item-meta">COLOR: ${c.color || 'N/A'}</p>
                        <p class="cart-item-meta">QTY: ${c.qty}</p>
                    </div>
                </div>
                <div style="text-align:right;">
                    <p class="cart-item-price">${(c.item.price * c.qty).toLocaleString()} MMK</p>
                    <button onclick="delete cart['${k}'];updateCart();toast('ITEM REMOVED','success');" class="cart-item-remove">REMOVE</button>
                </div>
            </div>`;
        }).join('') || '<p style="font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.08em;text-align:center;padding:40px 0;">YOUR CART IS EMPTY.</p>';

        document.getElementById('cartCount').innerText = totalItems;
        document.getElementById('cartTotal').innerText = `${totalMMK.toLocaleString()} MMK`;
        document.getElementById('checkoutForm').classList.toggle('hidden', keys.length === 0);
    }

    // ═══════════════════════════════════════════════════════
    // ►  CLOUDINARY UPLOAD
    // ═══════════════════════════════════════════════════════
    var widget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (e, r) => {
        if (r.event === 'success') {
            document.getElementById('paymentImg').value = r.info.secure_url;
            const btn = document.getElementById('uploadSS');
            btn.innerText = 'RECEIPT ATTACHED ✓';
            btn.style.borderColor = 'var(--black)';
            btn.style.color = 'var(--black)';
            toast('RECEIPT UPLOADED', 'success');
        }
    });
    document.getElementById('uploadSS').onclick = () => widget.open();

    // ═══════════════════════════════════════════════════════
    // ►  CHECKOUT
    // ═══════════════════════════════════════════════════════
    async function checkout() {
        if (!user) {
            toast('YOU MUST BE SIGNED IN TO PLACE AN ORDER', 'error');
            return openPanel('authPanel');
        }
        if (!document.getElementById('paymentImg').value) return toast('PLEASE UPLOAD RECEIPT', 'error');
        if (!document.getElementById('orderName').value || !document.getElementById('orderTg').value) return toast('FULL NAME AND TELEGRAM REQUIRED', 'error');
        if (!document.getElementById('orderPhone').value || !document.getElementById('orderAddr').value) return toast('ADDRESS AND PHONE REQUIRED', 'error');

        let total = 0;
        const formattedItems = Object.values(cart).map(c => {
            total += c.item.price * c.qty;
            return { name: c.item.name, size: c.size, color: c.color, qty: c.qty, price: c.item.price, image: c.image || c.item.images[0] };
        });

        const data = {
            userId: user.id, username: user.username,
            customerName: document.getElementById('orderName').value,
            telegram: document.getElementById('orderTg').value,
            phone: document.getElementById('orderPhone').value,
            address: document.getElementById('orderAddr').value,
            items: formattedItems, paymentScreenshot: document.getElementById('paymentImg').value, totalMMK: total
        };

        const token = localStorage.getItem('neverToken');
        try {
            const response = await fetch('/api/submit-order', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
            const result = await response.json();
            if (!response.ok) {
                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('neverToken');
                    localStorage.removeItem('neverUser');
                    user = null;
                    updateAuthUI();
                }
                return toast(result.error || (result.errors ? result.errors.map(e => e.msg).join(', ') : 'UNABLE TO PLACE ORDER'), 'error');
            }
            toast(`ORDER PLACED! ID: ${result.orderId}`, 'success', 5000);
            cart = {};
            updateCart();
            document.getElementById('orderName').value = '';
            document.getElementById('orderTg').value = '';
            document.getElementById('orderPhone').value = '';
            document.getElementById('orderAddr').value = '';
            document.getElementById('paymentImg').value = '';
            const btn = document.getElementById('uploadSS');
            btn.innerText = 'UPLOAD PAYMENT RECEIPT';
            btn.style.borderColor = '';
            btn.style.color = '';
            closeAllPanels();
        } catch (err) {
            toast('NETWORK ERROR. TRY AGAIN.', 'error');
        }
    }

    // ═══════════════════════════════════════════════════════
    // ►  ORDERS
    // ═══════════════════════════════════════════════════════
    function renderOrderSkeletons() {
        return `<div style="padding:20px 0;">
            ${[1,2].map(() => `<div style="margin-bottom:24px;">
                <div class="skeleton" style="height:14px;width:40%;margin-bottom:12px;"></div>
                <div style="display:flex;gap:12px;margin-bottom:12px;">
                    <div class="skeleton" style="width:48px;height:48px;"></div>
                    <div style="flex:1;"><div class="skeleton" style="height:10px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:10px;width:40%;"></div></div>
                </div>
                <div class="skeleton" style="height:10px;width:30%;"></div>
            </div>`).join('')}
        </div>`;
    }

    async function openOrders() {
        document.getElementById('orders-user-info').innerText = '';
        document.getElementById('my-orders-list').innerHTML = renderOrderSkeletons();
        closeAllPanels();
        const panel = document.getElementById('ordersPanel');
        panel.classList.add('show');
        document.getElementById('overlay').classList.add('show');

        if (!user) {
            pendingAction = 'orders';
            openPanel('authPanel');
            document.getElementById('my-orders-list').innerHTML = '<p style="font-size:11px;color:var(--gray-500);text-transform:uppercase;text-align:center;padding:40px 0;">PLEASE LOGIN TO VIEW YOUR ORDERS.</p>';
            return;
        }

        const token = localStorage.getItem('neverToken');
        try {
            const res = await fetch('/api/my-orders', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) {
                const text = await res.text();
                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('neverToken');
                    localStorage.removeItem('neverUser');
                    user = null;
                    updateAuthUI();
                    document.getElementById('orders-user-info').innerText = '';
                    document.getElementById('my-orders-list').innerHTML = '<p style="font-size:11px;color:var(--red);text-transform:uppercase;text-align:center;padding:40px 0;">SESSION EXPIRED. PLEASE LOGIN AGAIN.</p>';
                    openPanel('authPanel');
                    return;
                }
                document.getElementById('my-orders-list').innerHTML = `<p style="font-size:11px;color:var(--red);text-transform:uppercase;text-align:center;padding:40px 0;">UNABLE TO LOAD ORDERS (${res.status}).</p>`;
                return;
            }

            const orders = await res.json();
            document.getElementById('orders-user-info').innerText = `LOGGED IN AS: ${user?.username || 'UNKNOWN'}`;

            if (!Array.isArray(orders) || orders.length === 0) {
                document.getElementById('my-orders-list').innerHTML = '<p style="font-size:11px;color:var(--gray-400);text-transform:uppercase;text-align:center;padding:40px 0;letter-spacing:0.08em;">NO ORDERS FOUND YET.</p>';
                return;
            }

            document.getElementById('my-orders-list').innerHTML = orders.map(o => {
                const statusClass = (o.status || 'Pending').toLowerCase();
                return `<div class="order-card">
                    <div class="order-header">
                        <span class="order-id">#${o._id ? o._id.slice(-6) : 'UNKNOWN'}</span>
                        <span class="order-status ${statusClass}">${o.status || 'PENDING'}</span>
                    </div>
                    <div>
                        ${Array.isArray(o.items) ? o.items.map(i => {
                            const dbMatch = allItems.find(it => it.name === i.name);
                            const imgSrc = i.image || (dbMatch ? dbMatch.images[0] : '');
                            return `<div class="order-item">
                                ${imgSrc ? `<img src="${imgSrc}" alt="${i.name}" loading="lazy">` : ''}
                                <div>
                                    <p class="order-item-name">${i.name}</p>
                                    <p class="order-item-meta">${i.qty}x SIZE ${i.size || 'N/A'} | COLOR ${i.color || 'N/A'}</p>
                                </div>
                            </div>`;
                        }).join('') : '<p style="font-size:10px;color:var(--gray-400);">NO ITEMS FOUND.</p>'}
                    </div>
                    <p class="order-total">TOTAL: ${o.totalMMK ? o.totalMMK.toLocaleString() : '0'} MMK</p>
                    ${o.estArrival ? `<p class="order-est">EST: ${o.estArrival}</p>` : ''}
                </div>`;
            }).join('');
        } catch (err) {
            console.error('Orders fetch error', err);
            document.getElementById('my-orders-list').innerHTML = '<p style="font-size:11px;color:var(--red);text-transform:uppercase;text-align:center;padding:40px 0;">UNABLE TO LOAD ORDERS. TRY AGAIN LATER.</p>';
        }
    }

    // ═══════════════════════════════════════════════════════
    // ►  LAUNCH
    // ═══════════════════════════════════════════════════════
    init();
</script>
</body>
</html>
