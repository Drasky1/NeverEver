<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVEREVER</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776407597/izsqh19ttd1purqiscmx.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #fff; color: #000; font-family: Helvetica, sans-serif; text-transform: uppercase; overflow-x: hidden; }
        .yeezy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #000; border-top: 1px solid #000; }
        .product-card { background: #fff; cursor: pointer; position: relative; }
        .modal { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; overflow-y: auto; }
        .btn-black { background: #000; color: #fff; padding: 20px; font-size: 10px; font-weight: 900; width: 100%; }
        .size-chip { border: 1px solid #000; padding: 12px; font-size: 10px; font-weight: 900; text-align: center; cursor: pointer; }
        .size-chip.active { background: #000; color: #fff; }
        input, textarea { border: 1px solid #000; padding: 15px; font-size: 10px; width: 100%; margin-bottom: 10px; }
        #pGallery { display: flex; flex-direction: column; gap: 1px; background: #000; width: 100%; }
        #pGallery img { width: 100%; height: auto; display: block; object-fit: contain; background: #f4f4f4; }
        .sticky-info { position: sticky; top: 0; height: fit-content; }
    </style>
</head>
<body>

<nav class="p-6 flex justify-between items-center sticky top-0 bg-white z-50 border-b border-black">
    <div class="flex gap-4">
        <button onclick="filter('Instock')" class="text-[10px] font-black">Instock</button>
        <button onclick="filter('Preorder')" class="text-[10px] font-black opacity-40">Preorder</button>
        <button onclick="openOrders()" class="text-[10px] font-black opacity-40">My Orders</button>
    </div>
    <img src="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776407597/izsqh19ttd1purqiscmx.jpg" class="h-8 cursor-pointer" onclick="location.reload()">
    <div class="flex gap-4">
        <button id="authBtn" onclick="openAuth()" class="text-[10px] font-black italic">Login</button>
        <button onclick="toggleCart(true)" class="text-[10px] font-black">Cart (<span id="cartCount">0</span>)</button>
    </div>
</nav>

<main class="yeezy-grid" id="main-grid"></main>

<div id="productModal" class="modal">
    <div class="p-6 border-b border-black flex justify-between bg-white sticky top-0 z-50">
        <button onclick="closeModal('productModal')" class="text-[10px] font-black">← BACK</button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2">
        <div id="pGallery"></div>
        <div class="p-10 md:p-20 space-y-10 bg-white sticky-info">
            <h1 id="pName" class="text-2xl font-black italic"></h1>
            <p id="pPrice" class="text-lg font-bold"></p>
            <div id="sizeGrid" class="grid grid-cols-4 gap-2"></div>
            <button id="addBtn" onclick="addToCart()" class="btn-black">ADD TO CART</button>
        </div>
    </div>
</div>

<div id="cartModal" class="modal p-10">
    <button onclick="closeModal('cartModal')" class="text-[10px] font-black mb-10">← CLOSE</button>
    <div id="cartItems" class="space-y-6"></div>
    <div class="border-t border-black mt-10 pt-6">
        <div class="flex justify-between font-black text-lg"><span>TOTAL</span><span id="cartTotal">0 MMK</span></div>
        <button onclick="openCheckout()" class="btn-black mt-6">PROCEED TO CHECKOUT</button>
    </div>
</div>

<div id="checkoutModal" class="modal p-10">
    <button onclick="closeModal('checkoutModal')" class="text-[10px] font-black mb-10">← BACK</button>
    <div class="max-w-md mx-auto space-y-2">
        <input type="text" id="custName" placeholder="FULL NAME">
        <input type="text" id="custPhone" placeholder="PHONE NUMBER">
        <input type="text" id="custTG" placeholder="TELEGRAM USERNAME">
        <textarea id="custAddr" placeholder="SHIPPING ADDRESS" class="h-32"></textarea>
        <button id="payBtn" class="border border-black p-4 text-[10px] font-black w-full">📸 UPLOAD PAYMENT SCREENSHOT</button>
        <button onclick="submitOrder()" class="btn-black mt-4">CONFIRM ORDER</button>
    </div>
</div>

<div id="ordersModal" class="modal p-10">
    <button onclick="closeModal('ordersModal')" class="text-[10px] font-black mb-10">← BACK</button>
    <div id="orderStream" class="space-y-10"></div>
</div>

<div id="authModal" class="modal flex items-center justify-center bg-black/10">
    <div class="max-w-sm w-full p-10 border border-black bg-white space-y-4">
        <h2 class="text-center font-black text-[10px] italic">LOGIN</h2>
        <input type="text" id="userIn" placeholder="USERNAME">
        <input type="password" id="passIn" placeholder="PASSWORD">
        <button onclick="handleManualAuth()" class="btn-black">CONTINUE</button>
        <div id="g_id_onload" data-client_id="866705523346-4dnad433fs6ckk7lieark8a764h8ulp8.apps.googleusercontent.com" data-callback="handleGoogle"></div>
        <div class="g_id_signin flex justify-center" data-type="standard"></div>
        <button onclick="closeModal('authModal')" class="w-full text-[8px] underline">CLOSE</button>
    </div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script>
    let allItems = [], cart = [], user = JSON.parse(localStorage.getItem('neverUser')), currentItem = null, selectedSize = null, payImg = "";

    async function init() {
        const res = await fetch('/items'); allItems = await res.json();
        filter('Instock');
        if(user) {
            document.getElementById('authBtn').innerText = "LOGOUT";
            document.getElementById('authBtn').onclick = () => { localStorage.removeItem('neverUser'); location.reload(); };
        }
    }

    function filter(cat) {
        document.querySelectorAll('nav button').forEach(b => b.classList.toggle('opacity-40', b.innerText !== cat && b.innerText !== 'My Orders'));
        const filtered = allItems.filter(i => i.category === cat);
        document.getElementById('main-grid').innerHTML = filtered.map(i => `
            <div class="product-card pb-10" onclick="openProduct('${i._id}')">
                ${i.isSoldOut ? '<div class="absolute inset-0 bg-white/80 flex items-center justify-center font-black text-red-600 text-[10px] z-10">SOLD OUT</div>' : ''}
                <img src="${i.images[0]}" class="w-full aspect-square object-contain bg-[#f4f4f4]">
                <div class="p-4 text-center">
                    <p class="text-[10px] font-black">${i.name}</p>
                    <p class="text-[9px] opacity-40 mt-1">${i.price.toLocaleString()} MMK</p>
                </div>
            </div>`).join('');
    }

    function openProduct(id) {
        currentItem = allItems.find(i => i._id === id); selectedSize = null;
        document.getElementById('pName').innerText = currentItem.name;
        document.getElementById('pPrice').innerText = `${currentItem.price.toLocaleString()} MMK`;
        document.getElementById('pGallery').innerHTML = currentItem.images.map(img => `<img src="${img}">`).join('');
        const sizes = Array.isArray(currentItem.availableSizes) ? currentItem.availableSizes : [];
        document.getElementById('sizeGrid').innerHTML = sizes.map(s => `<div class="size-chip" onclick="selSize(this, '${s}')">${s}</div>`).join('');
        document.getElementById('addBtn').innerText = currentItem.isSoldOut ? "SOLD OUT" : "ADD TO CART";
        document.getElementById('addBtn').disabled = currentItem.isSoldOut;
        document.getElementById('productModal').style.display = 'block';
    }

    function selSize(el, s) { document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); selectedSize = s; }
    function addToCart() { if(!selectedSize) return; cart.push({...currentItem, size: selectedSize, qty: 1}); updateCartUI(); closeModal('productModal'); }
    function toggleCart(s) { document.getElementById('cartModal').style.display = s ? 'block' : 'none'; updateCartUI(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
    function openCheckout() { document.getElementById('checkoutModal').style.display = 'block'; }
    
    function updateCartUI() {
        let total = 0;
        document.getElementById('cartItems').innerHTML = cart.map((i, idx) => {
            total += i.price;
            return `<div class="flex justify-between items-center border-b border-black pb-4 text-[10px] font-black">
                <p>${i.name} (${i.size})</p><button onclick="cart.splice(${idx},1);updateCartUI()">REMOVE</button></div>`;
        }).join('');
        document.getElementById('cartTotal').innerText = `${total.toLocaleString()} MMK`;
        document.getElementById('cartCount').innerText = cart.length;
    }

    const payWidget = cloudinary.createUploadWidget({ cloudName:'dawhhgjsd', uploadPreset:'dawhhgjsd' }, (e,r) => { if(r.event==="success") payImg = r.info.secure_url; });
    document.getElementById('payBtn').onclick = () => payWidget.open();

    async function submitOrder() {
        const order = { userId: user?.id || 'guest', username: document.getElementById('custName').value, items: cart, totalMMK: cart.reduce((a,b) => a + b.price, 0), phone: document.getElementById('custPhone').value, tgUsername: document.getElementById('custTG').value, address: document.getElementById('custAddr').value, paymentScreenshot: payImg, status: 'Pending' };
        await fetch('/submit-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(order)});
        location.reload();
    }

    async function openOrders() {
        if(!user) return openAuth();
        const res = await fetch(`/my-orders/${user.id}`); const orders = await res.json();
        document.getElementById('orderStream').innerHTML = orders.map(o => `<div class="border-b border-black pb-6 text-[10px] font-black"><p>${o.status}</p><p>${o.items.map(i => i.name).join(', ')}</p></div>`).join('');
        document.getElementById('ordersModal').style.display = 'block';
    }

    // UPDATED: Now closes modal automatically on success
    function handleGoogle(r) { 
        localStorage.setItem('neverUser', JSON.stringify({username: 'Customer', id: 'google_user'})); 
        closeModal('authModal');
        location.reload(); 
    }
    
    function handleManualAuth() { 
        const u = document.getElementById('userIn').value; 
        if(u) { 
            localStorage.setItem('neverUser', JSON.stringify({username: u, id: Date.now()})); 
            closeModal('authModal');
            location.reload(); 
        } 
    }

    init();
</script>
</body>
</html>
