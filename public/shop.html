<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVEREVER | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fdfdfd; font-family: 'Helvetica', sans-serif; color: #000; }
        .yeezy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #eee; border-top: 1px solid #eee; }
        @media (min-width: 768px) { .yeezy-grid { grid-template-columns: repeat(4, 1fr); } }
        .product-card { background: #fdfdfd; padding: 20px; cursor: pointer; transition: opacity 0.4s; }
        .product-card:hover { opacity: 0.6; }
        .modal { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; overflow-y: auto; }
        .size-chip { border: 1px solid #ddd; padding: 12px; font-size: 10px; font-weight: 900; cursor: pointer; text-align: center; }
        .size-chip.active { background: #000; color: #fff; border-color: #000; }
        #cartModal { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #cartModal.show { transform: translateX(0); }
    </style>
</head>
<body>

<nav class="p-6 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md z-[60]">
    <div class="flex gap-6">
        <button onclick="setFilter('Instock')" id="btnInstock" class="text-[10px] font-black uppercase tracking-widest underline underline-offset-4">Instock</button>
        <button onclick="setFilter('Pre-order')" id="btnPre" class="text-[10px] font-black uppercase tracking-widest opacity-30 hover:opacity-100">Pre-order</button>
    </div>
    <img src="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776343746/NEVEREVER_LOGO_boeayw.jpg" class="h-10 grayscale">
    <div class="flex gap-6">
        <a href="https://t.me/YOUR_USERNAME" class="text-[10px] font-black uppercase tracking-widest">Request</a>
        <button onclick="toggleCart(true)" class="text-[10px] font-black uppercase tracking-widest">Cart (<span id="cartCount">0</span>)</button>
    </div>
</nav>

<main class="yeezy-grid" id="main-grid"></main>

<div id="productModal" class="modal">
    <div class="sticky top-0 p-6 flex justify-between bg-white/90 backdrop-blur-md border-b z-20">
        <button onclick="closeProduct()" class="text-[10px] font-black uppercase tracking-widest">← Back</button>
        <span class="text-[10px] font-black uppercase tracking-[0.3em]">NEVEREVER</span>
        <div class="w-10"></div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2">
        <div id="imageGallery" class="flex flex-col gap-1 bg-[#eee]"></div>
        <div class="p-10 md:p-20 md:sticky md:top-20 h-fit space-y-10">
            <div>
                <h1 id="pName" class="text-3xl font-black uppercase tracking-tighter italic"></h1>
                <p id="pPrice" class="text-lg font-bold mt-4"></p>
            </div>
            <div>
                <p class="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-4">Size Selector</p>
                <div id="sizeGrid" class="grid grid-cols-4 gap-2"></div>
            </div>
            <button onclick="handleAddToCart()" class="w-full bg-black text-white py-6 text-[10px] font-black uppercase tracking-[0.3em] hover:bg-zinc-800 transition-colors">Add to Cart</button>
            <div class="pt-10 border-t border-black/5">
                <p class="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-4">Details</p>
                <p id="pDesc" class="text-[12px] leading-relaxed font-medium uppercase text-slate-600"></p>
            </div>
        </div>
    </div>
</div>

<div id="cartModal" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[100] p-10 shadow-2xl overflow-y-auto">
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-xl font-black uppercase tracking-tighter italic">Cart</h2>
        <button onclick="toggleCart(false)" class="text-[10px] font-bold uppercase text-slate-400">Close</button>
    </div>
    <div id="cartItems" class="space-y-6 mb-10"></div>
    <div id="checkoutArea" class="hidden border-t border-black pt-8 space-y-4">
        <div class="flex justify-between font-black uppercase text-xs"><span>Total</span><span id="cartTotal"></span></div>
        <div class="bg-slate-50 p-4 text-[10px] font-bold uppercase space-y-2 border">
            <div class="flex justify-between"><span>KPay</span><span>09xxxxxxxxx</span></div>
            <div class="flex justify-between"><span>Wave</span><span>09xxxxxxxxx</span></div>
        </div>
        <input type="text" id="orderAddr" placeholder="ADDRESS" class="w-full border-b py-4 text-[11px] font-bold outline-none uppercase">
        <input type="text" id="orderPh" placeholder="PHONE" class="w-full border-b py-4 text-[11px] font-bold outline-none uppercase">
        <button id="uploadSS" class="w-full border border-black py-4 text-[10px] font-black uppercase">📸 Upload Receipt</button>
        <input type="hidden" id="paymentImg">
        <button onclick="submitOrder()" class="w-full bg-black text-white py-6 text-[10px] font-black uppercase tracking-widest">Confirm Purchase</button>
    </div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script>
    let allItems = [], cart = {}, currentFilter = 'Instock', currentItem = null, selectedSize = null;
    const user = JSON.parse(localStorage.getItem('neverUser'));

    async function loadShop() {
        const res = await fetch('/items');
        allItems = await res.json();
        renderGrid();
    }

    function setFilter(f) {
        currentFilter = f;
        document.getElementById('btnInstock').classList.toggle('opacity-30', f !== 'Instock');
        document.getElementById('btnPre').classList.toggle('opacity-30', f !== 'Pre-order');
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('main-grid');
        const filtered = allItems.filter(i => i.grade === currentFilter).reverse();
        grid.innerHTML = filtered.map(i => `
            <div class="product-card" onclick="openProduct('${i._id}')">
                <img src="${i.images[0]}" class="w-full aspect-[3/4] object-cover mb-4 mix-blend-multiply">
                <div class="text-center font-black uppercase text-[10px] tracking-widest">
                    ${i.name}<br><span class="text-slate-400 mt-1 block">${i.price.toLocaleString()} MMK</span>
                </div>
            </div>`).join('');
    }

    function openProduct(id) {
        currentItem = allItems.find(i => i._id === id);
        selectedSize = null;
        document.getElementById('pName').innerText = currentItem.name;
        document.getElementById('pPrice').innerText = `${currentItem.price.toLocaleString()} MMK`;
        document.getElementById('pDesc').innerText = currentItem.description;
        document.getElementById('imageGallery').innerHTML = currentItem.images.map(img => `<img src="${img}" class="w-full h-auto mix-blend-multiply">`).join('');
        document.getElementById('sizeGrid').innerHTML = currentItem.availableSizes.map(s => `<div class="size-chip" onclick="selectSize(this, '${s}')">${s}</div>`).join('');
        document.getElementById('productModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function selectSize(el, s) {
        document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedSize = s;
    }

    function closeProduct() { document.getElementById('productModal').style.display = 'none'; document.body.style.overflow = 'auto'; }

    function handleAddToCart() {
        if(!selectedSize) return alert("Select Size");
        const key = `${currentItem.name} (${selectedSize})`;
        if(cart[key]) cart[key].qty++;
        else cart[key] = { price: currentItem.price, img: currentItem.images[0], qty: 1 };
        updateCartUI();
        closeProduct();
        toggleCart(true);
    }

    function updateCartUI() {
        const items = Object.keys(cart);
        let total = 0, count = 0;
        document.getElementById('cartItems').innerHTML = items.map(k => {
            const i = cart[k]; total += (i.price * i.qty); count += i.qty;
            return `<div class="flex gap-4 items-center border-b pb-4"><img src="${i.img}" class="w-16 h-16 object-contain bg-slate-50"><div class="flex-1 text-[10px] font-black uppercase">${k}<div class="mt-2 flex items-center gap-3"><button onclick="adjustQty('${k}',-1)">-</button><span>${i.qty}</span><button onclick="adjustQty('${k}',1)">+</button></div></div><div>${(i.price * i.qty).toLocaleString()}</div></div>`;
        }).join('');
        document.getElementById('cartCount').innerText = count;
        document.getElementById('cartTotal').innerText = `${total.toLocaleString()} MMK`;
        document.getElementById('checkoutArea').classList.toggle('hidden', items.length === 0 || !user);
    }

    function adjustQty(k, d) { cart[k].qty += d; if(cart[k].qty <= 0) delete cart[k]; updateCartUI(); }
    function toggleCart(s) { document.getElementById('cartModal').classList.toggle('show', s); }

    var widget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (e, r) => { if(r.event==="success") document.getElementById('paymentImg').value = r.info.secure_url; });
    document.getElementById("uploadSS").onclick = () => widget.open();

    async function submitOrder() {
        const ss = document.getElementById('paymentImg').value; if(!ss) return alert("Upload Proof");
        const res = await fetch('/submit-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ userId:user.id, username:user.username, items:Object.keys(cart).map(k=>({name:k, qty:cart[k].qty})), totalMMK:Object.values(cart).reduce((a,b)=>a+(b.price*b.qty),0), address:document.getElementById('orderAddr').value, phone:document.getElementById('orderPh').value, paymentScreenshot:ss })});
        if(res.ok) { alert("ORDERED"); location.reload(); }
    }

    loadShop();
</script>
</body>
</html>
