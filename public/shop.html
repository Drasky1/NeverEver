<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeverEver Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #000; color: white; }</style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md z-50">
        <h1 class="text-xl font-black italic tracking-tighter text-emerald-400">NEVER<span class="text-white">EVER</span></h1>
        <div class="flex items-center gap-6">
            <a href="/track" class="text-[10px] uppercase font-bold text-slate-400 hover:text-white transition">Track</a>
            <a href="#request" class="text-[10px] uppercase font-bold border border-white/20 px-4 py-2 rounded-full hover:bg-white hover:text-black transition">Request Preorder</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div id="shopGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-24"></div>
    </main>

    <script>
        const RATE = 130;
        async function loadShop() {
            const res = await fetch('/items');
            const data = await res.json();
            const items = data.filter(i => i.grade === 'Instock' || i.grade === 'Preorder');
            document.getElementById('shopGrid').innerHTML = items.map(i => `
                <div class="p-2 bg-white/5 rounded-2xl border border-white/5 group">
                    <img src="${i.productImage}" class="aspect-[3/4] w-full object-cover rounded-xl mb-3 group-hover:scale-[1.02] transition">
                    <h4 class="font-bold text-[10px] px-2 truncate uppercase text-slate-300">${i.name}</h4>
                    <p class="text-emerald-400 text-[10px] px-2 pb-2 font-mono">${Math.round(i.price * 1.25 * RATE).toLocaleString()} MMK</p>
                </div>
            `).join('');
        }
        loadShop();
    </script>
</body>
</html>
