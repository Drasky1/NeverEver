<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #000; color: white; }</style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/80 backdrop-blur-lg z-50">
        <h1 class="text-xl font-black italic text-emerald-400">NEVER<span class="text-white">EVER</span></h1>
        <div class="flex items-center gap-6">
            <span id="userGreet" class="text-[10px] font-bold uppercase tracking-widest text-slate-500"></span>
            <button onclick="toggleCart()" class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/>
                </svg>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-emerald-500 text-black text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </nav>

    <main class="p-6 max-w-6xl mx-auto">
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-24"></div>

        <section id="preorder" class="max-w-md mx-auto py-20 border-t border-white/5">
            <div class="bg-slate-900/50 p-8 rounded-[40px] border border-white/5 text-center">
                <h2 class="text-lg font-black italic uppercase text-emerald-400 mb-6">Custom Preorder</h2>
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="Item name or Brand" class="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none text-sm">
                    <button id="p_upload" class="w-full border border-dashed border-white/20 py-6 rounded-2xl text-[10px] font-bold text-slate-500 uppercase">📸 Upload Photo</button>
                    <input type="hidden" id="pImg">
                    <button onclick="submitPreorder()" class="w-full bg-emerald-500 text-black font-black py-4 rounded-2xl uppercase text-[10px]">Send Request</button>
                </div>
            </div>
        </section>
    </main>

    <div id="cartModal" class="fixed inset-0 bg-black/95 z-[100] hidden p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black italic uppercase">Your Cart</h2>
                <button onclick="toggleCart()" class="text-slate-500 text-xs font-bold uppercase tracking-widest">Close</button>
            </div>
            
            <div id="cartItems" class="space-y-4 mb-10"></div>

            <div id="checkoutForm" class="hidden space-y-4">
                <div class="flex justify-between border-t border-white/10 pt-6 mb-6">
                    <p class="text-slate-400 uppercase text-xs font-bold">Total MMK</p>
                    <p id="cartTotal" class="text-emerald-400 font-black text-xl">0</p>
                </div>
                
                <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-2">Delivery Info</h3>
                <input type="text" id="orderAddress" placeholder="Full Address" class="w-full bg-slate-900 p-4 rounded-2xl">
                <input type="text" id="orderPhone" placeholder="Phone Number" class="w-full bg-slate-900 p-4 rounded-2xl">
                
                <div class="bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-3xl mt-6">
    <p class="text-[10px] font-black text-emerald-400 uppercase mb-4">Payment: KPay / Wave</p>
    <p class="text-sm font-mono font-bold">KPay: 09 123456789 (U Thant Zin)</p>
    <p class="text-sm font-mono font-bold">Wave: 09 123456789 (U Thant Zin)</p>
    
    <button id="uploadSS" class="w-full mt-4 border border-dashed border-emerald-500/50 py-4 rounded-xl text-[10px] font-bold text-emerald-500">📸 UPLOAD SCREENSHOT</button>
    <input type="hidden" id="paymentImg">
</div>
                <button onclick="submitOrder()" class="w-full bg-emerald-500 text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest mt-6">Confirm Purchase</button>
            </div>

            <div id="authPrompt" class="hidden text-center py-20">
                <p class="text-slate-400 text-sm mb-6 uppercase font-bold">Login required to shop</p>
                <a href="/login" class="bg-white text-black px-10 py-4 rounded-2xl font-black uppercase text-[10px]">Login / Sign Up →</a>
            </div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        const RATE = 130;
        let cart = [];
        const user = JSON.parse(localStorage.getItem('neverUser'));

        // Handle UI based on Login
        const greet = document.getElementById('userGreet');
        if(user) {
            greet.innerHTML = `${user.username} | <button onclick="localStorage.clear();location.reload()" class="text-red-500">Logout</button>`;
        } else {
            greet.innerHTML = `<a href="/login" class="text-emerald-400">Login / Sign Up</a>`;
        }

        async function loadShop() {
            const res = await fetch('/items');
            const data = await res.json();
            const grid = document.getElementById('shop-grid');
            
            // Show everything EXCEPT 'Pending' items
            const activeItems = data.filter(i => i.grade !== 'Pending').reverse();

            grid.innerHTML = activeItems.map(i => `
                <div class="bg-slate-900/50 p-3 rounded-[32px] border border-white/5">
                    <img src="${i.productImage}" class="w-full aspect-[3/4] object-cover rounded-2xl mb-3">
                    <div class="px-2">
                        <h3 class="text-[10px] uppercase font-bold text-slate-400 truncate">${i.name}</h3>
                        <p class="font-black text-emerald-400 text-sm mb-3">${Math.round(i.price * 1.25 * RATE).toLocaleString()} MMK</p>
                        <button onclick="addToCart('${i._id}', '${i.name}', ${i.price * 1.25 * RATE}, '${i.productImage}')" 
                            class="w-full bg-white text-black text-[9px] font-black py-2.5 rounded-xl uppercase">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, name, price, img) {
            cart.push({id, name, price, img});
            updateCartUI();
            alert("Added to Cart!");
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('cartTotal').innerText = Math.round(total).toLocaleString() + " MMK";
            
            document.getElementById('cartItems').innerHTML = cart.map((item, idx) => `
                <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl">
                    <div class="flex items-center gap-4">
                        <img src="${item.img}" class="w-10 h-10 object-cover rounded-lg">
                        <p class="text-[10px] font-bold uppercase">${item.name}</p>
                    </div>
                    <button onclick="cart.splice(${idx},1);updateCartUI()" class="text-red-500 text-xs">✕</button>
                </div>
            `).join('');

            if(cart.length > 0) {
                if(user) {
                    document.getElementById('checkoutForm').classList.remove('hidden');
                    document.getElementById('orderAddress').value = user.address || '';
                    document.getElementById('orderPhone').value = user.phone || '';
                } else {
                    document.getElementById('authPrompt').classList.remove('hidden');
                }
            }
        }

        function toggleCart() { document.getElementById('cartModal').classList.toggle('hidden'); }

        // CLOUDINARY LOGIC
        var ssWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (error, result) => { 
            if (!error && result.event === "success") { 
                document.getElementById('paymentImg').value = result.info.secure_url;
                document.getElementById('uploadSS').innerText = "✅ SCREENSHOT SAVED";
            }
        });
        document.getElementById("uploadSS").addEventListener("click", () => ssWidget.open());

        var preWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (error, result) => { 
            if (!error && result.event === "success") { 
                document.getElementById('pImg').value = result.info.secure_url;
                document.getElementById('p_upload').innerText = "✅ PHOTO READY";
            }
        });
        document.getElementById("p_upload").addEventListener("click", () => preWidget.open());

        async function submitPreorder() {
            const n = document.getElementById('pName').value;
            const img = document.getElementById('pImg').value;
            if(!user) return alert("Login first to send requests!");
            if(!n) return alert("Enter item name!");

            await fetch('/add-item', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ name: n, customerPhone: user.username, productImage: img, grade: 'Pending', price: 0 }) 
            });
            alert("Sent! Check Track Order later.");
            location.reload();
        }

        async function submitOrder() {
            const ss = document.getElementById('paymentImg').value;
            if(!ss) return alert("Upload screenshot!");
            
            const orderData = {
                userId: user.id, username: user.username, items: cart,
                totalMMK: cart.reduce((sum, i) => sum + i.price, 0),
                address: document.getElementById('orderAddress').value,
                phone: document.getElementById('orderPhone').value,
                paymentScreenshot: ss
            };

            await fetch('/submit-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(orderData) });
            alert("Order Success!");
            location.reload();
        }

        loadShop();
    </script>
</body>
</html>
