<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVEREVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fff; color: #000; font-family: Helvetica, sans-serif; text-transform: uppercase; }
        .yeezy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #000; }
        .product-card { background: #fff; cursor: pointer; }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: #f4f4f4; }
        .modal { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; overflow-y: auto; }
        
        /* SIZE BOXES FROM REFERENCE */
        .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .size-box { 
            border: 1.5px solid #000; 
            padding: 15px 0; 
            text-align: center; 
            font-size: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .size-box.active { background: #000; color: #fff; }
        .size-box:hover { background: #f4f4f4; }
        
        .btn-black { background: #000; color: #fff; padding: 20px; font-size: 11px; font-weight: 900; width: 100%; margin-top: 30px; }
    </style>
</head>
<body>

<nav class="p-6 flex justify-between items-center border-b border-black sticky top-0 bg-white z-50">
    <div class="flex gap-4">
        <button onclick="filter('Instock')" class="text-[10px] font-black">INSTOCK</button>
        <button onclick="filter('Preorder')" class="text-[10px] font-black opacity-40">PREORDER</button>
    </div>
    <div class="flex gap-4">
        <button id="authBtn" onclick="openAuth()" class="text-[10px] font-black underline">LOGIN</button>
        <button onclick="toggleCart(true)" class="text-[10px] font-black">CART (<span id="cartCount">0</span>)</button>
    </div>
</nav>

<div id="main-grid" class="yeezy-grid"></div>

<div id="productModal" class="modal">
    <div class="p-6 border-b border-black flex justify-between sticky top-0 bg-white">
        <button onclick="closeModal('productModal')" class="font-black text-[10px]">← BACK</button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2">
        <div id="pGallery" class="bg-[#f4f4f4]"></div>
        <div class="p-10 space-y-6">
            <h1 id="pName" class="text-3xl font-black italic"></h1>
            <p id="pPrice" class="text-xl font-bold"></p>
            <p class="text-[10px] font-black opacity-40">SELECT SIZE</p>
            <div id="sizeGrid" class="size-grid"></div>
            <button id="addBtn" onclick="addToCart()" class="btn-black">ADD TO BAG</button>
        </div>
    </div>
</div>

<script>
    let allItems = [], cart = [], user = JSON.parse(localStorage.getItem('neverUser')), currentItem = null, selectedSize = null;

    async function init() {
        const res = await fetch('/items'); allItems = await res.json();
        filter('Instock');
        updateCartUI();
    }

    function filter(cat) {
        const filtered = allItems.filter(i => i.category === cat);
        document.getElementById('main-grid').innerHTML = filtered.map(i => `
            <div class="product-card" onclick="openProduct('${i._id}')">
                <img src="${i.images[0]}">
                <div class="p-4 text-center">
                    <p class="text-[10px] font-black">${i.name}</p>
                    <p class="text-[10px] opacity-40 mt-1">${i.price.toLocaleString()} MMK</p>
                </div>
            </div>`).join('');
    }

    function openProduct(id) {
        currentItem = allItems.find(i => i._id === id);
        selectedSize = null;
        document.getElementById('pName').innerText = currentItem.name;
        document.getElementById('pPrice').innerText = currentItem.price.toLocaleString() + ' MMK';
        document.getElementById('pGallery').innerHTML = currentItem.images.map(img => `<img src="${img}" class="w-full object-contain">`).join('');
        
        // RENDER SIZE BOXES
        document.getElementById('sizeGrid').innerHTML = currentItem.availableSizes.map(s => `
            <div class="size-box" onclick="setS(this, '${s}')">${s}</div>
        `).join('');
        
        document.getElementById('productModal').style.display = 'block';
    }

    function setS(el, s) {
        document.querySelectorAll('.size-box').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedSize = s;
    }

    function addToCart() {
        if(!selectedSize) return alert("Select Size");
        cart.push({...currentItem, size: selectedSize});
        updateCartUI();
        closeModal('productModal');
    }

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openAuth() { window.location.href = 'login.html'; }

    init();
</script>
</body>
</html>
