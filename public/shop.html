<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVEREVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fff; font-family: Helvetica, sans-serif; text-transform: uppercase; }
        .yeezy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #eee; border-top: 1px solid #eee; }
        @media (min-width: 768px) { .yeezy-grid { grid-template-columns: repeat(4, 1fr); } }
        .product-card { background: #fff; padding: 20px; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; overflow-y: auto; }
        .status-badge { background: #000; color: #fff; padding: 2px 8px; border-radius: 99px; font-size: 8px; }
        #cartModal { transform: translateX(100%); transition: transform 0.4s; position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 400px; background: #fff; z-index: 2000; padding: 40px; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        #cartModal.show { transform: translateX(0); }
    </style>
</head>
<body>

<nav class="p-6 flex justify-between items-center sticky top-0 bg-white/90 z-50 border-b">
    <div class="flex gap-4">
        <button onclick="setFilter('Instock')" class="text-[10px] font-black">Instock</button>
        <button onclick="openMyOrders()" class="text-[10px] font-black opacity-40">My Orders</button>
    </div>
    <img src="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776343746/NEVEREVER_LOGO_boeayw.jpg" class="h-8 grayscale">
    <div class="flex gap-4">
        <button onclick="openAuth()" id="loginBtn" class="text-[10px] font-black">Login</button>
        <button onclick="toggleCart(true)" class="text-[10px] font-black">Cart (<span id="cartCount">0</span>)</button>
    </div>
</nav>

<main class="yeezy-grid" id="main-grid"></main>

<div id="ordersModal" class="modal">
    <div class="p-6 border-b flex justify-between">
        <button onclick="closeOrders()" class="text-[10px] font-black">← Back</button>
        <span class="text-[10px] font-black">My Tracking</span>
        <div class="w-10"></div>
    </div>
    <div class="p-10 max-w-2xl mx-auto space-y-6" id="my-orders-list"></div>
</div>

<div id="productModal" class="modal">
    <div id="imageGallery"></div>
    <div class="p-10 space-y-6">
        <h1 id="pName" class="text-2xl font-black italic"></h1>
        <div id="sizeGrid" class="flex gap-2"></div>
        <button onclick="handleAddToCart()" class="bg-black text-white w-full py-6 text-[10px] font-black tracking-widest">Add to Cart</button>
    </div>
</div>

<div id="cartModal" class="overflow-y-auto">
    <h2 class="text-xl font-black mb-10 italic">Cart</h2>
    <div id="cartItems" class="space-y-4 mb-10"></div>
    <div id="checkoutForm" class="hidden space-y-4">
        <input type="text" id="orderAddr" placeholder="Address" class="border-b w-full py-3 text-[10px] font-black">
        <button id="uploadSS" class="w-full border p-4 text-[9px] font-black">📸 Upload Receipt</button>
        <input type="hidden" id="paymentImg">
        <button onclick="submitOrder()" class="bg-black text-white w-full py-6 text-[10px] font-black">Order Now</button>
    </div>
</div>

<div id="authModal" class="modal flex items-center justify-center">
    <div class="max-w-xs w-full p-10 text-center">
        <h2 class="font-black text-[10px] mb-10">Auth Access</h2>
        <input type="text" id="authUser" placeholder="Username" class="border-b w-full py-3 mb-4 text-[10px]">
        <input type="password" id="authPass" placeholder="Password" class="border-b w-full py-3 mb-6 text-[10px]">
        <button onclick="handleAuth(true)" class="bg-black text-white w-full py-4 text-[10px] font-black mb-2">Login</button>
        <button onclick="handleAuth(false)" class="text-[9px] font-black opacity-40">Create Account</button>
    </div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script>
    let allItems = [], cart = {}, user = JSON.parse(localStorage.getItem('neverUser'));
    
    async function loadShop() {
        allItems = await (await fetch('/items')).json();
        renderGrid();
        if(user) document.getElementById('loginBtn').innerText = user.username;
    }

    function renderGrid() {
        document.getElementById('main-grid').innerHTML = allItems.map(i => `
            <div class="product-card" onclick="openProduct('${i._id}')">
                <img src="${i.images[0]}" class="w-full aspect-[3/4] object-cover mb-4">
                <p class="text-[10px] font-black text-center">${i.name}<br><span class="opacity-40">${i.price.toLocaleString()} MMK</span></p>
            </div>`).join('');
    }

    async function openMyOrders() {
        if(!user) return openAuth();
        const orders = await (await fetch(`/my-orders/${user.id}`)).json();
        document.getElementById('ordersModal').style.display = 'block';
        document.getElementById('my-orders-list').innerHTML = orders.map(o => `
            <div class="border p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-black">Order #${o._id.slice(-5)}</span>
                    <span class="status-badge">${o.status}</span>
                </div>
                <p class="text-[12px] font-black">Arriving in: <span class="text-green-600">${o.estArrival}</span></p>
                <div class="w-full bg-gray-100 h-1 rounded-full overflow-hidden">
                    <div class="bg-black h-full" style="width: ${o.status=='Pending'?'20%':o.status=='Shipped'?'60%':'100%'}"></div>
                </div>
                <p class="text-[9px] opacity-40">${o.items.map(i=>i.name).join(', ')}</p>
            </div>`).join('') || '<p class="text-center opacity-30">No orders found</p>';
    }

    // Standard Auth/Cart Logic here...
    function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
    function closeOrders() { document.getElementById('ordersModal').style.display = 'none'; }
    function toggleCart(s) { document.getElementById('cartModal').classList.toggle('show', s); }

    async function handleAuth(isLogin) {
        const u = document.getElementById('authUser').value, p = document.getElementById('authPass').value;
        const res = await fetch(isLogin?'/auth/login':'/auth/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
        const d = await res.json();
        if(res.ok) { localStorage.setItem('neverUser', JSON.stringify(d.user)); location.reload(); } else alert("Error");
    }

    var widget = cloudinary.createUploadWidget({ cloudName:'dawhhgjsd', uploadPreset:'dawhhgjsd' }, (e,r) => { if(r.event==="success") document.getElementById('paymentImg').value = r.info.secure_url; });
    document.getElementById("uploadSS").onclick = () => widget.open();

    async function submitOrder() {
        const data = { userId:user.id, username:user.username, items:Object.keys(cart).map(k=>({name:k, qty:cart[k].qty})), totalMMK:10000, address:document.getElementById('orderAddr').value, paymentScreenshot:document.getElementById('paymentImg').value };
        await fetch('/submit-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
        alert("Ordered!"); location.reload();
    }

    loadShop();
</script>
</body>
</html>
