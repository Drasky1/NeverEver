<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVEREVER</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776407597/izsqh19ttd1purqiscmx.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #fff; color: #000; font-family: Helvetica, sans-serif; text-transform: uppercase; }
        .yeezy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #000; border-top: 1px solid #000; }
        .product-card { background: #fff; cursor: pointer; position: relative; }
        .sold-out-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; z-index: 10; color: red; }
        .modal { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; overflow-y: auto; }
        .btn-black { background: #000; color: #fff; padding: 20px; font-size: 10px; font-weight: 900; width: 100%; border: 1px solid #000; }
        .size-chip { border: 1px solid #000; padding: 12px; font-size: 10px; font-weight: 900; text-align: center; cursor: pointer; }
        .size-chip.active { background: #000; color: #fff; }
    </style>
</head>
<body>

<nav class="p-6 flex justify-between items-center sticky top-0 bg-white z-50 border-b border-black">
    <div class="flex gap-4">
        <button onclick="filter('Instock')" class="text-[10px] font-black hover:underline">Instock</button>
        <button onclick="filter('Preorder')" class="text-[10px] font-black opacity-40 hover:opacity-100">Preorder</button>
        <button onclick="openOrders()" class="text-[10px] font-black opacity-40 hover:opacity-100">My Orders</button>
    </div>
    <img src="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776407597/izsqh19ttd1purqiscmx.jpg" class="h-10 cursor-pointer" onclick="location.reload()">
    <div class="flex gap-4">
        <button id="authBtn" onclick="openAuth()" class="text-[10px] font-black hover:underline">Login</button>
        <button onclick="toggleCart(true)" class="text-[10px] font-black hover:underline">Cart (<span id="cartCount">0</span>)</button>
    </div>
</nav>

<main class="yeezy-grid" id="main-grid"></main>

<div id="authModal" class="modal flex items-center justify-center">
    <div class="max-w-xs w-full p-10 space-y-4 border border-black bg-white">
        <h2 class="text-center font-black text-[10px] mb-6 italic">Member Access</h2>
        <div id="g_id_onload" 
             data-client_id="866705523346-4dnad433fs6ckk7lieark8a764h8ulp8.apps.googleusercontent.com" 
             data-callback="handleGoogle"></div>
        <div class="g_id_signin" data-type="standard"></div>
        <button onclick="document.getElementById('authModal').style.display='none'" class="w-full text-[8px] mt-4 font-bold underline">Close</button>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="p-6 border-b border-black flex justify-between"><button onclick="document.getElementById('productModal').style.display='none'" class="text-[10px] font-black hover:underline">← Back</button></div>
    <div class="grid grid-cols-1 md:grid-cols-2">
        <div id="pGallery" class="flex flex-col gap-1 bg-black"></div>
        <div class="p-10 md:p-20 space-y-10 bg-white">
            <div><h1 id="pName" class="text-2xl font-black italic"></h1><p id="pPrice" class="text-lg font-bold mt-2"></p></div>
            <div><p class="text-[9px] font-black opacity-30 mb-4">Select Size</p><div id="sizeGrid" class="grid grid-cols-4 gap-2"></div></div>
            <button id="addBtn" onclick="addToCart()" class="btn-black">Add To Cart</button>
        </div>
    </div>
</div>

<div id="ordersModal" class="modal">
    <div class="p-6 border-b border-black flex justify-between items-center"><button onclick="document.getElementById('ordersModal').style.display='none'" class="text-[10px] font-black">← Back</button><span class="text-[10px] font-black">My Orders</span><div class="w-10"></div></div>
    <div id="my-orders-list" class="p-10 max-w-xl mx-auto space-y-12"></div>
</div>

<script>
    let allItems = [], user = JSON.parse(localStorage.getItem('neverUser')), currentItem = null, selectedSize = null;

    async function init() {
        const res = await fetch('/items'); allItems = await res.json();
        filter('Instock');
        if(user) document.getElementById('authBtn').innerText = "Logout";
    }

    function filter(cat) {
        const filtered = allItems.filter(i => i.category === cat);
        document.getElementById('main-grid').innerHTML = filtered.map(i => `
            <div class="product-card pb-6" onclick="openProduct('${i._id}')">
                ${i.isSoldOut ? '<div class="sold-out-overlay">SOLD OUT</div>' : ''}
                <img src="${i.images[0]}" class="w-full aspect-[3/4] object-cover mb-4">
                <p class="text-[10px] font-black text-center">${i.name}<br><span class="opacity-40">${i.price.toLocaleString()} MMK</span></p>
            </div>`).join('');
    }

    function openProduct(id) {
        currentItem = allItems.find(i => i._id === id); selectedSize = null;
        document.getElementById('pName').innerText = currentItem.name;
        document.getElementById('pPrice').innerText = `${currentItem.price.toLocaleString()} MMK`;
        document.getElementById('pGallery').innerHTML = currentItem.images.map(img => `<img src="${img}" class="w-full">`).join('');
        
        // Sizing Fix: Split string into buttons
        const sizes = currentItem.availableSizes[0].split(',');
        document.getElementById('sizeGrid').innerHTML = sizes.map(s => `
            <div class="size-chip" onclick="selSize(this, '${s.trim()}')">${s.trim()}</div>
        `).join('');
        
        document.getElementById('addBtn').innerText = currentItem.isSoldOut ? "SOLD OUT" : "ADD TO CART";
        document.getElementById('addBtn').disabled = currentItem.isSoldOut;
        document.getElementById('productModal').style.display = 'block';
    }

    function selSize(el, s) { document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); selectedSize = s; }

    function handleGoogle(response) {
        localStorage.setItem('neverUser', JSON.stringify({username: 'Customer', id: 'google_user'}));
        location.reload(); 
    }

    async function openOrders() {
        if(!user) return openAuth();
        const orders = await (await fetch(`/my-orders/${user.id}`)).json();
        document.getElementById('ordersModal').style.display = 'block';
        document.getElementById('my-orders-list').innerHTML = orders.map(o => `
            <div class="flex gap-4 border-b border-black pb-8">
                <img src="${o.items[0]?.images?.[0] || ''}" class="w-20 h-24 object-cover border border-black">
                <div class="text-[10px] font-bold">
                    <p class="opacity-40">Order ID: #${o._id.slice(-5)}</p>
                    <p class="text-sm font-black">${o.items.map(i => i.name).join(', ')}</p>
                    <p class="mt-2">Status: <span class="text-emerald-600">${o.status}</span></p>
                    <p>Estimated: ${o.estArrival || 'Processing...'}</p>
                </div>
            </div>`).join('') || '<p class="text-center font-black">No orders found.</p>';
    }

    function openAuth() { 
        if(user) { localStorage.removeItem('neverUser'); location.reload(); }
        else { document.getElementById('authModal').style.display = 'flex'; }
    }
    init();
</script>
</body>
</html>
