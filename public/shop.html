<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeverEver Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #000; color: #fff; } .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }</style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <h1 class="text-xl font-black italic text-emerald-400">NEVER EVER</h1>
        <div class="flex gap-6">
            <a href="/track" class="text-[10px] uppercase font-bold text-slate-400">Track Order</a>
            <a href="#preorder" class="text-[10px] uppercase font-bold border border-white/20 px-4 py-2 rounded-full">Request Preorder</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-10">
        <div id="shopGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-32"></div>

        <section id="preorder" class="max-w-2xl mx-auto pb-32">
            <div class="glass p-8 rounded-3xl">
                <h3 class="text-2xl font-bold mb-8 text-center">Custom Preorder</h3>
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="Item Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-emerald-500">
                    <input type="text" id="pContact" placeholder="Telegram @username" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-emerald-500">
                    <button type="button" id="shop_upload_widget" class="w-full border-2 border-dashed border-white/10 p-8 rounded-xl text-slate-500 text-xs uppercase tracking-widest">📸 Upload Image</button>
                    <input type="hidden" id="shop_img_url">
                    <button onclick="submitShopPreorder()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm">Submit</button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        async function loadShop() {
            const res = await fetch('/students');
            const data = await res.json();
            const publicItems = data.filter(item => item.grade === 'Instock' || item.grade === 'Preorder');
            document.getElementById('shopGrid').innerHTML = publicItems.map(item => `
                <div class="glass p-2 rounded-2xl">
                    <img src="${item.productImage}" class="aspect-[3/4] w-full object-cover rounded-xl mb-3">
                    <h4 class="font-bold text-xs px-2">${item.name}</h4>
                    <p class="text-emerald-400 text-xs px-2 pb-2 font-mono">${(item.price * 1.25 * 130).toLocaleString()} MMK</p>
                </div>
            `).join('');
        }
        var shopWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (error, result) => { 
            if (!error && result.event === "success") { document.getElementById('shop_img_url').value = result.info.secure_url; }
        });
        document.getElementById("shop_upload_widget").addEventListener("click", () => shopWidget.open());
        
        async function submitShopPreorder() {
            const order = { name: document.getElementById('pName').value, customerPhone: document.getElementById('pContact').value, grade: 'Pending', productImage: document.getElementById('shop_img_url').value };
            await fetch('/add-student', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(order) });
            alert("Sent!"); location.reload();
        }
        loadShop();
    </script>
</body>
</html>
