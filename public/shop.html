<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver | Official Store</title>
    <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776343746/NEVEREVER_LOGO_boeayw.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f2f2f2; color: #000; font-family: 'Helvetica', sans-serif; overflow-x: hidden; }
        #shop-grid { gap: 1px; background-color: #e0e0e0; border: 1px solid #e0e0e0; }
        .shop-item { background: #f2f2f2; padding: 40px 20px; transition: all 0.3s ease; position: relative; }
        .shop-item:hover { background: #fff; }
        .filter-btn { color: #888; transition: color 0.2s; font-size: 11px; letter-spacing: 0.1em; font-weight: 900; }
        .filter-btn.active { color: #000; text-decoration: underline; text-underline-offset: 4px; }
        .sold-out img { filter: grayscale(1); opacity: 0.3; }
        .sold-text { position: absolute; top: 20px; right: 20px; font-size: 9px; font-weight: 900; letter-spacing: 2px; color: #ff0000; }
        #cartModal { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #cartModal.show { transform: translateX(0); }
    </style>
</head>
<body>

    <nav class="p-8 grid grid-cols-3 items-center sticky top-0 bg-[#f2f2f2]/90 backdrop-blur-md z-50 border-b border-black/5">
        <div class="flex gap-4">
            <a href="/track" class="text-[10px] font-black uppercase tracking-[0.2em]">Track</a>
        </div>
        <div class="flex justify-center">
            <a href="/"><img src="https://res.cloudinary.com/dawhhgjsd/image/upload/v1776343746/NEVEREVER_LOGO_boeayw.jpg" class="h-10 md:h-14 w-auto grayscale contrast-125"></a>
        </div>
        <div class="flex justify-end gap-6 items-center">
            <div id="userGreet" class="text-[10px] font-bold uppercase hidden md:block"></div>
            <button onclick="toggleCart()" class="text-[10px] font-black uppercase tracking-[0.2em]">Cart (<span id="cartCount">0</span>)</button>
        </div>
    </nav>

    <div class="flex justify-center gap-10 p-6 border-b border-black/5">
        <button onclick="setFilter('All')" class="filter-btn active uppercase">All</button>
        <button onclick="setFilter('Clothing')" class="filter-btn uppercase">Clothing</button>
        <button onclick="setFilter('Accessories')" class="filter-btn uppercase">Accessories</button>
    </div>

    <main class="max-w-7xl mx-auto border-x border-black/5">
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-4"></div>
    </main>

    <div id="cartOverlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[90] hidden" onclick="toggleCart()"></div>
    <div id="cartModal" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[100] p-10 shadow-2xl overflow-y-auto">
        <div class="flex justify-between items-center mb-16">
            <h2 class="text-xl font-black italic uppercase">Cart</h2>
            <button onclick="toggleCart()" class="text-[10px] font-bold uppercase text-slate-400">Close</button>
        </div>
        <div id="cartItems" class="space-y-8 mb-16"></div>
        <div id="checkoutForm" class="hidden">
            <div class="flex justify-between border-t border-black pt-6 mb-10 text-[10px] font-black uppercase"><span>Subtotal</span><span id="cartTotal"></span></div>
            <div class="space-y-4">
                <input type="text" id="orderAddr" placeholder="ADDRESS" class="w-full border-b border-black/10 py-4 text-[11px] font-bold outline-none uppercase">
                <input type="text" id="orderPh" placeholder="PHONE" class="w-full border-b border-black/10 py-4 text-[11px] font-bold outline-none uppercase">
                <button id="uploadSS" class="w-full border border-black py-4 text-[10px] font-black uppercase tracking-widest mt-4">📸 Photo Receipt</button>
                <input type="hidden" id="paymentImg">
                <button onclick="submitOrder()" class="w-full bg-black text-white font-black py-6 text-[10px] uppercase tracking-[0.3em] mt-8">Confirm Purchase</button>
            </div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        let allItems = []; let currentCategory = 'All'; let cart = [];
        const user = JSON.parse(localStorage.getItem('neverUser'));
        if(user) document.getElementById('userGreet').innerHTML = `${user.username} <button onclick="logout()" class="ml-2 text-slate-400">Logout</button>`;
        else document.getElementById('userGreet').innerHTML = `<a href="/login">Login</a>`;
        function logout() { localStorage.removeItem('neverUser'); location.reload(); }

        async function loadShop() {
            const res = await fetch('/items');
            allItems = await res.json();
            renderGrid();
        }

        function setFilter(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.includes(cat.toUpperCase())));
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('shop-grid');
            const filtered = allItems.filter(i => (currentCategory === 'All' || i.category === currentCategory) && i.grade !== 'Pending').reverse();
            grid.innerHTML = filtered.map(i => {
                const isSold = i.grade === 'Soldout';
                const isPre = i.grade === 'Pre-order';
                return `
                <div class="shop-item group cursor-pointer ${isSold ? 'sold-out' : ''}" onclick="${isSold ? '' : `addToCart('${i.name}', ${i.price}, '${i.productImage}')`}">
                    ${isSold ? '<span class="sold-text">SOLD</span>' : ''}
                    ${isPre ? '<span class="absolute top-4 left-4 text-[7px] border border-black px-2 py-0.5 font-black uppercase">Pre-order</span>' : ''}
                    <img src="${i.productImage}" class="w-full aspect-square object-contain mb-8 mix-blend-multiply group-hover:scale-105 transition-transform duration-700">
                    <div class="text-center"><h3 class="text-[10px] font-black uppercase tracking-widest mb-1">${i.name}</h3><p class="text-[10px] text-slate-500 font-bold">${i.price.toLocaleString()} MMK</p></div>
                </div>`;
            }).join('');
        }

        function addToCart(name, price, img) { cart.push({name, price, img}); updateCartUI(); toggleCart(true); }
        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const total = cart.reduce((s,i)=>s+i.price, 0);
            document.getElementById('cartTotal').innerText = `${total.toLocaleString()} MMK`;
            document.getElementById('cartItems').innerHTML = cart.map((i,idx)=>`<div class="flex gap-6 items-center"><img src="${i.img}" class="w-16 h-16 object-contain bg-slate-50"><div class="flex-1 font-black uppercase text-[10px]">${i.name}</div><button onclick="cart.splice(${idx},1);updateCartUI()">✕</button></div>`).join('');
            if(cart.length > 0 && user) { document.getElementById('checkoutForm').classList.remove('hidden'); document.getElementById('orderAddr').value = user.address; document.getElementById('orderPh').value = user.phone; }
            else document.getElementById('checkoutForm').classList.add('hidden');
        }
        function toggleCart(open = false) { document.getElementById('cartModal').classList.toggle('show', open); document.getElementById('cartOverlay').classList.toggle('hidden', !open); if(!open) { document.getElementById('cartModal').classList.remove('show'); } }

        var ssWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (e, r) => { if(r.event==="success") { document.getElementById('paymentImg').value = r.info.secure_url; document.getElementById('uploadSS').innerText = "✅ PHOTO READY"; }});
        document.getElementById("uploadSS").onclick = () => ssWidget.open();

        async function submitOrder() {
            const ss = document.getElementById('paymentImg').value; if(!ss) return alert("Upload receipt!");
            const res = await fetch('/submit-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId: user.id, username: user.username, items: cart, totalMMK: cart.reduce((s,i)=>s+i.price,0), address: document.getElementById('orderAddr').value, phone: document.getElementById('orderPh').value, paymentScreenshot: ss }) });
            if(res.ok) { alert("ORDER SENT"); location.reload(); }
        }
        loadShop();
    </script>
</body>
</html>
