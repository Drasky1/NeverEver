<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .cart-badge { animation: pop 0.3s ease; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md z-50 border-b border-white/5">
        <h1 class="text-xl font-black italic text-emerald-400">NEVER<span class="text-white">EVER</span></h1>
        <div class="flex items-center gap-6">
            <span id="userGreet" class="text-[10px] uppercase font-bold text-slate-500"></span>
            <button onclick="toggleCart()" class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-emerald-500 text-black text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </nav>

    <main class="p-6 max-w-6xl mx-auto">
        <div id="shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </main>

    <div id="cartModal" class="fixed inset-0 bg-black/95 z-[100] hidden p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black italic uppercase">Your Cart</h2>
                <button onclick="toggleCart()" class="text-slate-500 font-bold">CLOSE</button>
            </div>
            
            <div id="cartItems" class="space-y-4 mb-10"></div>

            <div class="border-t border-white/10 pt-6 mb-10">
                <div class="flex justify-between mb-2">
                    <p class="text-slate-400 uppercase text-xs font-bold">Total MMK</p>
                    <p id="cartTotal" class="text-emerald-400 font-black text-xl">0</p>
                </div>
            </div>

            <div id="checkoutForm" class="space-y-4 hidden">
                <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest">Delivery Details</h3>
                <input type="text" id="orderAddress" placeholder="Full Address (Township/City)" class="w-full bg-slate-900 p-4 rounded-2xl outline-none">
                <input type="text" id="orderPhone" placeholder="Phone Number" class="w-full bg-slate-900 p-4 rounded-2xl outline-none">
                
                <div class="bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-3xl mt-6">
                    <p class="text-[10px] font-black text-emerald-400 uppercase mb-4">Transfer to KPay/Wave</p>
                    <p class="text-sm font-mono font-bold">09 777XXXXXX (Malcolm)</p>
                    <button id="uploadPayment" class="w-full mt-4 border border-dashed border-emerald-500/50 py-4 rounded-xl text-[10px] font-bold text-emerald-500">📸 UPLOAD SCREENSHOT</button>
                    <input type="hidden" id="paymentImg">
                </div>

                <button onclick="submitOrder()" class="w-full bg-emerald-500 text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest mt-6">Confirm Purchase</button>
            </div>

            <div id="authPrompt" class="text-center py-10 hidden">
                <p class="text-slate-400 text-sm mb-4">You must be logged in to checkout.</p>
                <a href="/login.html" class="text-emerald-400 font-bold uppercase text-xs">Login or Sign Up →</a>
            </div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        const RATE = 130;
        let cart = [];
        let user = JSON.parse(localStorage.getItem('neverUser'));

        if(user) document.getElementById('userGreet').innerText = user.username;

        async function loadShop() {
    try {
        const res = await fetch('/items');
        const data = await res.json();
        const grid = document.getElementById('shop-grid');
        
        // This line is the filter. 
        // We show it if it's "Instock", "Preorder", "Soldout", or even if the grade is missing!
        // We ONLY hide it if it is explicitly "Pending".
        const activeItems = data.filter(i => i.grade !== 'Pending');

        if (activeItems.length === 0) {
            grid.innerHTML = "<p class='col-span-full text-center text-slate-500 py-10'>No items available yet.</p>";
            return;
        }

        grid.innerHTML = activeItems.reverse().map(i => `
            <div class="bg-slate-900/50 p-3 rounded-[32px] border border-white/5">
                <div class="aspect-[3/4] rounded-2xl overflow-hidden mb-3">
                    <img src="${i.productImage || 'https://via.placeholder.com/300x400'}" class="w-full h-full object-cover">
                </div>
                <div class="px-2">
                    <h3 class="text-[10px] uppercase font-bold text-slate-400 truncate">${i.name || 'Unnamed Item'}</h3>
                    <p class="font-black text-emerald-400 text-sm mb-3">${Math.round((i.price || 0) * 1.25 * RATE).toLocaleString()} MMK</p>
                    <button onclick="addToCart('${i._id}', '${i.name}', ${(i.price || 0) * 1.25 * RATE}, '${i.productImage}')" 
                        class="w-full bg-white text-black text-[9px] font-black py-2.5 rounded-xl uppercase hover:bg-emerald-400 transition-colors">
                        Add to Cart
                    </button>
                </div>
            </div>
        `).join('');
    } catch (e) {
        console.error("Shop load error:", e);
    }
}

        function addToCart(id, name, price, img) {
            cart.push({id, name, price, img});
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cartTotal').innerText = Math.round(total).toLocaleString() + " MMK";
            
            document.getElementById('cartItems').innerHTML = cart.map((item, idx) => `
                <div class="flex items-center justify-between bg-white/5 p-3 rounded-2xl">
                    <div class="flex items-center gap-4">
                        <img src="${item.img}" class="w-10 h-10 object-cover rounded-lg">
                        <p class="text-[10px] font-bold uppercase">${item.name}</p>
                    </div>
                    <button onclick="cart.splice(${idx},1);updateCartUI()" class="text-red-500 text-[10px]">✕</button>
                </div>
            `).join('');

            if(cart.length > 0) {
                if(user) {
                    document.getElementById('checkoutForm').classList.remove('hidden');
                    document.getElementById('orderAddress').value = user.address || '';
                    document.getElementById('orderPhone').value = user.phone || '';
                } else {
                    document.getElementById('authPrompt').classList.remove('hidden');
                }
            }
        }

        function toggleCart() { document.getElementById('cartModal').classList.toggle('hidden'); }

        // PAYMENT UPLOAD
        var myWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (error, result) => { 
            if (!error && result.event === "success") { 
                document.getElementById('paymentImg').value = result.info.secure_url;
                document.getElementById('uploadPayment').innerText = "✅ SCREENSHOT SAVED";
            }
        });
        document.getElementById("uploadPayment").addEventListener("click", () => myWidget.open());

        async function submitOrder() {
            const ss = document.getElementById('paymentImg').value;
            if(!ss) return alert("Please upload payment screenshot!");

            const orderData = {
                userId: user.id,
                username: user.username,
                items: cart,
                totalMMK: cart.reduce((sum, item) => sum + item.price, 0),
                address: document.getElementById('orderAddress').value,
                phone: document.getElementById('orderPhone').value,
                paymentScreenshot: ss
            };

            await fetch('/submit-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(orderData)
            });

            alert("Order Submitted! Please wait for verification.");
            cart = [];
            location.reload();
        }

        loadShop();
    </script>
</body>
</html>
