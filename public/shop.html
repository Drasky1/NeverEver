<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver | Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <h1 class="text-xl font-black italic tracking-tighter text-emerald-400">NEVER<span class="text-white">EVER</span></h1>
        <div class="flex items-center gap-6">
            <a href="/track" class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-400 hover:text-white transition">Track Order</a>
            <a href="#preorder" class="text-[10px] uppercase tracking-[0.2em] font-bold border border-white/20 px-4 py-2 rounded-full hover:bg-white hover:text-black transition">Request Preorder</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-10">
        <div id="shopGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-24"></div>

        <section id="preorder" class="max-w-2xl mx-auto pb-32">
            <div class="glass p-8 rounded-3xl text-center">
                <h3 class="text-2xl font-bold mb-8">Custom Preorder</h3>
                <div class="space-y-4 text-left">
                    <input type="text" id="pName" placeholder="Item Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-emerald-500">
                    <input type="text" id="pContact" placeholder="Telegram @username" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-emerald-500">
                    
                    <button type="button" id="upload_widget" class="w-full border-2 border-dashed border-white/10 p-8 rounded-xl text-slate-500 text-xs uppercase tracking-widest hover:border-emerald-500/50 transition">
                        📸 <span id="upload_status">Upload Image</span>
                    </button>
                    <input type="hidden" id="pImg">

                    <button onclick="submitPreorder()" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-emerald-400 transition uppercase tracking-widest text-sm">Submit Request</button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        const RATE = 130;
        async function loadShop() {
            const res = await fetch('/students');
            const data = await res.json();
            const publicItems = data.filter(item => item.grade === 'Instock' || item.grade === 'Preorder');
            document.getElementById('shopGrid').innerHTML = publicItems.map(item => `
                <div class="glass p-2 rounded-2xl group cursor-pointer">
                    <div class="aspect-[3/4] overflow-hidden rounded-xl mb-3">
                        <img src="${item.productImage}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    <h4 class="font-bold text-xs px-2 truncate">${item.name}</h4>
                    <p class="text-emerald-400 text-xs px-2 pb-2 font-mono">${Math.round(item.price * 1.25 * RATE).toLocaleString()} MMK</p>
                </div>
            `).join('');
        }

        var myWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (error, result) => { 
            if (!error && result.event === "success") { 
                document.getElementById('pImg').value = result.info.secure_url;
                document.getElementById('upload_status').innerText = "Image Attached ✅";
            }
        });
        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open());

        async function submitPreorder() {
            const data = { name: document.getElementById('pName').value, customerPhone: document.getElementById('pContact').value, productImage: document.getElementById('pImg').value, grade: 'Pending', price: 0 };
            const res = await fetch('/add-student', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) { alert("Request Sent!"); location.reload(); }
        }
        loadShop();
    </script>
</body>
</html>
