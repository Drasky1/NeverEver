<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track | NeverEver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #f2f2f2; color: #000; font-family: 'Helvetica', sans-serif; }</style>
</head>
<body class="p-8">
    <div class="max-w-xl mx-auto py-20">
        <header class="flex justify-between items-center mb-24">
            <h1 class="text-[10px] font-black uppercase tracking-[0.4em]">Order Tracking</h1>
            <a href="/" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest underline underline-offset-4">Back</a>
        </header>

        <div id="list" class="space-y-24"></div>

        <div class="mt-32 text-center">
            <a href="https://t.me/tfuwnthuh" target="_blank" class="text-[10px] font-black uppercase tracking-[0.2em] border-b-2 border-black pb-2">
                Contact Support
            </a>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('neverUser'));
        if (!user) { window.location.href = '/login'; }
        const states = ["Pending Verification", "Paid & Verified", "Shipped", "Delivered"];

        async function load() {
            const res = await fetch(`/my-orders/${user.id}`);
            const orders = await res.json();
            document.getElementById('list').innerHTML = orders.map(o => {
                const step = states.indexOf(o.status);
                const progress = (step / (states.length - 1)) * 100;
                return `
                <div>
                    <div class="flex justify-between text-[9px] font-black uppercase tracking-widest mb-10 text-slate-400">
                        <span>ID: ${o._id.slice(-6)}</span>
                        <span>${new Date(o.createdAt).toLocaleDateString()}</span>
                    </div>
                    
                    <div class="relative h-[1px] bg-black/10 mb-10">
                        <div class="absolute h-[1px] bg-black transition-all duration-1000" style="width: ${progress}%"></div>
                        <div class="absolute -top-1 right-0 text-[8px] font-bold uppercase tracking-tighter">${o.status}</div>
                    </div>

                    <div class="text-[10px] font-black uppercase tracking-widest mb-4">
                        ${o.items.map(i => `<div>${i.name}</div>`).join('')}
                    </div>
                    <p class="text-xl font-black">${o.totalMMK.toLocaleString()} MMK</p>
                </div>`;
            }).join('');
        }
        load();
    </script>
</body>
</html>
