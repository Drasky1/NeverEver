<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order</title><script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #000; color: #fff; }</style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto py-10">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black italic uppercase">Track <span class="text-emerald-400">Order</span></h1>
            <a href="/" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">← Back</a>
        </header>
        <div id="list" class="space-y-6"></div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('neverUser'));
        const states = ["Pending Verification", "Paid & Verified", "Shipped", "Delivered"];

        async function load() {
            const res = await fetch(`/my-orders/${user.id}`);
            const orders = await res.json();
            document.getElementById('list').innerHTML = orders.map(o => {
                const step = states.indexOf(o.status);
                return `
                <div class="bg-slate-900/50 border border-white/5 p-8 rounded-[40px]">
                    <div class="flex justify-between text-[10px] font-black uppercase text-slate-500 mb-6">
                        <span>ID: ${o._id.slice(-6)}</span>
                        <span>${new Date(o.createdAt).toLocaleDateString()}</span>
                    </div>
                    
                    <div class="flex justify-between mb-8 relative">
                        <div class="absolute top-1/2 left-0 w-full h-[2px] bg-white/5 -translate-y-1/2 z-0"></div>
                        <div class="absolute top-1/2 left-0 h-[2px] bg-emerald-500 -translate-y-1/2 z-0 transition-all duration-1000" style="width: ${(step/3)*100}%"></div>
                        ${states.map((s, i) => `<div class="w-3 h-3 rounded-full z-10 ${i <= step ? 'bg-emerald-500 shadow-[0_0_10px_#10b981]' : 'bg-slate-800'}"></div>`).join('')}
                    </div>
                    
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-xs font-black uppercase text-emerald-400">${o.status}</p>
                            <p class="text-[10px] text-slate-500">${o.items.length} Items</p>
                        </div>
                        <p class="text-xl font-black">${o.totalMMK.toLocaleString()} MMK</p>
                    </div>
                </div>`;
            }).join('');
        }
        load();
    </script>
</body>
</html>
