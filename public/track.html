<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Track | NeverEver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #f2f2f2; font-family: Helvetica; }</style>
</head>
<body class="p-8">
    <div class="max-w-xl mx-auto py-10">
        <h1 class="text-[10px] font-black uppercase tracking-widest mb-10">Order Tracking</h1>
        <div id="list" class="space-y-10"></div>
    </div>
    <script>
        async function load() {
            const user = JSON.parse(localStorage.getItem('neverUser'));
            if(!user) return document.getElementById('list').innerHTML = "Login to track orders.";
            const res = await fetch(`/my-orders/${user.id}`);
            const orders = await res.json();
            document.getElementById('list').innerHTML = orders.map(o => `
                <div class="bg-white p-6 border border-black">
                    <p class="text-[10px] font-black uppercase">${o.status}</p>
                    <p class="text-xl font-black italic mt-2">${o.totalMMK.toLocaleString()} MMK</p>
                    <p class="text-[8px] opacity-40 mt-4">Arrival: ${o.estArrival || 'Pending'}</p>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>
