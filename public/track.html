<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order | NeverEver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #000; color: white; }</style>
</head>
<body class="p-6">
    <nav class="max-w-4xl mx-auto py-6 flex justify-between items-center mb-10">
        <a href="/" class="text-xs font-black uppercase tracking-widest text-slate-500">← Back to Shop</a>
        <h1 class="text-lg font-black italic text-emerald-400">ORDER <span class="text-white">TRACKER</span></h1>
    </nav>

    <main class="max-w-2xl mx-auto">
        <div id="authContent">
            <div id="orderList" class="space-y-6"></div>
        </div>

        <div id="loginPrompt" class="hidden text-center py-20 bg-slate-900/50 rounded-[40px] border border-white/5">
            <p class="text-slate-400 mb-6 font-bold uppercase text-[10px] tracking-widest">Please login to view your orders</p>
            <a href="/login" class="bg-white text-black px-10 py-4 rounded-2xl font-black uppercase text-[10px]">Login / Sign Up</a>
        </div>
    </main>

    <script>
        const user = JSON.parse(localStorage.getItem('neverUser'));

        async function loadMyOrders() {
            if (!user) {
                document.getElementById('loginPrompt').classList.remove('hidden');
                document.getElementById('authContent').classList.add('hidden');
                return;
            }

            try {
                const res = await fetch(`/my-orders/${user.id}`);
                const orders = await res.json();
                const list = document.getElementById('orderList');

                if (orders.length === 0) {
                    list.innerHTML = `
                        <div class="text-center py-20 text-slate-600 font-bold uppercase text-[10px]">
                            No orders found yet
                        </div>`;
                    return;
                }

                list.innerHTML = orders.map(order => `
                    <div class="bg-slate-900 border border-white/5 p-8 rounded-[40px]">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[10px] font-black text-slate-500 uppercase mb-1">Order Date</p>
                                <p class="text-sm font-bold">${new Date(order.createdAt).toLocaleDateString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-black text-slate-500 uppercase mb-1">Status</p>
                                <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase 
                                    ${order.status === 'Pending Verification' ? 'bg-yellow-500/10 text-yellow-500' : 
                                      order.status === 'Shipped' ? 'bg-blue-500/10 text-blue-500' : 'bg-emerald-500/10 text-emerald-400'}">
                                    ${order.status}
                                </span>
                            </div>
                        </div>

                        <div class="border-t border-white/5 pt-6">
                            <p class="text-[10px] font-black text-slate-500 uppercase mb-4">Items</p>
                            <div class="space-y-3">
                                ${order.items.map(item => `
                                    <div class="flex justify-between items-center text-xs">
                                        <span class="text-slate-300">${item.name}</span>
                                        <span class="font-bold text-emerald-400">${Math.round(item.price).toLocaleString()} MMK</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="flex justify-between mt-6 pt-4 border-t border-white/5">
                                <p class="text-[10px] font-black uppercase">Total Paid</p>
                                <p class="font-black text-white text-lg">${Math.round(order.totalMMK).toLocaleString()} MMK</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Order Load Error:", err);
            }
        }

        loadMyOrders();
    </script>
</body>
</html>
