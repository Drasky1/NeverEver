<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Order | NeverEver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #000; color: white; }</style>
</head>
<body class="flex flex-col items-center p-10">
    <div class="w-full max-w-md">
        <h1 class="text-2xl font-black italic text-emerald-400 mb-10 text-center uppercase tracking-widest">ORDER TRACKING</h1>
        <div class="bg-slate-900 p-8 rounded-[40px] border border-slate-800">
            <input type="text" id="tInput" placeholder="Telegram Username / Phone" class="w-full bg-black border border-slate-800 p-4 rounded-2xl outline-none mb-4 text-center text-sm">
            <button onclick="track()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest">Check Status</button>
        </div>
        <div id="tResult" class="mt-10 space-y-4"></div>
    </div>
    <script>
        async function track() {
            const input = document.getElementById('tInput').value.trim().toLowerCase().replace('@','');
            const res = await fetch('/items');
            const data = await res.json();
            const mine = data.filter(i => i.customerPhone && i.customerPhone.toLowerCase().includes(input));
            
            document.getElementById('tResult').innerHTML = mine.length ? mine.map(i => `
                <div class="bg-slate-900 p-6 rounded-3xl border-l-4 border-emerald-500">
                    <h3 class="font-black text-xs uppercase tracking-tight">${i.name}</h3>
                    <p class="text-emerald-400 text-[10px] font-bold uppercase mt-1">${i.grade}</p>
                    <div class="mt-4 p-3 bg-black/40 rounded-xl">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Status Update:</p>
                        <p class="text-[10px] text-white italic">"${i.adminNote || 'Your order is being processed...'}"</p>
                    </div>
                </div>
            `).join('') : '<p class="text-center text-red-500 text-[10px] uppercase font-bold tracking-widest">No matching orders found.</p>';
        }
    </script>
</body>
</html>
