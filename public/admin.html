<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver | Admin</title><script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; }
        .active-filter { background: white !important; color: black !important; }
        .glass-card { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-6">
    <div id="lockScreen" class="fixed inset-0 bg-black z-[200] flex items-center justify-center p-6">
        <div class="bg-slate-900 p-10 rounded-[40px] border border-white/5 w-full max-w-sm text-center">
            <h2 class="text-xl font-black italic mb-6 text-emerald-400 uppercase">Admin Lock</h2>
            <input type="password" id="adminPass" placeholder="Master Password" class="w-full bg-black p-4 rounded-2xl outline-none mb-4 text-center border border-white/10">
            <button onclick="unlock()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px]">Unlock System</button>
        </div>
    </div>

    <div id="adminContent" class="hidden max-w-6xl mx-auto">
        <h1 class="text-3xl font-black italic text-emerald-400 mb-10 tracking-tighter">DASHBOARD</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-card p-8 rounded-[40px]">
                <p class="text-[10px] font-black uppercase text-slate-500 mb-2 tracking-widest">Inventory Value</p>
                <h2 id="totalUsage" class="text-2xl font-black">0 MMK</h2>
            </div>
            <div class="glass-card p-8 rounded-[40px]">
                <p class="text-[10px] font-black uppercase text-emerald-500/50 mb-2 tracking-widest">Total Income</p>
                <h2 id="totalIncome" class="text-2xl font-black text-emerald-400">0 MMK</h2>
            </div>
            <div class="glass-card p-8 rounded-[40px]">
                <p class="text-[10px] font-black uppercase text-blue-500/50 mb-2 tracking-widest">Est. Net Profit</p>
                <h2 id="totalProfit" class="text-2xl font-black text-blue-400">0 MMK</h2>
            </div>
        </div>

        <div class="glass-card p-8 rounded-[40px] mb-12 border border-white/5">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" id="itemName" placeholder="Item Name" class="bg-black p-4 rounded-2xl outline-none border border-white/5 text-sm">
                <input type="number" id="itemPrice" placeholder="Cost (THB)" class="bg-black p-4 rounded-2xl outline-none border border-white/5 text-sm">
                <select id="itemCat" class="bg-black p-4 rounded-2xl border border-white/5 text-xs uppercase font-bold text-slate-400">
                    <option value="Clothing">Clothing</option>
                    <option value="Accessories">Accessories</option>
                    <option value="General">General</option>
                </select>
                <button id="upload_widget" class="bg-black border border-dashed border-white/20 rounded-2xl text-[10px] font-bold text-slate-500 uppercase">📸 Photo</button>
                <button onclick="addItem()" class="bg-emerald-500 text-black font-black py-4 rounded-2xl uppercase text-[10px] hover:bg-emerald-400">Add Item</button>
                <input type="hidden" id="itemImg">
            </div>
        </div>

        <h2 class="text-lg font-black italic uppercase mb-6">Recent Orders</h2>
        <div class="overflow-hidden rounded-[40px] border border-white/5 mb-12 bg-slate-900/50">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-[10px] font-black uppercase text-slate-500">
                    <tr><th class="p-6">User</th><th class="p-6">Total</th><th class="p-6">Proof</th><th class="p-6">Status</th></tr>
                </thead>
                <tbody id="order-list"></tbody>
            </table>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 class="text-lg font-black italic uppercase">Inventory Management</h2>
            <div class="flex bg-slate-900 p-1 rounded-2xl border border-white/5">
                <button onclick="filterInventory('All')" class="filter-btn active-filter px-4 py-2 rounded-xl text-[10px] font-black uppercase">All</button>
                <button onclick="filterInventory('Instock')" class="filter-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase text-slate-500">Instock</button>
                <button onclick="filterInventory('Soldout')" class="filter-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase text-slate-500">Sold</button>
            </div>
        </div>

        <div class="overflow-hidden rounded-[40px] border border-white/5 mb-20 bg-slate-900/50">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-[10px] font-black uppercase text-slate-500">
                    <tr><th class="p-6">Product</th><th class="p-6">Status</th><th class="p-6">Retail Price</th><th class="p-6">Action</th></tr>
                </thead>
                <tbody id="inventory-list"></tbody>
            </table>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        // --- CONSTANTS ---
        const THB_RATE = 105; 
        const PROFIT_MARGIN = 1.1; // 10% Profit
        let items = []; 
        let currentFilter = 'All';

        function unlock() {
            if(document.getElementById('adminPass').value === 'never2026') { 
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('adminContent').classList.remove('hidden');
                loadAdmin();
            } else { alert("Wrong Password!"); }
        }

        async function loadAdmin() {
            const [iRes, oRes] = await Promise.all([fetch('/items'), fetch('/all-orders')]);
            items = await iRes.json();
            const orders = await oRes.json();
            updateStats(orders); // Pass orders to stats
            renderOrders(orders);
            renderInventory();
        }

        function updateStats(orders) {
            let usage = 0;
            let income = 0;
            
            // Total Retail value of all instock items
            items.forEach(i => {
                if(i.grade === 'Instock') usage += i.price;
            });

            // Total actual money made from orders
            orders.forEach(o => {
                if(o.status !== 'Pending Verification') income += o.totalMMK;
            });

            // Profit estimate (since i.price already includes profit, we back-calculate)
            let estimatedProfit = income - (income / PROFIT_MARGIN);

            document.getElementById('totalUsage').innerText = Math.round(usage).toLocaleString() + " MMK";
            document.getElementById('totalIncome').innerText = Math.round(income).toLocaleString() + " MMK";
            document.getElementById('totalProfit').innerText = Math.round(estimatedProfit).toLocaleString() + " MMK";
        }

        function filterInventory(status) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active-filter');
                if(btn.innerText === status || (status === 'All' && btn.innerText === 'ALL')) {
                    btn.classList.add('active-filter');
                }
            });
            renderInventory();
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            const filtered = items.filter(i => currentFilter === 'All' || i.grade === currentFilter);
            
            list.innerHTML = filtered.reverse().map(i => `
                <tr class="border-t border-white/5">
                    <td class="p-6 flex items-center gap-4">
                        <img src="${i.productImage}" class="w-10 h-10 rounded-lg object-cover">
                        <div>
                            <b class="text-sm">${i.name}</b><br>
                            <span class="text-[8px] opacity-50 uppercase tracking-widest">${i.category}</span>
                        </div>
                    </td>
                    <td class="p-6">
                        <select onchange="updateGrade('${i._id}', this.value)" class="bg-black p-2 rounded-lg text-[10px] border border-white/10 uppercase font-bold">
                            <option value="Instock" ${i.grade==='Instock'?'selected':''}>Instock</option>
                            <option value="Soldout" ${i.grade==='Soldout'?'selected':''}>Sold Out</option>
                            <option value="Pending" ${i.grade==='Pending'?'selected':''}>Preorder Request</option>
                        </select>
                    </td>
                    <td class="p-6 text-emerald-400 font-bold">${i.price.toLocaleString()} MMK</td>
                    <td class="p-6"><button onclick="deleteItem('${i._id}')" class="text-red-500 hover:text-white transition-colors">✕</button></td>
                </tr>`).join('');
        }

        function renderOrders(orders) {
            document.getElementById('order-list').innerHTML = orders.map(o => `
                <tr class="border-t border-white/5 text-sm">
                    <td class="p-6 font-bold uppercase text-[10px]">${o.username}<br><small class="text-slate-500">${o.phone}</small></td>
                    <td class="p-6 font-black text-emerald-400">${o.totalMMK.toLocaleString()} MMK</td>
                    <td class="p-6"><a href="${o.paymentScreenshot}" target="_blank" class="text-blue-400 underline uppercase text-[8px] font-black tracking-widest">View Screenshot</a></td>
                    <td class="p-6">
                        <select onchange="updateOrder('${o._id}', this.value)" class="bg-black p-2 rounded-lg text-[10px] border border-white/10 uppercase font-black">
                            <option value="Pending Verification" ${o.status==='Pending Verification'?'selected':''}>Pending</option>
                            <option value="Paid & Verified" ${o.status==='Paid & Verified'?'selected':''}>Verified</option>
                            <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                            <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                        </select>
                    </td>
                </tr>`).join('');
        }

        async function updateGrade(id, g) { 
            await fetch(`/update-item/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({grade: g})}); 
            loadAdmin(); 
        }

        async function updateOrder(id, s) { 
            await fetch(`/update-order/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status: s})}); 
            alert("Order Status Updated");
            loadAdmin();
        }

        async function deleteItem(id) { 
            if(confirm('Are you sure you want to delete this item from the vault?')){ 
                await fetch(`/delete-item/${id}`, { method: 'DELETE'}); 
                loadAdmin(); 
            }
        }
        
        var myWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (e, r) => { 
            if (r.event === "success") { 
                document.getElementById('itemImg').value = r.info.secure_url; 
                document.getElementById('upload_widget').innerText = "✅ PHOTO READY"; 
                document.getElementById('upload_widget').classList.add('text-emerald-400');
            }
        });
        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open());

        async function addItem() {
            const costTHB = document.getElementById('itemPrice').value;
            const name = document.getElementById('itemName').value;
            const category = document.getElementById('itemCat').value;
            const productImage = document.getElementById('itemImg').value;

            if(!costTHB || !name || !productImage) return alert("Please fill all fields and upload a photo.");

            // Math: (Cost in THB * Rate) + 10% Profit
            const finalPriceMMK = Math.ceil((costTHB * THB_RATE) * PROFIT_MARGIN);

            const res = await fetch('/add-item', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    name, 
                    price: finalPriceMMK, 
                    category, 
                    productImage,
                    grade: 'Instock'
                })
            });

            if (res.ok) {
                alert(`Item Added! Retail Price: ${finalPriceMMK.toLocaleString()} MMK`);
                location.reload();
            }
        }
    </script>
</body>
</html>
