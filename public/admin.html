<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeverEver Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-200 p-6">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-2xl font-black italic text-emerald-500 mb-8 uppercase tracking-widest">Order Manager</h1>

        <div class="mb-8 space-y-4">
            <input type="text" id="searchInput" onkeyup="renderOrders()" placeholder="🔍 Search items or customers..." 
                class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-emerald-500">
            
            <div class="flex gap-2 overflow-x-auto pb-2">
                <button onclick="setFilter('all')" class="px-4 py-2 bg-emerald-600 text-black text-[10px] font-bold rounded-lg uppercase">All</button>
                <button onclick="setFilter('Pending')" class="px-4 py-2 bg-slate-800 text-[10px] font-bold rounded-lg uppercase">Pending</button>
                <button onclick="setFilter('Preorder')" class="px-4 py-2 bg-slate-800 text-[10px] font-bold rounded-lg uppercase">Preorder</button>
                <button onclick="setFilter('Instock')" class="px-4 py-2 bg-slate-800 text-[10px] font-bold rounded-lg uppercase">Instock</button>
            </div>
        </div>

        <div id="orderContainer" class="grid gap-4"></div>
    </div>

    <script>
        let allItems = [];
        let currentFilter = 'all';
        const RATE = 130;

        async function load() {
            const res = await fetch('/items');
            allItems = await res.json();
            renderOrders();
        }

        function setFilter(f) { currentFilter = f; renderOrders(); }

        function renderOrders() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('orderContainer');
            
            const filtered = allItems.filter(i => {
                const match = i.name.toLowerCase().includes(query) || (i.customerPhone && i.customerPhone.toLowerCase().includes(query));
                return match && (currentFilter === 'all' || i.grade === currentFilter);
            });

            container.innerHTML = filtered.reverse().map(i => `
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <img src="${i.productImage}" class="w-16 h-20 object-cover rounded-xl border border-slate-700">
                        <div>
                            <h3 class="font-bold text-white text-sm uppercase">${i.name}</h3>
                            <p class="text-[10px] text-slate-500">${i.customerPhone || 'Unknown'}</p>
                            <p class="text-[10px] text-emerald-400 font-mono mt-1">Price: ${(i.price * 1.25 * RATE).toLocaleString()} MMK</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editItem('${i._id}')" class="bg-white text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase">Edit</button>
                        <button onclick="deleteItem('${i._id}')" class="text-slate-500 hover:text-red-500 text-[10px]">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function editItem(id) {
            const p = prompt("Enter Base Price:");
            const g = prompt("Enter Status (Pending, Preorder, Instock, Soldout):");
            if (p && g) {
                await fetch('/update-item/'+id, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ price: Number(p), grade: g })
                });
                load();
            }
        }

        async function deleteItem(id) { if(confirm("Delete?")) { await fetch('/delete-item/'+id, {method:'DELETE'}); load(); } }
        load();
    </script>
</body>
</html>
