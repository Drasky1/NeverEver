<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #000; color: white; }</style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-black italic text-emerald-400 mb-10">DASHBOARD</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-slate-900 p-8 rounded-[40px] border border-white/5">
                <p class="text-[10px] font-black uppercase text-slate-500 mb-2">Total Capital (Usage)</p>
                <h2 id="totalUsage" class="text-2xl font-black">0 MMK</h2>
            </div>
            <div class="bg-slate-900 p-8 rounded-[40px] border border-white/5">
                <p class="text-[10px] font-black uppercase text-emerald-500/50 mb-2">Real Income (Sold)</p>
                <h2 id="totalIncome" class="text-2xl font-black text-emerald-400">0 MMK</h2>
            </div>
            <div class="bg-slate-900 p-8 rounded-[40px] border border-white/5 border-blue-500/20">
                <p class="text-[10px] font-black uppercase text-blue-500/50 mb-2">Net Profit (Sold)</p>
                <h2 id="totalProfit" class="text-2xl font-black text-blue-400">0 MMK</h2>
            </div>
        </div>

        <div class="bg-slate-900 p-8 rounded-[40px] mb-12 border border-white/5">
            <h2 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-6">Inventory Entry</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="itemName" placeholder="Item Name" class="bg-black p-4 rounded-2xl outline-none border border-white/5">
                <input type="number" id="itemPrice" placeholder="Cost Price (CNY)" class="bg-black p-4 rounded-2xl outline-none border border-white/5">
                <button id="upload_widget" class="bg-black border border-dashed border-white/20 rounded-2xl text-[10px] font-bold text-slate-500">📸 PHOTO</button>
                <button onclick="addItem()" class="bg-emerald-500 text-black font-black py-4 rounded-2xl uppercase text-[10px]">Add to Stock</button>
                <input type="hidden" id="itemImg">
            </div>
        </div>

        <div class="overflow-hidden rounded-[40px] border border-white/5">
            <table class="w-full text-left bg-slate-900/50">
                <thead class="bg-slate-900 text-[10px] font-black uppercase text-slate-500">
                    <tr>
                        <th class="p-6">Product</th>
                        <th class="p-6">Status</th>
                        <th class="p-6">Cost (MMK)</th>
                        <th class="p-6">Selling (MMK)</th>
                        <th class="p-6">Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-list" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        const RATE = 130;
        let items = [];

        var myWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (error, result) => { 
            if (!error && result.event === "success") { 
                document.getElementById('itemImg').value = result.info.secure_url;
                document.getElementById('upload_widget').innerText = "✅ UPLOADED";
            }
        });
        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open());

        async function loadAdmin() {
            const res = await fetch('/items');
            items = await res.json();
            updateStats();
            render();
        }

        function updateStats() {
            let totalUsage = 0;
            let actualIncome = 0;
            let actualProfit = 0;

            items.forEach(i => {
                const cost = Number(i.price) * RATE;
                const sell = cost * 1.25;
                
                totalUsage += cost; // Always calculate usage for everything

                if (i.grade === 'Soldout') {
                    actualIncome += sell;
                    actualProfit += (sell - cost);
                }
            });

            document.getElementById('totalUsage').innerText = Math.round(totalUsage).toLocaleString() + " MMK";
            document.getElementById('totalIncome').innerText = Math.round(actualIncome).toLocaleString() + " MMK";
            document.getElementById('totalProfit').innerText = Math.round(actualProfit).toLocaleString() + " MMK";
        }

        function render() {
            const list = document.getElementById('admin-list');
            list.innerHTML = items.reverse().map(i => `
                <tr class="hover:bg-white/5 transition-colors">
                    <td class="p-6 flex items-center gap-4">
                        <img src="${i.productImage}" class="w-12 h-12 rounded-xl object-cover">
                        <div>
                            <p class="font-bold text-sm">${i.name}</p>
                            <p class="text-[10px] text-slate-500 uppercase">${i.customerPhone}</p>
                        </div>
                    </td>
                    <td class="p-6">
                        <select onchange="updateGrade('${i._id}', this.value)" class="bg-black text-[10px] font-bold p-2 rounded-lg outline-none border border-white/10 uppercase">
                            <option value="Instock" ${i.grade === 'Instock' ? 'selected' : ''}>Instock</option>
                            <option value="Preorder" ${i.grade === 'Preorder' ? 'selected' : ''}>Preorder</option>
                            <option value="Soldout" ${i.grade === 'Soldout' ? 'selected' : ''}>Soldout</option>
                            <option value="Pending" ${i.grade === 'Pending' ? 'selected' : ''}>Pending</option>
                        </select>
                    </td>
                    <td class="p-6 font-mono text-sm">${Math.round(i.price * RATE).toLocaleString()}</td>
                    <td class="p-6 font-mono text-sm text-emerald-400">${Math.round(i.price * 1.25 * RATE).toLocaleString()}</td>
                    <td class="p-6">
                        <button onclick="deleteItem('${i._id}')" class="text-red-500 font-bold text-[10px] uppercase">Remove</button>
                    </td>
                </tr>
            `).join('');
        }

        async function addItem() {
            const newItem = {
                name: document.getElementById('itemName').value,
                price: document.getElementById('itemPrice').value,
                productImage: document.getElementById('itemImg').value,
                grade: 'Instock'
            };
            await fetch('/add-item', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(newItem)});
            location.reload();
        }

        async function updateGrade(id, g) {
            await fetch(`/update-item/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({grade: g})});
            loadAdmin();
        }

        async function deleteItem(id) {
            if(confirm('Delete this item?')) {
                await fetch(`/delete-item/${id}`, { method: 'DELETE' });
                loadAdmin();
            }
        }

        loadAdmin();
    </script>
</body>
</html>
