<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | NeverEver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input, select, textarea { background: #fff; border: 1px solid #ddd; padding: 15px; font-size: 11px; font-weight: bold; outline: none; width: 100%; text-transform: uppercase; }
        .btn-black { background: #000; color: #fff; font-weight: 900; text-transform: uppercase; font-size: 10px; padding: 20px; letter-spacing: 0.2em; }
    </style>
</head>
<body class="bg-[#f2f2f2] p-6 md:p-20 font-sans">

    <div class="max-w-4xl mx-auto space-y-10">
        <h1 class="text-[10px] font-black uppercase tracking-[0.5em] text-center mb-20">NeverEver Admin</h1>

        <section class="bg-white p-10 space-y-6 shadow-sm">
            <h2 class="text-[10px] font-black uppercase border-b pb-4">New Product Deployment</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="itemName" placeholder="Name">
                <input type="number" id="itemCost" placeholder="Cost (THB)">
            </div>
            <textarea id="itemDesc" placeholder="Product Description" class="h-32"></textarea>
            <div class="grid grid-cols-2 gap-4">
                <select id="itemGrade"><option value="Instock">Instock</option><option value="Pre-order">Pre-order</option></select>
                <input type="text" id="itemSizes" placeholder="Sizes (e.g. S, M, L, XL)">
            </div>
            <div id="imgStatus" class="text-[9px] font-black uppercase text-slate-400">Photos: 0 / 5</div>
            <button id="uploadBtn" class="w-full border-2 border-dashed p-10 text-[10px] font-black uppercase opacity-50">📸 Upload Editorial Photos</button>
            <button onclick="deployItem()" class="btn-black w-full">Deploy to Mainframe</button>
        </section>

        <section class="bg-white p-10 shadow-sm">
            <h2 class="text-[10px] font-black uppercase border-b pb-4 mb-6">Inventory List</h2>
            <div id="inv-list" class="space-y-4"></div>
        </section>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        let photos = [];
        var widget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd', maxFiles: 5 }, (e, r) => {
            if(r.event==="success") { photos.push(r.info.secure_url); document.getElementById('imgStatus').innerText = `Photos: ${photos.length} / 5`; }
        });
        document.getElementById('uploadBtn').onclick = () => widget.open();

        async function deployItem() {
            const data = {
                name: document.getElementById('itemName').value,
                costTHB: document.getElementById('itemCost').value,
                description: document.getElementById('itemDesc').value,
                grade: document.getElementById('itemGrade').value,
                sizes: document.getElementById('itemSizes').value.split(',').map(s=>s.trim()),
                images: photos
            };
            const res = await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            if(res.ok) location.reload();
        }

        async function loadInv() {
            const res = await fetch('/items');
            const items = await res.json();
            document.getElementById('inv-list').innerHTML = items.reverse().map(i => `
                <div class="flex justify-between items-center py-4 border-b">
                    <div class="flex items-center gap-4"><img src="${i.images[0]}" class="w-10 h-10 object-cover">${i.name}</div>
                    <button onclick="deleteItem('${i._id}')" class="text-[10px] font-black uppercase opacity-30 hover:opacity-100">Delete</button>
                </div>`).join('');
        }
        async function deleteItem(id) { if(confirm('Delete?')) { await fetch(`/delete-item/${id}`, {method:'DELETE'}); loadInv(); }}
        loadInv();
    </script>
</body>
</html>
