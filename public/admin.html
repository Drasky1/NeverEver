<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>ADMIN | NEVEREVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fff; color: #000; font-family: Helvetica, sans-serif; text-transform: uppercase; }
        input, select { border: 1px solid #000; padding: 10px; font-size: 10px; width: 100%; margin-bottom: 5px; }
        .card { background: #fff; padding: 20px; border: 1px solid #000; margin-bottom: 20px; }
    </style>
</head>
<body class="p-10">
    <div class="grid grid-cols-2 gap-10">
        <div>
            <div class="card">
                <h2 class="font-black text-[10px] mb-4">Add Item</h2>
                <input type="text" id="itemName" placeholder="Name">
                <input type="number" id="itemCost" placeholder="Cost (THB)">
                <input type="text" id="itemSizes" placeholder="Sizes (e.g. S,M,L)">
                <button id="uploadBtn" class="w-full border p-2 text-[10px] mb-2">Upload Images</button>
                <button onclick="saveItem()" class="w-full bg-black text-white p-3 text-[10px]">Save Item</button>
            </div>
            
            <div class="card">
                <h2 class="font-black text-[10px] mb-4">Inventory</h2>
                <div id="inv-list" class="space-y-2"></div>
            </div>
        </div>

        <div>
            <h2 class="font-black text-[10px] mb-4">Orders</h2>
            <div id="order-list" class="space-y-4"></div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        let photos = [];
        var widget = cloudinary.createUploadWidget({ cloudName:'dawhhgjsd', uploadPreset:'dawhhgjsd' }, (e,r) => { if(r.event==="success") photos.push(r.info.secure_url); });
        document.getElementById('uploadBtn').onclick = () => widget.open();

        async function saveItem() {
            const data = { 
                name: document.getElementById('itemName').value, 
                costTHB: document.getElementById('itemCost').value, 
                availableSizes: [document.getElementById('itemSizes').value],
                images: photos 
            };
            await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            location.reload();
        }

        async function toggleSoldOut(id, currentStatus) {
            await fetch(`/update-item/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({isSoldOut: !currentStatus})});
            load();
        }

        async function load() {
            const items = await (await fetch('/items')).json();
            const orders = await (await fetch('/orders')).json();
            
            // Render Inventory
            document.getElementById('inv-list').innerHTML = items.map(i => `
                <div class="flex justify-between border p-2 text-[9px] items-center">
                    <span>${i.name}</span>
                    <button onclick="toggleSoldOut('${i._id}', ${i.isSoldOut})" class="underline">
                        ${i.isSoldOut ? 'Restock' : 'Mark Sold Out'}
                    </button>
                </div>`).join('');

            // Render Orders (Fixed "undefined")
            document.getElementById('order-list').innerHTML = orders.map(o => `
                <div class="border border-black p-4 bg-white">
                    <div class="flex justify-between text-[10px] font-black">
                        <span>${o.username || 'GUEST'}</span>
                        <a href="${o.paymentScreenshot}" target="_blank" class="underline">Receipt</a>
                    </div>
                    <p class="text-[9px] mt-2">${o.items.map(i => i.name).join(', ')}</p>
                    <input type="text" id="est-${o._id}" value="${o.estArrival || ''}" placeholder="Arrival update..." class="mt-2">
                    <button onclick="updateOrder('${o._id}')" class="bg-black text-white w-full p-2 mt-2 text-[10px]">Update</button>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>
