<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { background: #f4f4f4; font-family: Helvetica; text-transform: uppercase; }
        .stat-card { background: #fff; border: 1px solid #000; padding: 25px; }
        input, select { border: 1px solid #000; padding: 12px; font-size: 10px; font-weight: 900; width: 100%; margin-bottom: 10px; }
        .btn-black { background: #000; color: #fff; padding: 15px; font-size: 10px; font-weight: 900; width: 100%; cursor: pointer; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="stat-card">
            <h2 class="font-black mb-4">ADD PRODUCT</h2>
            <input type="text" id="itemName" placeholder="ITEM NAME">
            <input type="number" id="itemCost" placeholder="COST (THB)">
            <input type="number" id="itemStock" placeholder="STOCK">
            <input type="text" id="itemSizes" placeholder="SIZES (S,M,L)">
            <select id="itemCat"><option>Instock</option><option>Preorder</option></select>
            <button id="uploadBtn" class="btn-black mb-2 bg-blue-600">UPLOAD PHOTOS</button>
            <button onclick="saveItem()" class="btn-black">SAVE</button>
        </div>
        <div id="ordersCont" class="space-y-4"></div>
    </div>
    <script>
        let photos = [];
        const widget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (e, r) => { 
            if (r.event === "success") photos.push(r.info.secure_url); 
        });
        document.getElementById('uploadBtn').onclick = () => widget.open();
        async function saveItem() {
            const data = { 
                name: document.getElementById('itemName').value, 
                costTHB: document.getElementById('itemCost').value,
                stock: document.getElementById('itemStock').value,
                availableSizes: document.getElementById('itemSizes').value.split(','),
                category: document.getElementById('itemCat').value, 
                images: photos 
            };
            await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            location.reload();
        }
    </script>
</body>
</html>
