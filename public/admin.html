<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>ADMIN | NEVEREVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f9f9f9; font-family: Helvetica, sans-serif; text-transform: uppercase; }
        input, select, textarea { border: 1px solid #ddd; padding: 12px; font-size: 10px; font-weight: 900; width: 100%; outline: none; margin-bottom: 8px; }
        .card { background: #fff; padding: 30px; border: 1px solid #eee; margin-bottom: 20px; }
        .btn-black { background: #000; color: #fff; padding: 15px; font-size: 10px; font-weight: 900; width: 100%; }
    </style>
</head>
<body class="p-6 md:p-20">
    <div id="authOverlay" class="fixed inset-0 bg-white z-[100] flex items-center justify-center">
        <div class="max-w-xs w-full p-10"><input type="password" id="adminPass" placeholder="PASSWORD"><button onclick="checkPass()" class="btn-black">Login</button></div>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="card">
                <p class="text-[9px] opacity-50">Total Revenue</p>
                <h1 id="revTotal" class="text-2xl font-black italic">0 MMK</h1>
            </div>
            <div class="card">
                <p class="text-[9px] opacity-50">Estimated Profit</p>
                <h1 id="profitTotal" class="text-2xl font-black italic text-green-600">0 MMK</h1>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="card">
                <h2 class="text-[10px] font-black mb-6">Product Entry</h2>
                <input type="text" id="itemName" placeholder="Name">
                <input type="number" id="itemCost" placeholder="Cost THB">
                <textarea id="itemDesc" placeholder="Description"></textarea>
                <input type="text" id="itemSizes" placeholder="Sizes (S, M, L)">
                <button id="uploadBtn" class="border-2 border-dashed p-10 text-[9px] w-full mb-4">📸 Upload Photos</button>
                <button onclick="saveItem()" class="btn-black">Deploy</button>
            </div>

            <div class="card">
                <h2 class="text-[10px] font-black mb-6">Customer Orders</h2>
                <div id="order-list" class="space-y-4"></div>
            </div>
        </div>

        <div class="card">
            <h2 class="text-[10px] font-black mb-6">Inventory</h2>
            <input type="text" id="invSearch" placeholder="Search..." oninput="load()" class="mb-6">
            <div id="inv-list" class="divide-y"></div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        function checkPass() { if(document.getElementById('adminPass').value === 'never2026') document.getElementById('authOverlay').remove(); }
        let photos = [];
        var widget = cloudinary.createUploadWidget({ cloudName:'dawhhgjsd', uploadPreset:'dawhhgjsd' }, (e,r) => { if(r.event==="success") photos.push(r.info.secure_url); });
        document.getElementById('uploadBtn').onclick = () => widget.open();

        async function saveItem() {
            const data = { name: document.getElementById('itemName').value, costTHB: document.getElementById('itemCost').value, description: document.getElementById('itemDesc').value, sizes: document.getElementById('itemSizes').value.split(','), images: photos };
            await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            location.reload();
        }

        async function updateStatus(id) {
            const status = document.getElementById(`status-${id}`).value;
            const est = document.getElementById(`est-${id}`).value;
            await fetch(`/update-order/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status, estArrival: est})});
            alert("Updated");
        }

        async function load() {
            const items = await (await fetch('/items')).json();
            const orders = await (await fetch('/orders')).json();
            
            let rev = 0; orders.forEach(o => rev += o.totalMMK);
            document.getElementById('revTotal').innerText = `${rev.toLocaleString()} MMK`;

            document.getElementById('order-list').innerHTML = orders.map(o => `
                <div class="border p-4 space-y-2">
                    <div class="flex justify-between font-black text-[9px]"><span>${o.username}</span><a href="${o.paymentScreenshot}" target="_blank" class="text-blue-500">View Receipt</a></div>
                    <select id="status-${o._id}" class="!m-0"><option ${o.status=='Pending'?'selected':''}>Pending</option><option ${o.status=='Shipped'?'selected':''}>Shipped</option><option ${o.status=='Delivered'?'selected':''}>Delivered</option></select>
                    <input type="text" id="est-${o._id}" value="${o.estArrival}" placeholder="Est Arrival (e.g. 3 Days)" class="!m-0">
                    <button onclick="updateStatus('${o._id}')" class="btn-black !p-2">Update</button>
                </div>`).join('');

            const q = document.getElementById('invSearch').value.toLowerCase();
            document.getElementById('inv-list').innerHTML = items.filter(i=>i.name.toLowerCase().includes(q)).map(i => `<div class="flex justify-between py-2 text-[10px]"><span>${i.name}</span><button onclick="del('${i._id}')" class="text-red-500">Delete</button></div>`).join('');
        }
        load();
    </script>
</body>
</html>
