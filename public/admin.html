<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>NEVEREVER | ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fff; color: #000; font-family: Helvetica, sans-serif; text-transform: uppercase; }
        input, select, textarea { border: 1px solid #000; padding: 12px; font-size: 10px; font-weight: 900; width: 100%; outline: none; margin-bottom: 8px; background: transparent; }
        .card { background: #fff; padding: 25px; border: 1px solid #000; }
        .btn-black { background: #000; color: #fff; padding: 15px; font-size: 10px; font-weight: 900; width: 100%; border: 1px solid #000; transition: 0.2s;}
        .btn-black:hover { background: #fff; color: #000; }
        .order-scroll { max-height: 500px; overflow-y: auto; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body class="p-6 md:p-20">
    <div id="authOverlay" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-10">
        <div class="max-w-xs w-full"><input type="password" id="adminPass" placeholder="ADMIN PASS" class="text-center"><button onclick="checkPass()" class="btn-black">ACCESS</button></div>
    </div>

    <div class="max-w-6xl mx-auto space-y-8">
        <h1 class="text-2xl font-black italic tracking-widest text-center mb-10">NEVEREVER SYSTEM</h1>
        <div class="grid grid-cols-2 gap-4">
            <div class="card text-center"><p class="text-[9px] opacity-40 mb-2">REVENUE</p><h1 id="revTotal" class="text-xl font-black italic">0 MMK</h1></div>
            <div class="card text-center"><p class="text-[9px] opacity-40 mb-2">ACTIVE ORDERS</p><h1 id="orderCount" class="text-xl font-black italic">0</h1></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="card">
                <h2 class="text-[10px] font-black mb-6">DEPLOY PRODUCT</h2>
                <input type="text" id="itemName" placeholder="NAME">
                <input type="number" id="itemCost" placeholder="COST (THB)">
                <select id="itemCat"><option value="Instock">INSTOCK</option><option value="Preorder">PREORDER</option></select>
                <textarea id="itemDesc" placeholder="DESCRIPTION" rows="3"></textarea>
                <input type="text" id="itemSizes" placeholder="SIZES (e.g. S, M, L, XL)">
                <button id="uploadBtn" class="border border-black p-10 text-[9px] font-black w-full mb-4 opacity-50 hover:opacity-100 transition-opacity">📸 ATTACH IMAGES</button>
                <button onclick="saveItem()" class="btn-black">DEPLOY</button>
            </div>
            <div class="card">
                <h2 class="text-[10px] font-black mb-6">ORDER STREAM</h2>
                <div id="order-list" class="order-scroll space-y-4"></div>
            </div>
        </div>

        <div class="card">
            <h2 class="text-[10px] font-black mb-6">INVENTORY</h2>
            <input type="text" id="invSearch" placeholder="SEARCH PRODUCTS..." oninput="load()" class="mb-6">
            <div id="inv-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        function checkPass() { if(document.getElementById('adminPass').value === 'never2026') document.getElementById('authOverlay').remove(); }
        let photos = [];
        var widget = cloudinary.createUploadWidget({ cloudName:'dawhhgjsd', uploadPreset:'dawhhgjsd' }, (e,r) => { if(r.event==="success") { photos.push(r.info.secure_url); document.getElementById('uploadBtn').innerText = `✅ ${photos.length} IMAGES ATTACHED`; }});
        document.getElementById('uploadBtn').onclick = () => widget.open();

        async function saveItem() {
            const data = { name: document.getElementById('itemName').value, costTHB: document.getElementById('itemCost').value, category: document.getElementById('itemCat').value, description: document.getElementById('itemDesc').value, availableSizes: document.getElementById('itemSizes').value.split(',').map(s=>s.trim()), images: photos };
            await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            location.reload();
        }

        async function updateOrder(id) {
            const status = document.getElementById(`status-${id}`).value;
            const estArrival = document.getElementById(`est-${id}`).value;
            await fetch(`/update-order/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status, estArrival})});
            alert("ORDER UPDATED");
            load();
        }

        async function delOrder(id) { if(confirm('TERMINATE ORDER?')) { await fetch(`/delete-order/${id}`, {method:'DELETE'}); load(); } }
        async function delItem(id) { if(confirm('TERMINATE PRODUCT?')) { await fetch(`/delete-item/${id}`, {method:'DELETE'}); load(); } }

        async function load() {
            const items = await (await fetch('/items')).json();
            const orders = await (await fetch('/orders')).json();
            let rev = 0; orders.forEach(o => rev += o.totalMMK);
            document.getElementById('revTotal').innerText = `${rev.toLocaleString()} MMK`;
            document.getElementById('orderCount').innerText = orders.length;

            document.getElementById('order-list').innerHTML = orders.map(o => `
                <div class="border border-black p-4 space-y-3">
                    <div class="flex justify-between text-[8px] font-black">
                        <span>${o.username} <br> ${o.phone || 'NO PHONE'} <br> ${o.totalMMK.toLocaleString()} MMK</span>
                        <div class="flex flex-col items-end gap-1">
                            <a href="${o.paymentScreenshot}" target="_blank" class="underline">RECEIPT</a>
                            <button onclick="delOrder('${o._id}')" class="underline opacity-50 hover:opacity-100">TERMINATE</button>
                        </div>
                    </div>
                    <div class="text-[8px] font-bold opacity-60 mb-2">${o.items.map(i => `${i.name} (${i.size}) x${i.qty}`).join('<br>')}</div>
                    <select id="status-${o._id}" class="!mb-0"><option ${o.status=='Pending'?'selected':''}>PENDING</option><option ${o.status=='Shipped'?'selected':''}>SHIPPED</option><option ${o.status=='Delivered'?'selected':''}>DELIVERED</option></select>
                    <input type="text" id="est-${o._id}" value="${o.estArrival || ''}" placeholder="ARRIVAL (e.g., 3 DAYS)" class="!mb-0 border-t-0">
                    <button onclick="updateOrder('${o._id}')" class="btn-black !p-2 !text-[8px]">UPDATE</button>
                </div>`).join('');

            const q = document.getElementById('invSearch').value.toLowerCase();
            document.getElementById('inv-list').innerHTML = items.filter(i=>i.name.toLowerCase().includes(q)).map(i => `
                <div class="flex justify-between p-4 border border-black items-center">
                    <span class="text-[9px] font-black">${i.name} [${i.category}]</span>
                    <button onclick="delItem('${i._id}')" class="text-[8px] underline opacity-50 hover:opacity-100 font-black">TERMINATE</button>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>
