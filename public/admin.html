<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>ADMIN DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f4f4f4; font-family: Helvetica; text-transform: uppercase; }
        .stat-card { background: #fff; border: 1px solid #000; padding: 25px; }
        input, select { border: 1px solid #000; padding: 12px; font-size: 10px; font-weight: 900; width: 100%; margin-bottom: 10px; }
        .btn-black { background: #000; color: #fff; padding: 15px; font-size: 10px; font-weight: 900; width: 100%; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-7xl mx-auto space-y-8">
        <div class="grid grid-cols-3 gap-6">
            <div class="stat-card">
                <p class="text-[8px] font-black opacity-30">REVENUE</p>
                <h1 id="revTotal" class="text-2xl font-black italic">0 MMK</h1>
            </div>
            <div class="stat-card">
                <p class="text-[8px] font-black text-emerald-600">PROFIT</p>
                <h1 id="profitTotal" class="text-2xl font-black italic text-emerald-600">0 MMK</h1>
            </div>
            <div class="stat-card">
                <p class="text-[8px] font-black text-blue-600">ACTIVE ORDERS</p>
                <h1 id="activeCount" class="text-2xl font-black italic text-blue-600">0</h1>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="stat-card">
                <h2 class="text-[10px] font-black mb-4 italic">ADD PRODUCT</h2>
                <input type="text" id="itemName" placeholder="NAME">
                <input type="number" id="itemCost" placeholder="COST (THB)">
                <input type="number" id="itemStock" placeholder="QUANTITY (STOCK)">
                <input type="text" id="itemSizes" placeholder="SIZES (S, M, L)">
                <select id="itemCat"><option value="Instock">INSTOCK</option><option value="Preorder">PREORDER</option></select>
                <button id="uploadBtn" class="border border-black p-4 text-[9px] font-black w-full mb-2">📸 PHOTOS</button>
                <button onclick="saveItem()" class="btn-black">DEPLOY</button>
            </div>

            <div class="stat-card">
                <h2 class="text-[10px] font-black mb-4 italic">INVENTORY</h2>
                <div id="invList" class="space-y-2 max-h-96 overflow-y-auto"></div>
            </div>
        </div>
        
        <div class="stat-card">
            <h2 class="text-[10px] font-black mb-6 italic">ORDER STREAM</h2>
            <div id="orderList" class="space-y-4"></div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        let photos = [], items = [], orders = [];

        async function load() {
            const resI = await fetch('/items'); items = await resI.json();
            const resO = await fetch('/orders'); orders = await resO.json();
            renderStats(); renderInv(); renderOrders();
        }

        function renderStats() {
            let rev = 0, prof = 0, active = 0;
            orders.forEach(o => {
                rev += Number(o.totalMMK);
                if(o.status !== 'Delivered') active++;
                if(o.status === 'Delivered') {
                    o.items.forEach(oi => {
                        const inv = items.find(i => i.name === oi.name);
                        if(inv) prof += (Number(oi.price) - (Number(inv.costTHB)*125));
                    });
                }
            });
            document.getElementById('revTotal').innerText = rev.toLocaleString() + ' MMK';
            document.getElementById('profitTotal').innerText = prof.toLocaleString() + ' MMK';
            document.getElementById('activeCount').innerText = active;
        }

        function renderInv() {
            document.getElementById('invList').innerHTML = items.map(i => `
                <div class="flex justify-between items-center border border-black p-4 bg-white">
                    <div class="flex items-center gap-4">
                        <img src="${i.images[0]}" class="w-12 h-12 object-contain border border-black">
                        <div>
                            <p class="text-[9px] font-black">${i.name}</p>
                            <p class="text-[8px] opacity-50">STOCK: ${i.stock}</p>
                        </div>
                    </div>
                    <button onclick="toggleSoldOut('${i._id}', ${i.isSoldOut})" class="text-[8px] underline font-black">${i.isSoldOut ? 'RESTOCK' : 'SOLD OUT'}</button>
                </div>`).join('');
        }

        function renderOrders() {
            document.getElementById('orderList').innerHTML = orders.map(o => `
                <div class="border border-black p-6 bg-white space-y-4">
                    <div class="flex justify-between font-black text-[10px]">
                        <span>${o.username} | ${o.phone}</span>
                        <a href="${o.paymentScreenshot}" target="_blank" class="underline italic">RECEIPT</a>
                    </div>
                    <select id="status-${o._id}" class="!mb-0"><option value="Pending" ${o.status=='Pending'?'selected':''}>Pending</option><option value="Delivered" ${o.status=='Delivered'?'selected':''}>Delivered</option></select>
                    <button onclick="updateStatus('${o._id}')" class="btn-black">UPDATE</button>
                </div>`).join('');
        }

        const widget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (e, r) => { if (r.event === "success") photos.push(r.info.secure_url); });
        document.getElementById('uploadBtn').onclick = () => widget.open();

        async function saveItem() {
            const data = { 
                name: document.getElementById('itemName').value, 
                costTHB: document.getElementById('itemCost').value,
                stock: document.getElementById('itemStock').value,
                availableSizes: document.getElementById('itemSizes').value.split(',').map(s => s.trim()),
                category: document.getElementById('itemCat').value, 
                images: photos 
            };
            await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            location.reload();
        }

        async function updateStatus(id) {
            const status = document.getElementById(`status-${id}`).value;
            await fetch(`/update-order/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status})});
            load();
        }

        async function toggleSoldOut(id, curr) {
            await fetch(`/update-item/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({isSoldOut: !curr})});
            load();
        }
        load();
    </script>
</body>
</html>
