<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>ADMIN DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { background: #f4f4f4; font-family: Helvetica; text-transform: uppercase; }
        .stat-card { background: #fff; border: 1px solid #000; padding: 25px; }
        input, select { border: 1px solid #000; padding: 12px; font-size: 10px; font-weight: 900; width: 100%; margin-bottom: 10px; }
        .btn-black { background: #000; color: #fff; padding: 15px; font-size: 10px; font-weight: 900; width: 100%; cursor: pointer; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-7xl mx-auto space-y-8">
        <div class="grid grid-cols-2 gap-6">
            <div class="stat-card">
                <h2 class="font-black mb-4">ADD PRODUCT</h2>
                <input type="text" id="itemName" placeholder="ITEM NAME">
                <input type="number" id="itemCost" placeholder="COST (THB)">
                <input type="number" id="itemStock" placeholder="STOCK QUANTITY">
                <input type="text" id="itemSizes" placeholder="SIZES (S, M, L)">
                <select id="itemCat"><option>Instock</option><option>Preorder</option></select>
                <button id="uploadBtn" class="btn-black mb-2 bg-blue-600">UPLOAD PHOTOS</button>
                <button onclick="saveItem()" class="btn-black">SAVE TO DATABASE</button>
            </div>
            <div id="orderList" class="stat-card overflow-y-auto max-h-[600px]">
                <h2 class="font-black mb-4">ACTIVE ORDERS</h2>
                <div id="ordersCont" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let photos = [];
        const widget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (e, r) => { 
            if (r.event === "success") photos.push(r.info.secure_url); 
        });
        document.getElementById('uploadBtn').onclick = () => widget.open();

        async function saveItem() {
            const data = { 
                name: document.getElementById('itemName').value, 
                costTHB: document.getElementById('itemCost').value,
                stock: document.getElementById('itemStock').value,
                availableSizes: document.getElementById('itemSizes').value.split(',').map(s => s.trim()),
                category: document.getElementById('itemCat').value, 
                images: photos 
            };
            await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            location.reload();
        }

        async function load() {
            const res = await fetch('/orders');
            const orders = await res.json();
            document.getElementById('ordersCont').innerHTML = orders.map(o => `
                <div class="border-b border-black pb-4 text-[10px]">
                    <p class="font-black">${o.username} - ${o.totalMMK.toLocaleString()} MMK</p>
                    <select onchange="updateStatus('${o._id}', this.value)" class="mt-2">
                        <option ${o.status==='Pending'?'selected':''}>Pending</option>
                        <option ${o.status==='Confirmed'?'selected':''}>Confirmed</option>
                        <option ${o.status==='Shipped'?'selected':''}>Shipped</option>
                    </select>
                </div>
            `).join('');
        }
        async function updateStatus(id, status) {
            await fetch(`/update-order/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status})});
        }
        load();
    </script>
</body>
</html>
