<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver | Admin</title><script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; }
        .active-filter { background: white !important; color: black !important; }
    </style>
</head>
<body class="p-6">
    <div id="lockScreen" class="fixed inset-0 bg-black z-[200] flex items-center justify-center p-6">
        <div class="bg-slate-900 p-10 rounded-[40px] border border-white/5 w-full max-w-sm text-center">
            <h2 class="text-xl font-black italic mb-6 text-emerald-400 uppercase">Admin Lock</h2>
            <input type="password" id="adminPass" placeholder="Master Password" class="w-full bg-black p-4 rounded-2xl outline-none mb-4 text-center border border-white/10">
            <button onclick="unlock()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px]">Unlock System</button>
        </div>
    </div>

    <div id="adminContent" class="hidden max-w-6xl mx-auto">
        <h1 class="text-3xl font-black italic text-emerald-400 mb-10">DASHBOARD</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-slate-900 p-8 rounded-[40px] border border-white/5">
                <p class="text-[10px] font-black uppercase text-slate-500 mb-2">Total Capital (Usage)</p>
                <h2 id="totalUsage" class="text-2xl font-black">0</h2>
            </div>
            <div class="bg-slate-900 p-8 rounded-[40px] border border-white/5">
                <p class="text-[10px] font-black uppercase text-emerald-500/50 mb-2">Income (Sold Items)</p>
                <h2 id="totalIncome" class="text-2xl font-black text-emerald-400">0</h2>
            </div>
            <div class="bg-slate-900 p-8 rounded-[40px] border border-white/5">
                <p class="text-[10px] font-black uppercase text-blue-500/50 mb-2">Net Profit</p>
                <h2 id="totalProfit" class="text-2xl font-black text-blue-400">0</h2>
            </div>
        </div>

        <div class="bg-slate-900 p-8 rounded-[40px] mb-12 border border-white/5">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="itemName" placeholder="Item Name" class="bg-black p-4 rounded-2xl outline-none border border-white/5 text-sm">
                <input type="number" id="itemPrice" placeholder="Cost (CNY)" class="bg-black p-4 rounded-2xl outline-none border border-white/5 text-sm">
                <button id="upload_widget" class="bg-black border border-dashed border-white/20 rounded-2xl text-[10px] font-bold text-slate-500 uppercase">📸 Photo</button>
                <button onclick="addItem()" class="bg-emerald-500 text-black font-black py-4 rounded-2xl uppercase text-[10px]">Add Item</button>
                <input type="hidden" id="itemImg">
            </div>
        </div>

        <h2 class="text-lg font-black italic uppercase mb-6">Customer Orders</h2>
        <div class="overflow-hidden rounded-[40px] border border-white/5 mb-12">
            <table class="w-full text-left bg-slate-900/50">
                <thead class="bg-slate-900 text-[10px] font-black uppercase text-slate-500">
                    <tr><th class="p-6">User</th><th class="p-6">Total</th><th class="p-6">Proof</th><th class="p-6">Status</th></tr>
                </thead>
                <tbody id="order-list"></tbody>
            </table>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 class="text-lg font-black italic uppercase">Inventory Management</h2>
            <div class="flex bg-slate-900 p-1 rounded-2xl border border-white/5">
                <button onclick="filterInventory('All')" class="filter-btn active-filter px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all">All</button>
                <button onclick="filterInventory('Instock')" class="filter-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500">Instock</button>
                <button onclick="filterInventory('Soldout')" class="filter-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500">Sold Out</button>
                <button onclick="filterInventory('Pending')" class="filter-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all text-slate-500">Preorders</button>
            </div>
        </div>

        <div class="overflow-hidden rounded-[40px] border border-white/5 mb-20">
            <table class="w-full text-left bg-slate-900/50">
                <thead class="bg-slate-900 text-[10px] font-black uppercase text-slate-500">
                    <tr><th class="p-6">Product</th><th class="p-6">Status</th><th class="p-6">Cost (MMK)</th><th class="p-6">Selling (MMK)</th><th class="p-6">Action</th></tr>
                </thead>
                <tbody id="inventory-list"></tbody>
            </table>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        const RATE = 130; 
        let items = []; 
        let currentFilter = 'All';

        function unlock() {
            if(document.getElementById('adminPass').value === 'never2026') { 
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('adminContent').classList.remove('hidden');
                loadAdmin();
            } else { alert("Wrong Password!"); }
        }

        async function loadAdmin() {
            const [iRes, oRes] = await Promise.all([fetch('/items'), fetch('/all-orders')]);
            items = await iRes.json();
            const orders = await oRes.json();
            updateStats();
            renderOrders(orders);
            renderInventory();
        }

        function updateStats() {
            let usage = 0, income = 0, profit = 0;
            items.forEach(i => {
                const cost = i.price * RATE, sell = cost * 1.25;
                usage += cost;
                if(i.grade === 'Soldout') { income += sell; profit += (sell-cost); }
            });
            document.getElementById('totalUsage').innerText = Math.round(usage).toLocaleString() + " MMK";
            document.getElementById('totalIncome').innerText = Math.round(income).toLocaleString() + " MMK";
            document.getElementById('totalProfit').innerText = Math.round(profit).toLocaleString() + " MMK";
        }

        function filterInventory(status) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active-filter');
                btn.classList.add('text-slate-500');
                if(btn.innerText.replace(' ', '').toLowerCase() === status.toLowerCase() || (status === 'All' && btn.innerText === 'ALL')) {
                    btn.classList.add('active-filter');
                    btn.classList.remove('text-slate-500');
                }
            });
            renderInventory();
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            const filtered = items.filter(i => currentFilter === 'All' || i.grade === currentFilter);
            
            list.innerHTML = filtered.reverse().map(i => `
                <tr class="border-t border-white/5">
                    <td class="p-6 flex items-center gap-4">
                        <img src="${i.productImage}" class="w-10 h-10 rounded-lg object-cover">
                        <b>${i.name}</b>
                    </td>
                    <td class="p-6">
                        <select onchange="updateGrade('${i._id}', this.value)" class="bg-black p-2 rounded-lg text-[10px] border border-white/10 uppercase">
                            <option value="Instock" ${i.grade==='Instock'?'selected':''}>Instock</option>
                            <option value="Soldout" ${i.grade==='Soldout'?'selected':''}>Sold Out</option>
                            <option value="Pending" ${i.grade==='Pending'?'selected':''}>Preorder</option>
                        </select>
                    </td>
                    <td class="p-6 font-mono">${Math.round(i.price * RATE).toLocaleString()}</td>
                    <td class="p-6 font-mono text-emerald-400 font-bold">${Math.round(i.price * 1.25 * RATE).toLocaleString()}</td>
                    <td class="p-6"><button onclick="deleteItem('${i._id}')" class="text-red-500">✕</button></td>
                </tr>`).join('');
        }

        function renderOrders(orders) {
            document.getElementById('order-list').innerHTML = orders.map(o => `
                <tr class="border-t border-white/5 text-sm">
                    <td class="p-6">${o.username}<br><small class="text-slate-500">${o.phone}</small></td>
                    <td class="p-6 font-bold text-emerald-400">${o.totalMMK.toLocaleString()} MMK</td>
                    <td class="p-6"><a href="${o.paymentScreenshot}" target="_blank" class="text-blue-400 underline uppercase text-[10px] font-black">View</a></td>
                    <td class="p-6">
                        <select onchange="updateOrder('${o._id}', this.value)" class="bg-black p-2 rounded-lg text-[10px] border border-white/10 uppercase">
                            <option value="Pending Verification" ${o.status==='Pending Verification'?'selected':''}>Pending</option>
                            <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                            <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                        </select>
                    </td>
                </tr>`).join('');
        }

        async function updateGrade(id, g) { await fetch(`/update-item/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({grade: g})}); loadAdmin(); }
        async function updateOrder(id, s) { await fetch(`/update-order/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status: s})}); alert("Updated"); }
        async function deleteItem(id) { if(confirm('Delete?')){ await fetch(`/delete-item/${id}`, { method: 'DELETE'}); loadAdmin(); }}
        
        var myWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd' }, (e, r) => { 
            if (r.event === "success") { document.getElementById('itemImg').value = r.info.secure_url; document.getElementById('upload_widget').innerText = "✅ PHOTO READY"; }
        });
        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open());

        async function addItem() {
            const newItem = { name: document.getElementById('itemName').value, price: document.getElementById('itemPrice').value, productImage: document.getElementById('itemImg').value, grade: 'Instock' };
            await fetch('/add-item', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(newItem)});
            location.reload();
        }
    </script>
</body>
</html>
