<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>ADMIN DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f4f4f4; font-family: Helvetica; text-transform: uppercase; }
        .stat-card { background: #fff; border: 1px solid #000; padding: 25px; }
        input, select { border: 1px solid #000; padding: 12px; font-size: 10px; font-weight: 900; width: 100%; }
        .btn-black { background: #000; color: #fff; padding: 15px; font-size: 10px; font-weight: 900; width: 100%; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-7xl mx-auto space-y-8">
        <div class="grid grid-cols-3 gap-6">
            <div class="stat-card">
                <p class="text-[8px] font-black opacity-30">REVENUE</p>
                <h1 id="revTotal" class="text-2xl font-black italic">0 MMK</h1>
            </div>
            <div class="stat-card">
                <p class="text-[8px] font-black text-emerald-600">DELIVERED PROFIT</p>
                <h1 id="profitTotal" class="text-2xl font-black italic text-emerald-600">0 MMK</h1>
            </div>
            <div class="stat-card">
                <p class="text-[8px] font-black text-blue-600">ACTIVE ORDERS</p>
                <h1 id="activeCount" class="text-2xl font-black italic text-blue-600">0</h1>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="stat-card">
                    <h2 class="text-[10px] font-black mb-4 italic">ADD PRODUCT</h2>
                    <input type="text" id="itemName" placeholder="NAME" class="mb-2">
                    <input type="number" id="itemCost" placeholder="COST (THB)" class="mb-2">
                    <input type="text" id="itemSizes" placeholder="SIZES (S, M, L)" class="mb-2">
                    <select id="itemCat" class="mb-2"><option value="Instock">INSTOCK</option><option value="Preorder">PREORDER</option></select>
                    <button id="uploadBtn" class="border border-black p-4 text-[9px] font-black w-full mb-2">📸 PHOTOS</button>
                    <button onclick="saveItem()" class="btn-black">DEPLOY</button>
                </div>

                <div class="stat-card">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-[10px] font-black italic">INVENTORY</h2>
                        <input type="text" id="invSearch" onkeyup="renderInv()" placeholder="SEARCH..." class="!w-40 !p-2">
                    </div>
                    <div id="invList" class="space-y-2 max-h-96 overflow-y-auto"></div>
                </div>
            </div>

            <div class="stat-card">
                <h2 class="text-[10px] font-black mb-6 italic">ORDER STREAM</h2>
                <div id="orderList" class="space-y-4 max-h-[800px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        let photos = [], items = [], orders = [];

        async function load() {
            try {
                const itemsRes = await fetch('/items');
                items = await itemsRes.json();
                const ordersRes = await fetch('/orders');
                orders = await ordersRes.json();
                renderStats(); 
                renderInv(); 
                renderOrders();
            } catch (err) {
                console.error("Failed to load dashboard data:", err);
            }
        }

        function renderStats() {
    let rev = 0, profit = 0, active = 0;
    const exchangeRate = 125;
    
    orders.forEach(o => {
        rev += o.totalMMK;
        if(o.status !== 'Delivered') active++;
        
        if(o.status === 'Delivered') {
            o.items.forEach(oi => {
                // IMPROVED MATCHING: Check if the order name contains the inventory name
                const original = items.find(invItem => 
                    oi.name.toLowerCase().includes(invItem.name.toLowerCase()) ||
                    invItem.name.toLowerCase().includes(oi.name.toLowerCase())
                );

                if(original && original.costTHB) {
                    const costInMMK = Number(original.costTHB) * exchangeRate;
                    const itemQty = Number(oi.qty) || 1; // Fallback to 1 if qty is missing
                    const profitPerUnit = oi.price - costInMMK;
                    
                    profit += profitPerUnit * itemQty;
                } else {
                    console.log("Match not found for:", oi.name); // Check your console to see if this triggers
                }
            });
        }
    });

    document.getElementById('revTotal').innerText = `${rev.toLocaleString()} MMK`;
    document.getElementById('profitTotal').innerText = `${profit.toLocaleString()} MMK`;
    document.getElementById('activeCount').innerText = active;
}

           

      function renderInv() {
    const query = document.getElementById('invSearch').value.toLowerCase();
    
    document.getElementById('invList').innerHTML = items
        .filter(i => i.name.toLowerCase().includes(query))
        .map(i => `
            <div class="flex justify-between items-center border border-black p-4 ${i.isSoldOut ? 'bg-gray-100 opacity-50' : 'bg-white'}">
                <div class="flex items-center gap-4">
                    <img src="${i.images[0] || ''}" class="w-12 h-12 object-contain bg-gray-50 border border-black">
                    
                    <div class="flex flex-col gap-1">
                        <span class="text-[9px] font-black">${i.name}</span>
                        
                        <div class="flex flex-wrap gap-1">
                            ${(i.availableSizes || []).map(size => `
                                <span class="border border-black px-1.5 py-0.5 text-[7px] font-bold bg-white">
                                    ${size}
                                </span>
                            `).join('')}
                        </div>
                        
                        <span class="text-[8px] opacity-50 text-emerald-600 font-bold">COST: ${i.costTHB} THB</span>
                    </div>
                </div>
                
                <button onclick="toggleSoldOut('${i._id}', ${i.isSoldOut})" class="text-[8px] underline font-black">
                    ${i.isSoldOut ? 'RESTOCK' : 'MARK SOLD OUT'}
                </button>
            </div>
        `).join('');
}

        function renderOrders() {
            document.getElementById('orderList').innerHTML = orders.map(o => `
                <div class="border border-black p-6 bg-white space-y-4">
                    <div class="flex justify-between font-black text-[10px]">
                        <span>${o.username || 'GUEST'} | ${o.tgUsername || 'No TG'}</span>
                        <a href="${o.paymentScreenshot}" target="_blank" class="underline text-blue-600 italic">RECEIPT</a>
                    </div>
                    <div class="flex gap-4">
                        <img src="${o.items[0].images[0]}" class="w-20 h-24 object-contain bg-gray-50 border border-black">
                        <div class="text-[9px] font-bold">
                            <p>${o.items.map(i => i.name + ' (' + i.size + ')').join(', ')}</p>
                            <p class="mt-1">${o.phone}</p>
                            <p class="mt-1 text-emerald-600">${o.totalMMK.toLocaleString()} MMK</p>
                        </div>
                    </div>
                    <select id="status-${o._id}" class="!p-2 font-black">
                        <option value="Pending" ${o.status=='Pending'?'selected':''}>Pending</option>
                        <option value="Delivered" ${o.status=='Delivered'?'selected':''}>Delivered</option>
                    </select>
                    <input type="text" id="est-${o._id}" value="${o.estArrival || ''}" placeholder="ARRIVAL UPDATE" class="!p-2">
                    <button onclick="updateOrder('${o._id}')" class="btn-black !p-2">UPDATE</button>
                </div>`).join('');
        }

        const widget = cloudinary.createUploadWidget({ 
            cloudName: 'dawhhgjsd', 
            uploadPreset: 'dawhhgjsd',
            maxFiles: 5
        }, (e, r) => { 
            if (r.event === "success") photos.push(r.info.secure_url); 
        });
        
        document.getElementById('uploadBtn').onclick = () => widget.open();

       async function saveItem() {
    // This splits "S, M, L" into ["S", "M", "L"]
    const sizeInput = document.getElementById('itemSizes').value;
    const sizeArray = sizeInput.split(',').map(s => s.trim()).filter(s => s !== "");

    const data = { 
        name: document.getElementById('itemName').value, 
        costTHB: document.getElementById('itemCost').value, 
        availableSizes: sizeArray, // Now saves as individual boxes
        category: document.getElementById('itemCat').value, 
        images: photos 
    };
    await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    location.reload();
}

        async function updateOrder(id) {
            const status = document.getElementById(`status-${id}`).value;
            const estArrival = document.getElementById(`est-${id}`).value;
            await fetch(`/update-order/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status, estArrival})});
            load(); 
        }

        async function toggleSoldOut(id, current) {
            await fetch(`/update-item/${id}`, { 
                method:'PUT', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({isSoldOut: !current})
            });
            load(); 
        }

        load();
    </script>
</body>
</html>
