<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEver — Admin System</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black: #000;
            --white: #fff;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --red: #c41e1e;
            --blue: #2563eb;
            --green: #22c55e;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Space Mono', 'SF Mono', 'Courier New', monospace;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--white);
            color: var(--black);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-transform: uppercase;
        }

        /* ── Toast ──────────────────────────────────────── */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--black);
            color: var(--white);
            padding: 14px 20px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            pointer-events: auto;
            transform: translateX(120%);
            opacity: 0;
            transition: transform 0.4s var(--transition), opacity 0.4s;
            max-width: 340px;
            line-height: 1.5;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.toast-error { border-left: 3px solid var(--red); }
        .toast.toast-success { border-left: 3px solid var(--green); }

        /* ── Inputs ─────────────────────────────────────── */
        input, select, textarea {
            border: none;
            border-bottom: 1px solid var(--gray-200);
            border-radius: 0;
            padding: 12px 0;
            width: 100%;
            outline: none;
            background: transparent;
            font-family: var(--font-sans);
            font-size: 11px;
            letter-spacing: 0.04em;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            text-transform: uppercase;
        }
        input:focus, select:focus, textarea:focus { border-bottom-color: var(--black); }
        input::placeholder, textarea::placeholder { color: var(--gray-400); }

        button {
            background: transparent;
            color: var(--black);
            text-transform: uppercase;
            border: none;
            outline: none;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
        }

        .btn-primary {
            background: var(--black);
            color: var(--white);
            padding: 15px;
            width: 100%;
            letter-spacing: 0.12em;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-primary:hover { background: var(--gray-800); }
        .btn-primary:active { transform: scale(0.985); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--gray-200);
            padding: 14px;
            width: 100%;
            transition: border-color 0.2s;
        }
        .btn-outline:hover { border-color: var(--black); }

        /* ── Skeleton ───────────────────────────────────── */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 2px;
        }

        /* ── Section ────────────────────────────────────── */
        .section-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--gray-400);
            margin-bottom: 24px;
        }

        /* ── Scrollbar ──────────────────────────────────── */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); }
        ::-webkit-scrollbar-thumb:hover { background: var(--gray-500); }

        /* ── Auth Overlay ───────────────────────────────── */
        .auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--white);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .auth-box {
            max-width: 320px;
            width: 100%;
            text-align: center;
        }
        .auth-box h1 {
            font-size: 14px;
            letter-spacing: 0.2em;
            margin-bottom: 32px;
            font-weight: 700;
        }
        .auth-box input {
            text-align: center;
            font-size: 16px;
            letter-spacing: 0.2em;
            border-bottom: 2px solid var(--black);
            padding-bottom: 12px;
            margin-bottom: 24px;
        }
        .auth-error {
            font-size: 10px;
            color: var(--red);
            letter-spacing: 0.1em;
            margin-top: 16px;
        }

        /* ── Edit Modal ─────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-box {
            max-width: 640px;
            width: 100%;
            background: var(--white);
            padding: 40px;
            border: 1px solid var(--gray-200);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 10px;
            color: var(--gray-500);
            transition: color 0.2s;
        }
        .modal-close:hover { color: var(--black); }

        /* ── Layout ─────────────────────────────────────── */
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        @media (min-width: 768px) { .admin-container { padding: 48px; } }

        .admin-header {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 32px;
            margin-bottom: 48px;
            border-bottom: 1px solid var(--gray-200);
        }
        @media (min-width: 768px) {
            .admin-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-end;
            }
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 64px;
        }
        @media (min-width: 1024px) {
            .admin-grid { grid-template-columns: 5fr 7fr; }
        }

        .stat-box {
            text-align: right;
        }
        .stat-label {
            font-size: 10px;
            color: var(--gray-400);
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        /* ── Inventory Item ─────────────────────────────── */
        .inv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-100);
        }
        .inv-item:hover .inv-actions { opacity: 1; }
        .inv-actions {
            display: flex;
            gap: 16px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .inv-actions button {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            transition: color 0.2s;
        }
        .inv-action-edit { color: var(--blue); }
        .inv-action-edit:hover { color: #1d4ed8; }
        .inv-action-sold { color: var(--gray-400); }
        .inv-action-sold:hover { color: var(--black); }
        .inv-action-del { color: var(--gray-300); }
        .inv-action-del:hover { color: var(--red); }

        /* ── Order Card ─────────────────────────────────── */
        .admin-order {
            border-bottom: 1px solid var(--gray-200);
            padding-bottom: 24px;
            margin-bottom: 24px;
        }
        .admin-order-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 16px;
        }
        .admin-order-info { display: flex; align-items: flex-start; gap: 16px; }
        .admin-order-img {
            width: 56px; height: 56px;
            object-fit: cover;
            border: 1px solid var(--gray-200);
            flex-shrink: 0;
        }
        .admin-order-name {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .admin-order-meta {
            font-size: 10px;
            color: var(--gray-500);
            line-height: 1.7;
        }
        .admin-order-tg {
            font-size: 10px;
            color: var(--blue);
        }
        .admin-order-items {
            font-size: 10px;
            color: var(--gray-500);
            margin-top: 8px;
            line-height: 1.7;
        }
        .admin-order-price {
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
        }
        .admin-order-receipt {
            font-size: 10px;
            color: var(--gray-400);
            text-decoration: underline;
            transition: color 0.2s;
        }
        .admin-order-receipt:hover { color: var(--black); }

        .admin-order-controls {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            background: var(--gray-50);
            padding: 16px;
            margin-top: 12px;
        }
        .admin-order-controls > div { flex: 1; }
        .admin-order-controls label {
            display: block;
            font-size: 9px;
            color: var(--gray-400);
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }
        .admin-order-controls select,
        .admin-order-controls input {
            margin-bottom: 0;
            padding: 6px 0;
            font-size: 11px;
            background: transparent;
            border-bottom: 1px solid var(--gray-300);
        }
        .admin-order-actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            align-items: flex-end;
        }
        .admin-order-actions button { font-size: 10px; transition: color 0.2s; }
        .admin-order-update { color: var(--blue); }
        .admin-order-update:hover { color: #1d4ed8; }
        .admin-order-delete { color: var(--red); }
        .admin-order-delete:hover { opacity: 0.7; }

        /* ── User List ──────────────────────────────────── */
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            padding: 8px 0;
            border-bottom: 1px solid var(--gray-100);
        }
        .user-date {
            font-size: 10px;
            color: var(--gray-400);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ═══════════════════ AUTH OVERLAY ══════════════════════ -->
<div id="authOverlay" class="auth-overlay">
    <div class="auth-box">
        <h1>SYSTEM ACCESS</h1>
        <input type="password" id="adminPass" placeholder="ENTER KEY">
        <button onclick="checkPass()" class="btn-primary">LOGIN</button>
        <div id="authError" class="auth-error"></div>
    </div>
</div>

<!-- ═══════════════════ ADMIN CONTENT ════════════════════ -->
<div class="admin-container">

    <header class="admin-header">
        <div>
            <h1 style="font-size:16px;letter-spacing:0.2em;margin-bottom:6px;">NEVEREVER ADMIN</h1>
            <p id="timeDisplay" style="font-size:10px;color:var(--gray-400);letter-spacing:0.1em;">SYSTEM ACTIVE</p>
        </div>
        <div style="display:flex;gap:40px;">
            <div class="stat-box">
                <p class="stat-label">REVENUE</p>
                <h2 id="revTotal" class="stat-value">0 MMK</h2>
            </div>
            <div class="stat-box">
                <p class="stat-label">ACTIVE ORDERS</p>
                <h2 id="orderCount" class="stat-value">0</h2>
            </div>
        </div>
    </header>

    <div class="admin-grid">

        <!-- ═══ LEFT COLUMN ═══ -->
        <div>

            <!-- Deploy Product -->
            <section style="margin-bottom:48px;">
                <h2 class="section-title">DEPLOY NEW PRODUCT</h2>
                <input type="text" id="itemName" placeholder="PRODUCT NAME">
                <div style="display:flex;gap:12px;">
                    <input type="number" id="itemCost" placeholder="COST (THB)" style="width:25%;">
                    <input type="number" id="itemPrice" placeholder="PRICE (MMK)" style="width:25%;">
                    <input type="number" id="itemQty" placeholder="QTY" value="1" style="width:25%;">
                    <select id="itemCat" style="width:25%;">
                        <option value="Instock">INSTOCK</option>
                        <option value="Preorder">PREORDER</option>
                    </select>
                </div>
                <textarea id="itemDesc" placeholder="PRODUCT DESCRIPTION" rows="3"></textarea>

                <div style="margin-bottom:16px;">
                    <div id="sizeInputs">
                        <input type="text" class="size-input" placeholder="SIZE OPTION (e.g. S, M, L)">
                    </div>
                    <button onclick="addSizeInput()" type="button" style="font-size:10px;color:var(--gray-500);margin-top:4px;">+ ADD ANOTHER SIZE</button>
                </div>
                <div style="margin-bottom:16px;">
                    <div id="colorInputs">
                        <input type="text" class="color-input" placeholder="COLOR OPTION (e.g. BLACK, RED)">
                    </div>
                    <button onclick="addColorInput()" type="button" style="font-size:10px;color:var(--gray-500);margin-top:4px;">+ ADD ANOTHER COLOR</button>
                </div>

                <button id="uploadBtn" class="btn-outline" style="margin-bottom:16px;">+ ATTACH PRODUCT IMAGERY</button>
                <button onclick="saveItem()" class="btn-primary">PUBLISH TO STORE</button>
            </section>

            <!-- Database -->
            <section style="margin-bottom:48px;">
                <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;">
                    <h2 class="section-title" style="margin-bottom:0;">DATABASE</h2>
                    <input type="text" id="invSearch" placeholder="SEARCH..." oninput="load()" style="width:50%;margin-bottom:0;padding-bottom:4px;text-align:right;">
                </div>
                <div id="inv-list" style="max-height:240px;overflow-y:auto;"></div>
            </section>

            <!-- Customer Accounts -->
            <section style="margin-bottom:48px;">
                <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4px;">
                    <div>
                        <h2 class="section-title" style="margin-bottom:4px;">CUSTOMER ACCOUNTS</h2>
                        <p style="font-size:10px;color:var(--gray-400);letter-spacing:0.05em;">PASSWORDS ARE SECURELY HASHED.</p>
                    </div>
                    <button onclick="load()" style="font-size:10px;color:var(--gray-500);">REFRESH</button>
                </div>
                <div id="user-list" style="max-height:180px;overflow-y:auto;margin-top:16px;"></div>
                <div style="margin-top:16px;display:flex;gap:8px;">
                    <input id="resetUsername" type="text" placeholder="CUSTOMER USERNAME" style="flex:1;margin-bottom:0;padding:8px 0;">
                    <input id="resetPassword" type="password" placeholder="NEW PASSWORD" style="flex:1;margin-bottom:0;padding:8px 0;">
                </div>
                <button onclick="resetCustomerPassword()" class="btn-primary" style="margin-top:16px;">RESET CUSTOMER PASSWORD</button>
            </section>

            <!-- Footer Info -->
            <section>
                <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4px;">
                    <div>
                        <h2 class="section-title" style="margin-bottom:4px;">FOOTER INFO</h2>
                        <p style="font-size:10px;color:var(--gray-400);letter-spacing:0.05em;">FAQS AND POLICY IN SHOP FOOTER.</p>
                    </div>
                    <button onclick="loadSiteContent()" style="font-size:10px;color:var(--gray-500);">REFRESH</button>
                </div>
                <textarea id="siteFaqs" placeholder="FAQS" rows="6" style="margin-top:16px;"></textarea>
                <textarea id="sitePolicy" placeholder="POLICY" rows="6"></textarea>
                <button onclick="saveSiteContent()" class="btn-primary">SAVE FOOTER INFO</button>
                <div id="siteContentStatus" style="font-size:10px;color:var(--gray-400);letter-spacing:0.1em;margin-top:12px;"></div>
            </section>

        </div>

        <!-- ═══ RIGHT COLUMN ═══ -->
        <div>
            <h2 class="section-title">LIVE ORDER STREAM</h2>
            <div id="order-list"></div>
        </div>

    </div>
</div>

<!-- ═══════════════════ EDIT MODAL ════════════════════════ -->
<div id="editModal" class="modal-overlay hidden">
    <div class="modal-box">
        <button onclick="document.getElementById('editModal').classList.add('hidden')" class="modal-close">CLOSE</button>
        <h2 class="section-title">EDIT PRODUCT</h2>
        <input type="hidden" id="editItemId">
        <input type="text" id="editItemName" placeholder="PRODUCT NAME">
        <div style="display:flex;gap:12px;">
            <input type="number" id="editItemCost" placeholder="COST (THB)" style="width:25%;">
            <input type="number" id="editItemPrice" placeholder="PRICE (MMK)" style="width:25%;">
            <input type="number" id="editItemQty" placeholder="QTY" style="width:25%;">
            <select id="editItemCat" style="width:25%;">
                <option value="Instock">INSTOCK</option>
                <option value="Preorder">PREORDER</option>
                <option value="Sold Out">SOLD OUT</option>
            </select>
        </div>
        <textarea id="editItemDesc" placeholder="PRODUCT DESCRIPTION" rows="3"></textarea>

        <div style="margin-bottom:16px;">
            <div id="editSizeInputs"></div>
            <button onclick="addEditSizeInput()" type="button" style="font-size:10px;color:var(--gray-500);margin-top:4px;">+ ADD ANOTHER SIZE</button>
        </div>
        <div style="margin-bottom:16px;">
            <div id="editColorInputs"></div>
            <button onclick="addEditColorInput()" type="button" style="font-size:10px;color:var(--gray-500);margin-top:4px;">+ ADD ANOTHER COLOR</button>
        </div>

        <button id="editUploadBtn" class="btn-outline" style="margin-bottom:16px;">+ ATTACH NEW IMAGERY (REPLACES OLD)</button>
        <button onclick="saveEditItem()" class="btn-primary">UPDATE PRODUCT</button>
    </div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script>
    // ═══════════════════════════════════════════════════════
    // ►  TOAST
    // ═══════════════════════════════════════════════════════
    function toast(msg, type = 'info', duration = 3500) {
        const container = document.getElementById('toastContainer');
        const el = document.createElement('div');
        el.className = `toast ${type === 'error' ? 'toast-error' : type === 'success' ? 'toast-success' : ''}`;
        el.textContent = msg;
        container.appendChild(el);
        requestAnimationFrame(() => {
            requestAnimationFrame(() => el.classList.add('show'));
        });
        setTimeout(() => {
            el.classList.remove('show');
            setTimeout(() => el.remove(), 400);
        }, duration);
    }

    // ═══════════════════════════════════════════════════════
    // ►  AUTH
    // ═══════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('adminToken')) {
            document.getElementById('authOverlay').style.display = 'none';
            load();
            loadSiteContent();
        }
    });

    function checkPass() {
        const authError = document.getElementById('authError');
        authError.innerText = '';
        fetch('/auth/admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: document.getElementById('adminPass').value })
        }).then(res => res.json()).then(data => {
            if (data.success) {
                localStorage.setItem('adminToken', data.token);
                document.getElementById('authOverlay').style.display = 'none';
                load();
                loadSiteContent();
                toast('SYSTEM ACCESS GRANTED', 'success');
            } else {
                localStorage.removeItem('adminToken');
                authError.innerText = data.error || 'ACCESS DENIED';
            }
        }).catch(err => {
            authError.innerText = 'LOGIN FAILED: ' + err.message;
        });
    }

    // Live Clock
    setInterval(() => {
        document.getElementById('timeDisplay').innerText = new Date().toLocaleString();
    }, 1000);

    // ═══════════════════════════════════════════════════════
    // ►  SIZE / COLOR INPUTS
    // ═══════════════════════════════════════════════════════
    function addSizeInput() {
        const el = document.createElement('input');
        el.type = 'text'; el.className = 'size-input'; el.placeholder = 'SIZE OPTION';
        document.getElementById('sizeInputs').appendChild(el);
    }
    function addColorInput() {
        const el = document.createElement('input');
        el.type = 'text'; el.className = 'color-input'; el.placeholder = 'COLOR OPTION';
        document.getElementById('colorInputs').appendChild(el);
    }

    // ═══════════════════════════════════════════════════════
    // ►  IMAGE UPLOAD
    // ═══════════════════════════════════════════════════════
    let photos = [];
    var widget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd', maxFiles: 20 }, (e, r) => {
        if (r.event === 'success') {
            if (photos.length >= 20) return toast('MAXIMUM 20 IMAGES', 'error');
            photos.push(r.info.secure_url);
            const btn = document.getElementById('uploadBtn');
            btn.innerText = `${photos.length} IMAGES ATTACHED ✓`;
            btn.style.borderColor = 'var(--black)';
            btn.style.color = 'var(--black)';
        }
    });
    document.getElementById('uploadBtn').onclick = () => widget.open();

    // ═══════════════════════════════════════════════════════
    // ►  SAVE ITEM
    // ═══════════════════════════════════════════════════════
    async function saveItem() {
        const token = localStorage.getItem('adminToken');
        const sizes = Array.from(document.querySelectorAll('.size-input')).map(s => s.value.trim()).filter(Boolean);
        const colors = Array.from(document.querySelectorAll('.color-input')).map(c => c.value.trim()).filter(Boolean);
        const data = {
            name: document.getElementById('itemName').value,
            costTHB: document.getElementById('itemCost').value,
            priceMMK: document.getElementById('itemPrice').value,
            quantity: document.getElementById('itemQty').value,
            category: document.getElementById('itemCat').value,
            description: document.getElementById('itemDesc').value,
            availableSizes: sizes,
            availableColors: colors,
            images: photos
        };
        if (!data.name || !data.costTHB || photos.length === 0) return toast('MISSING DATA OR IMAGES', 'error');

        const response = await fetch('/api/add-item', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
        const result = await response.json();
        if (!response.ok) {
            return toast(result.error || (result.errors ? result.errors.map(e => e.msg).join(', ') : 'UNABLE TO ADD PRODUCT'), 'error');
        }
        toast('PRODUCT DEPLOYED', 'success');
        location.reload();
    }

    // ═══════════════════════════════════════════════════════
    // ►  ORDER MANAGEMENT
    // ═══════════════════════════════════════════════════════
    async function markSoldOut(id) {
        const token = localStorage.getItem('adminToken');
        await fetch(`/api/update-item-cat/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ category: 'Sold Out' }) });
        toast('MARKED SOLD OUT', 'success');
        load();
    }

    async function updateOrder(id) {
        const token = localStorage.getItem('adminToken');
        const status = document.getElementById(`status-${id}`).value;
        const estArrival = document.getElementById(`est-${id}`).value;
        await fetch(`/api/update-order/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ status, estArrival }) });
        toast('ORDER UPDATED', 'success');
        load();
    }

    async function delOrder(id) {
        if (confirm('PERMANENTLY DELETE THIS ORDER?')) {
            const token = localStorage.getItem('adminToken');
            await fetch(`/api/delete-order/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            toast('ORDER DELETED', 'success');
            load();
        }
    }

    async function delItem(id) {
        if (confirm('REMOVE PRODUCT FROM STORE?')) {
            const token = localStorage.getItem('adminToken');
            await fetch(`/api/delete-item/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            toast('PRODUCT REMOVED', 'success');
            load();
        }
    }

    // ═══════════════════════════════════════════════════════
    // ►  EDIT MODAL
    // ═══════════════════════════════════════════════════════
    let itemsCache = [];
    let editPhotos = [];

    var editWidget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd', maxFiles: 20 }, (e, r) => {
        if (r.event === 'success') {
            if (editPhotos.length >= 20) return toast('MAXIMUM 20 IMAGES', 'error');
            editPhotos.push(r.info.secure_url);
            const btn = document.getElementById('editUploadBtn');
            btn.innerText = `${editPhotos.length} NEW IMAGES ATTACHED ✓`;
            btn.style.borderColor = 'var(--black)';
            btn.style.color = 'var(--black)';
        }
    });
    document.getElementById('editUploadBtn').onclick = () => editWidget.open();

    function addEditSizeInput(val = '') {
        const el = document.createElement('input');
        el.type = 'text';
        el.className = 'size-input edit-size-input';
        el.placeholder = 'SIZE OPTION';
        el.value = val;
        document.getElementById('editSizeInputs').appendChild(el);
    }
    function addEditColorInput(val = '') {
        const el = document.createElement('input');
        el.type = 'text';
        el.className = 'color-input edit-color-input';
        el.placeholder = 'COLOR OPTION';
        el.value = val;
        document.getElementById('editColorInputs').appendChild(el);
    }

    function openEditModal(id) {
        const item = itemsCache.find(i => i._id === id);
        if (!item) return;
        document.getElementById('editItemId').value = item._id;
        document.getElementById('editItemName').value = item.name || '';
        document.getElementById('editItemCost').value = item.costTHB || '';
        document.getElementById('editItemPrice').value = item.price || '';
        document.getElementById('editItemQty').value = item.quantity !== undefined ? item.quantity : 1;
        document.getElementById('editItemCat').value = item.category || 'Instock';
        document.getElementById('editItemDesc').value = item.description || '';

        document.getElementById('editSizeInputs').innerHTML = '';
        (item.availableSizes || []).forEach(s => addEditSizeInput(s));
        if ((item.availableSizes || []).length === 0) addEditSizeInput();

        document.getElementById('editColorInputs').innerHTML = '';
        (item.availableColors || []).forEach(c => addEditColorInput(c));
        if ((item.availableColors || []).length === 0) addEditColorInput();

        editPhotos = [];
        const btn = document.getElementById('editUploadBtn');
        btn.innerText = '+ ATTACH NEW IMAGERY (REPLACES OLD)';
        btn.style.borderColor = '';
        btn.style.color = '';

        document.getElementById('editModal').classList.remove('hidden');
    }

    async function saveEditItem() {
        const token = localStorage.getItem('adminToken');
        const id = document.getElementById('editItemId').value;
        const sizes = Array.from(document.querySelectorAll('.edit-size-input')).map(s => s.value.trim()).filter(Boolean);
        const colors = Array.from(document.querySelectorAll('.edit-color-input')).map(c => c.value.trim()).filter(Boolean);
        const data = {
            name: document.getElementById('editItemName').value,
            costTHB: document.getElementById('editItemCost').value,
            priceMMK: document.getElementById('editItemPrice').value,
            quantity: document.getElementById('editItemQty').value,
            category: document.getElementById('editItemCat').value,
            description: document.getElementById('editItemDesc').value,
            availableSizes: sizes,
            availableColors: colors
        };
        if (editPhotos.length > 0) data.images = editPhotos;

        await fetch(`/api/update-item/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
        toast('PRODUCT UPDATED', 'success');
        document.getElementById('editModal').classList.add('hidden');
        load();
    }

    // ═══════════════════════════════════════════════════════
    // ►  CUSTOMER PASSWORD RESET
    // ═══════════════════════════════════════════════════════
    async function resetCustomerPassword() {
        const username = document.getElementById('resetUsername').value.trim();
        const newPassword = document.getElementById('resetPassword').value.trim();
        if (!username || !newPassword) return toast('FILL USERNAME AND NEW PASSWORD', 'error');
        const token = localStorage.getItem('adminToken');
        const res = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ username, newPassword })
        });
        const data = await res.json();
        if (res.ok) {
            toast('PASSWORD RESET SUCCESSFULLY', 'success');
            document.getElementById('resetUsername').value = '';
            document.getElementById('resetPassword').value = '';
        } else {
            toast(data.error || 'UNABLE TO RESET PASSWORD', 'error');
        }
    }

    // ═══════════════════════════════════════════════════════
    // ►  SITE CONTENT
    // ═══════════════════════════════════════════════════════
    async function loadSiteContent() {
        const status = document.getElementById('siteContentStatus');
        try {
            if (status) status.innerText = 'LOADING...';
            const res = await fetch('/api/site-content');
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Unable to load footer info');
            document.getElementById('siteFaqs').value = data.faqs || '';
            document.getElementById('sitePolicy').value = data.policy || '';
            if (status) status.innerText = 'LOADED';
        } catch (err) {
            console.error('Site content load failed', err);
            if (status) status.innerText = err.message || 'LOAD FAILED';
        }
    }

    async function saveSiteContent() {
        const token = localStorage.getItem('adminToken');
        const status = document.getElementById('siteContentStatus');
        const data = {
            faqs: document.getElementById('siteFaqs').value,
            policy: document.getElementById('sitePolicy').value
        };
        try {
            if (status) status.innerText = 'SAVING...';
            const res = await fetch('/api/site-content', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (!res.ok) throw new Error(result.error || 'Unable to save');
            if (status) status.innerText = 'SAVED';
            toast('FOOTER INFO UPDATED', 'success');
        } catch (err) {
            if (status) status.innerText = err.message || 'SAVE FAILED';
            toast(err.message || 'UNABLE TO SAVE FOOTER INFO', 'error');
        }
    }

    // ═══════════════════════════════════════════════════════
    // ►  DATA LOAD
    // ═══════════════════════════════════════════════════════
    function renderLoadingSkeletons() {
        document.getElementById('inv-list').innerHTML = Array(5).fill(0).map(() =>
            `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);">
                <div class="skeleton" style="height:12px;width:40%;"></div>
                <div class="skeleton" style="height:12px;width:20%;"></div>
            </div>`
        ).join('');
        document.getElementById('order-list').innerHTML = Array(3).fill(0).map(() =>
            `<div style="padding-bottom:24px;margin-bottom:24px;border-bottom:1px solid var(--gray-200);">
                <div style="display:flex;gap:16px;margin-bottom:12px;">
                    <div class="skeleton" style="width:56px;height:56px;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="skeleton" style="height:14px;width:50%;margin-bottom:8px;"></div><div class="skeleton" style="height:10px;width:70%;margin-bottom:6px;"></div><div class="skeleton" style="height:10px;width:40%;"></div></div>
                </div>
                <div class="skeleton" style="height:40px;width:100%;"></div>
            </div>`
        ).join('');
    }

    async function load() {
        const token = localStorage.getItem('adminToken');
        renderLoadingSkeletons();
        try {
            const itemsRes = await fetch('/api/items');
            if (!itemsRes.ok) throw new Error(`Unable to load items (${itemsRes.status})`);
            const items = await itemsRes.json();
            itemsCache = items;

            const ordersRes = await fetch('/api/orders', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!ordersRes.ok) {
                if (ordersRes.status === 401 || ordersRes.status === 403) {
                    localStorage.removeItem('adminToken');
                    document.getElementById('authOverlay').style.display = 'flex';
                    throw new Error('Session expired');
                }
                throw new Error(`Unable to load orders (${ordersRes.status})`);
            }
            const orders = await ordersRes.json();

            const usersRes = await fetch('/api/users', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!usersRes.ok) throw new Error('Unable to load users');
            const users = await usersRes.json();

            // Render Users
            document.getElementById('user-list').innerHTML = users.map(u =>
                `<div class="user-item">
                    <span>${u.username}</span>
                    <span class="user-date">${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'N/A'}</span>
                </div>`
            ).join('') || '<div style="font-size:11px;color:var(--gray-400);padding:12px 0;">NO CUSTOMER ACCOUNTS FOUND.</div>';

            // Stats
            let rev = 0;
            orders.forEach(o => { rev += o.totalMMK; });
            document.getElementById('revTotal').innerText = `${rev.toLocaleString()} MMK`;
            document.getElementById('orderCount').innerText = orders.length;

            // Render Orders
            document.getElementById('order-list').innerHTML = orders.map(o => `
                <div class="admin-order">
                    <div class="admin-order-top">
                        <div class="admin-order-info">
                            ${o.items[0]?.image ? `<img src="${o.items[0].image}" class="admin-order-img" loading="lazy" alt="Order item">` : ''}
                            <div>
                                <p class="admin-order-name">${o.customerName || o.username}</p>
                                <p class="admin-order-meta">${o.phone || 'NO PHONE'} • ${o.address || 'NO ADDRESS'}</p>
                                ${o.telegram ? `<p class="admin-order-tg">TG: @${o.telegram.replace('@', '')}</p>` : ''}
                                <p class="admin-order-items">${o.items.map(i => `${i.qty}x ${i.name} (${i.size || 'N/A'} / ${i.color || 'N/A'})`).join('<br>')}</p>
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <p class="admin-order-price">${o.totalMMK.toLocaleString()} MMK</p>
                            <a href="${o.paymentScreenshot}" target="_blank" class="admin-order-receipt">VIEW RECEIPT</a>
                        </div>
                    </div>
                    <div class="admin-order-controls">
                        <div>
                            <label>STATUS</label>
                            <select id="status-${o._id}" style="margin-bottom:0;">
                                <option value="Pending" ${o.status === 'Pending' ? 'selected' : ''}>PENDING</option>
                                <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>SHIPPED</option>
                                <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>DELIVERED</option>
                            </select>
                        </div>
                        <div>
                            <label>EST. ARRIVAL</label>
                            <input type="text" id="est-${o._id}" value="${o.estArrival || ''}" placeholder="e.g. 3-5 DAYS" style="margin-bottom:0;">
                        </div>
                        <div class="admin-order-actions">
                            <button onclick="updateOrder('${o._id}')" class="admin-order-update">UPDATE</button>
                            <button onclick="delOrder('${o._id}')" class="admin-order-delete">DELETE</button>
                        </div>
                    </div>
                </div>
            `).join('') || '<p style="color:var(--gray-400);font-size:11px;letter-spacing:0.08em;">NO ACTIVE ORDERS.</p>';

            // Render Inventory
            const q = document.getElementById('invSearch').value.toLowerCase();
            document.getElementById('inv-list').innerHTML = items.filter(i => i.name.toLowerCase().includes(q)).map(i => `
                <div class="inv-item">
                    <div>
                        <span style="font-weight:600;">${i.name}</span>
                        <span style="color:var(--gray-400);margin-left:8px;">[${i.category}]</span>
                    </div>
                    <div class="inv-actions">
                        <button onclick="openEditModal('${i._id}')" class="inv-action-edit">EDIT</button>
                        <button onclick="markSoldOut('${i._id}')" class="inv-action-sold">SOLD OUT</button>
                        <button onclick="delItem('${i._id}')" class="inv-action-del">REMOVE</button>
                    </div>
                </div>
            `).join('') || '<div style="font-size:11px;color:var(--gray-400);padding:12px 0;">NO PRODUCTS FOUND.</div>';

        } catch (err) {
            console.error('Admin load failed', err);
            if (err.message.includes('Session expired')) {
                document.getElementById('authError').innerText = 'SESSION EXPIRED. PLEASE LOGIN AGAIN.';
            } else {
                toast(err.message || 'UNABLE TO LOAD DATA', 'error');
            }
        }
    }
</script>
</body>
</html>
