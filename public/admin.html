<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>ADMIN | NEVEREVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fff; color: #000; font-family: Helvetica, sans-serif; text-transform: uppercase; }
        input, select, textarea { border: 1px solid #000; padding: 12px; font-size: 10px; font-weight: 900; width: 100%; margin-bottom: 8px; }
        .card { background: #fff; padding: 25px; border: 1px solid #000; }
        .btn-black { background: #000; color: #fff; padding: 15px; font-size: 10px; font-weight: 900; width: 100%; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto space-y-8">
        <div class="grid grid-cols-2 gap-4">
            <div class="card text-center"><p class="text-[9px] opacity-40">TOTAL REVENUE</p><h1 id="revTotal" class="text-xl font-black italic">0 MMK</h1></div>
            <div class="card text-center"><p class="text-[9px] text-emerald-600">DELIVERED PROFIT</p><h1 id="profitTotal" class="text-xl font-black italic text-emerald-600">0 MMK</h1></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="card">
                <h2 class="text-[10px] font-black mb-6">ADD NEW PRODUCT</h2>
                <input type="text" id="itemName" placeholder="PRODUCT NAME">
                <input type="number" id="itemCost" placeholder="COST (THB)">
                <input type="text" id="itemSizes" placeholder="SIZES (e.g. S, M, L, XL)">
                <select id="itemCat"><option value="Instock">Instock</option><option value="Preorder">Preorder</option></select>
                <button id="uploadBtn" class="border border-black p-4 text-[9px] font-black w-full mb-4">📸 UPLOAD PHOTOS</button>
                <button onclick="saveItem()" class="btn-black">DEPLOY PRODUCT</button>
            </div>
            <div class="card">
                <h2 class="text-[10px] font-black mb-6">ORDER MANAGEMENT</h2>
                <div id="order-list" class="space-y-4"></div>
            </div>
        </div>

        <div class="card">
            <h2 class="text-[10px] font-black mb-6">INVENTORY LIST</h2>
            <div id="inv-list" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        let photos = [];
        var widget = cloudinary.createUploadWidget({ cloudName:'dawhhgjsd', uploadPreset:'dawhhgjsd' }, (e,r) => { if(r.event==="success") photos.push(r.info.secure_url); });
        document.getElementById('uploadBtn').onclick = () => widget.open();

        async function saveItem() {
            const data = { 
                name: document.getElementById('itemName').value, 
                costTHB: document.getElementById('itemCost').value, 
                availableSizes: [document.getElementById('itemSizes').value],
                category: document.getElementById('itemCat').value, 
                images: photos 
            };
            await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            location.reload();
        }

        async function updateOrder(id) {
            const status = document.getElementById(`status-${id}`).value;
            const estArrival = document.getElementById(`est-${id}`).value;
            await fetch(`/update-order/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status, estArrival})});
            load();
        }

        async function toggleSoldOut(id, current) {
            await fetch(`/update-item/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({isSoldOut: !current})});
            load();
        }

        async function load() {
            const items = await (await fetch('/items')).json();
            const orders = await (await fetch('/orders')).json();
            
            let rev = 0, profit = 0;
            orders.forEach(o => {
                rev += o.totalMMK || 0;
                if(o.status === 'Delivered') {
                    o.items.forEach(oi => {
                        const original = items.find(i => i.name === oi.name);
                        if(original) profit += (oi.price - (original.costTHB * 125)) * oi.qty;
                    });
                }
            });

            document.getElementById('revTotal').innerText = `${rev.toLocaleString()} MMK`;
            document.getElementById('profitTotal').innerText = `${profit.toLocaleString()} MMK`;

            document.getElementById('order-list').innerHTML = orders.map(o => `
                <div class="border border-black p-4 bg-white">
                    <div class="flex justify-between text-[10px] font-black mb-2">
                        <span>${o.username || 'GUEST'}</span>
                        <a href="${o.paymentScreenshot}" target="_blank" class="underline">Receipt</a>
                    </div>
                    <select id="status-${o._id}">
                        <option value="Pending" ${o.status=='Pending'?'selected':''}>Pending</option>
                        <option value="Delivered" ${o.status=='Delivered'?'selected':''}>Delivered</option>
                    </select>
                    <input type="text" id="est-${o._id}" value="${o.estArrival || ''}" placeholder="ARRIVAL STATUS">
                    <button onclick="updateOrder('${o._id}')" class="btn-black !p-2 !text-[8px]">Update Order</button>
                </div>`).join('') || '<p class="text-[10px]">No orders.</p>';

            document.getElementById('inv-list').innerHTML = items.map(i => `
                <div class="flex justify-between p-4 border border-black items-center">
                    <span class="text-[9px] font-black ${i.isSoldOut ? 'line-through opacity-40' : ''}">${i.name}</span>
                    <button onclick="toggleSoldOut('${i._id}', ${i.isSoldOut})" class="text-[8px] underline">${i.isSoldOut ? 'RESTOCK' : 'MARK SOLD OUT'}</button>
                </div>`).join('');
        }
        load();
    </script>
</body>
</html>
