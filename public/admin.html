<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>ADMIN | NEVEREVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f4f4f4; font-family: Helvetica, sans-serif; }
        input, select, textarea { border: 1px solid #ddd; padding: 15px; font-size: 11px; font-weight: 900; text-transform: uppercase; width: 100%; outline: none; margin-bottom: 10px; }
        .btn-black { background: #000; color: #fff; padding: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em; width: 100%; }
    </style>
</head>
<body class="p-6 md:p-20">
    <div id="authOverlay" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-6">
        <div class="max-w-xs w-full space-y-4">
            <h1 class="text-center font-black text-[10px] uppercase tracking-[0.5em] mb-10">Admin Access</h1>
            <input type="password" id="adminPass" placeholder="PASSWORD">
            <button onclick="checkPass()" class="btn-black">Enter</button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto space-y-12">
        <div class="bg-white p-10 border shadow-sm">
            <h2 class="font-black text-[10px] uppercase tracking-widest mb-8">New Product</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="itemName" placeholder="Name">
                <input type="number" id="itemCost" placeholder="Cost (THB)">
            </div>
            <textarea id="itemDesc" placeholder="Description" class="h-24"></textarea>
            <div class="grid grid-cols-2 gap-4">
                <select id="itemGrade"><option value="Instock">Instock</option><option value="Pre-order">Pre-order</option></select>
                <input type="text" id="itemSizes" placeholder="Sizes (e.g. S, M, L)">
            </div>
            <p id="imgCount" class="text-[9px] font-black text-slate-400 uppercase mb-4">Selected: 0/5</p>
            <button id="uploadBtn" class="w-full border-2 border-dashed p-10 text-[10px] font-black uppercase opacity-50 mb-6">📸 Upload Images</button>
            <button onclick="saveItem()" class="btn-black">Deploy</button>
        </div>

        <div class="bg-white p-10 border shadow-sm">
            <h2 class="font-black text-[10px] uppercase mb-8">Inventory Management</h2>
            <div id="inv-list" class="divide-y"></div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        // Password is now fixed to never2026
        function checkPass() { 
    const input = document.getElementById('adminPass').value;
    if(input === 'never2026') {
        document.getElementById('authOverlay').style.display = 'none'; 
    } else {
        alert("Incorrect Password");
    }
}

        let photos = [];
        var widget = cloudinary.createUploadWidget({ cloudName: 'dawhhgjsd', uploadPreset: 'dawhhgjsd', maxFiles: 5 }, (e, r) => {
            if(r.event==="success") { photos.push(r.info.secure_url); document.getElementById('imgCount').innerText = `Selected: ${photos.length}/5`; }
        });
        document.getElementById('uploadBtn').onclick = () => widget.open();

        async function saveItem() {
            const data = {
                name: document.getElementById('itemName').value,
                costTHB: document.getElementById('itemCost').value,
                description: document.getElementById('itemDesc').value,
                grade: document.getElementById('itemGrade').value,
                sizes: document.getElementById('itemSizes').value.split(',').map(s=>s.trim()),
                images: photos
            };
            if(photos.length === 0) return alert("Upload images first!");
            await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            location.reload();
        }

        async function load() {
            const res = await fetch('/items'); const items = await res.json();
            document.getElementById('inv-list').innerHTML = items.reverse().map(i => `
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center gap-4 text-[11px] font-bold uppercase">
                        <img src="${(i.images && i.images[0]) ? i.images[0] : ''}" class="w-10 h-10 object-cover bg-gray-100">
                        ${i.name}
                    </div>
                    <button onclick="del('${i._id}')" class="text-[9px] font-black uppercase text-red-500">Delete</button>
                </div>`).join('');
        }
        async function del(id) { if(confirm('Delete?')) { await fetch(`/delete-item/${id}`, {method:'DELETE'}); load(); } }
        load();
    </script>
</body>
</html>
